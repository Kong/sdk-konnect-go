name: Generate SDK

on:
  pull_request:
    paths:
      - .speakeasy/gen.yaml
    types:
    - opened
    - synchronize

permissions:
  contents: read

env:
  MISE_VERBOSE: 1

jobs:
  should-generate:
    runs-on:
      - ubuntu-latest
    outputs:
      result: ${{ steps.decision.outputs.result }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.PAT }}

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          since_last_remote_commit: "true"
      
      - id: decision
        run: |
          echo "result=${{ contains(steps.changed-files.outputs.modified_files, '.speakeasy/gen.yaml') }}" >> "$GITHUB_OUTPUT"

  generate:
    needs:
    - should-generate
    permissions:
      contents: write
    runs-on:
      - ubuntu-latest
    if: needs.should-generate.outputs.result == 'true'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout current repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.PAT }}

      - name: Configure speakeasy CLI
        run: |
          mkdir -p ~/.speakeasy
          echo 'speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}' > ~/.speakeasy/config.yaml

      - uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4.2.2
        with:
          install: false

      - name: Generate SDK
        run: |
          export PATH=${PATH}:$(go env GOPATH)/bin
          make generate.sdk

      - name: Git add generated changes
        run: git add .

      - name: Generate interfaces and mocks
        run: |
          make generate.interfaces generate.mocks

      - name: Commit deepcopy changes to the PR
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          add: .
          default_author: github_actions
          message: Update provider based on openapi.yaml changes
