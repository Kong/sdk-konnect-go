          title: Payment term
          default: in_arrears
          x-speakeasy-unknown-values: allow
        commitments:
          type: object
          properties:
            minimum_amount:
              type: string
              pattern: ^\-?[0-9]+(\.[0-9]+)?$
              description: The customer is committed to spend at least the amount.
              title: Minimum amount
            maximum_amount:
              type: string
              pattern: ^\-?[0-9]+(\.[0-9]+)?$
              description: The customer is limited to spend at most the amount.
              title: Maximum amount
          additionalProperties: false
          description: >-
            Spend commitments for this rate card. Only applicable to usage-based
            prices

            (unit, graduated, volume).
          title: Commitments
        discounts:
          type: object
          properties:
            percentage:
              type: number
              minimum: 0
              maximum: 100
              description: Percentage discount applied to the price (0–100).
            usage:
              type: string
              pattern: ^\-?[0-9]+(\.[0-9]+)?$
              description: >-
                Number of usage units granted free before billing starts. Only
                applies to

                usage-based lines (not flat fees). Usage is treated as zero
