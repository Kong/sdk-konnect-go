          items:
            $ref: '#/components/schemas/Meter'
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
      additionalProperties: false
      description: Page paginated response.
    MeterQueryRequest:
      type: object
      properties:
        from:
          type: string
          format: date-time
          description: The start of the period the usage is queried from.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
        to:
          type: string
          format: date-time
          description: The end of the period the usage is queried to.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
        granularity:
          type: string
          enum:
            - PT1M
            - PT1H
            - P1D
            - P1M
          description: >-
            The size of the time buckets to group the usage into. If not
            specified, the

            usage is aggregated over the entire period.
          x-speakeasy-unknown-values: allow
        time_zone:
          type: string
          description: >-
            The value is the name of the time zone as defined in the IANA Time
            Zone Database

            (http://www.iana.org/time-zones). The time zone is used to determine
            the start

            and end of the time buckets. If not specified, the UTC timezone will
            be used.
          default: UTC
        group_by_dimensions:
          type: array
          items:
            type: string
          maxItems: 100
          description: The dimensions to group the results by.
          example:
            - model
            - type
        filters:
          type: object
          properties:
            dimensions:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/QueryFilterStringMapItem'
              maxProperties: 10
              description: >-
                Filters to apply to the dimensions of the query. For `subject`
                and `customer_id`

                only equals ("eq", "in") comparisons are supported.
          additionalProperties: false
          description: Filters to apply to the query.
      additionalProperties: false
      description: A meter query request.
      example:
        from: '2023-01-01T00:00:00Z'
        to: '2023-01-02T00:00:00Z'
        granularity: P1D
        time_zone: UTC
    MeterQueryResult:
      type: object
      required:
        - data
      properties:
        from:
          type: string
          format: date-time
          description: The start of the period the usage is queried from.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
        to:
          type: string
          format: date-time
          description: The end of the period the usage is queried to.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
        data:
          type: array
          items:
            $ref: '#/components/schemas/MeterQueryRow'
          description: The usage data. If no data is available, an empty array is returned.
      additionalProperties: false
      description: Meter query result.
      example:
        from: '2023-01-01T00:00:00Z'
        to: '2023-01-02T00:00:00Z'
        data:
          - value: '12.3456'
            from: '2023-01-01T00:00:00Z'
            to: '2023-01-02T00:00:00Z'
            dimensions:
              customer_id: 01G65Z755AFWAKHE12NY0CQ9FH
              model: gpt-4-turbo
              type: input
    MeterQueryRow:
      type: object
      required:
