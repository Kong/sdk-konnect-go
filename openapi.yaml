          description: |
            If using a DCR auth strategy, set this property to link the portal application to an existing
            client from the DCR provider, instead of having Konnect create a new client.

            This allows importing existing clients from an Identity Provider into Konnect, allowing
            them to be controlled through DCR flows in the portal and use existing client secrets
            for API access.

            The value must be a valid client ID in the DCR provider associated with the auth strategy.
            For some DCR providers, if the client ID is invalid, the application may still be created but will not function properly.

            Note: For AzureAD auth strategies, the client ID must resolve to an accessible Microsoft Entra
            application using the configured DCR provider credentials. Otherwise, application creation fails.
          type: string
          maxLength: 255
