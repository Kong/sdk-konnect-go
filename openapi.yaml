openapi: 3.1.0
info:
  title: Konnect API - Go Internal SDK
  version: 3.15.0
  description: The Konnect platform API
  contact:
    name: Kong Inc
    url: https://konghq.com
    email: support@konghq.com
  x-latest-public-runtime-version: '1.2'
  x-extensions-note: >
    This API uses the `x-expression` vendor extension to indicate that a string
    property is a DSL expression.

    Supported types:
      - `boolean`: An expression evaluates to boolean. For example, `context.topic.name == 'my-topic'`
      - `string`: A template string expression that evaluates to a string or a literal string value. For example,
        `${context.topic.name.substring(0, context.topic.name.length-4)}` or `my-literal-value`

    Additionally, `x-sensitive` flag indicates that a field contains sensitive
    information. When the value

    of the field is provided in plain text, it's encrypted at rest and it's
    never returned in API responses.

    When the value is an expression, the expression itself is stored and
    returned in API responses.


    `x-min-runtime-version` indicates the minimum Event Gateway runtime version
    required to use a certain policy or

    policy feature. The runtime version can be configured at the Event Gateway
    entity level. It must be a string

    containing a semantic version in the `MAJOR.MINOR` format, e.g., `"1.1"`.
    info.[x-latest-public-runtime-version]

    indicates the latest public runtime version of Event Gateway. When

    `x-min-runtime-version > x-latest-public-runtime-version`, the property or
    schema will only appear in dev schemas.
