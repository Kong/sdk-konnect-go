                exhausted.
          additionalProperties: false
          description: The discounts of the rate card.
          title: Discounts
        tax_config:
          type: object
          required:
            - code
          properties:
            behavior:
              $ref: '#/components/schemas/BillingTaxBehavior'
            code:
              $ref: '#/components/schemas/TaxCodeReference'
          additionalProperties: false
          description: The tax config of the rate card.
          title: Tax config
        entitlement:
          type: object
          oneOf:
            - $ref: '#/components/schemas/BillingRateCardMeteredEntitlement'
            - $ref: '#/components/schemas/BillingRateCardStaticEntitlement'
            - $ref: '#/components/schemas/BillingRateCardBooleanEntitlement'
          discriminator:
            propertyName: type
            mapping:
              metered: '#/components/schemas/BillingRateCardMeteredEntitlement'
              static: '#/components/schemas/BillingRateCardStaticEntitlement'
              boolean: '#/components/schemas/BillingRateCardBooleanEntitlement'
          description: >-
            The entitlement template granted to subscribers of a plan or addon
            containing

            this rate card. Requires `feature` to be set.
          title: Entitlement template
      additionalProperties: false
      description: A rate card defines the pricing and entitlement of a feature or service.
    BillingRateCardBooleanEntitlement:
      type: object
