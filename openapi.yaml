    MeterQueryRequest:
      description: A meter query request.
      type: object
      properties:
        from:
          description: The start of the period the usage is queried from.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        to:
          description: The end of the period the usage is queried to.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        granularity:
          description: |-
            The size of the time buckets to group the usage into. If not specified, the
            usage is aggregated over the entire period.
          type: string
          enum:
            - PT1M
            - PT1H
            - P1D
            - P1M
          x-speakeasy-unknown-values: allow
        time_zone:
          description: |-
            The value is the name of the time zone as defined in the IANA Time Zone Database
            (http://www.iana.org/time-zones). The time zone is used to determine the start
            and end of the time buckets. If not specified, the UTC timezone will be used.
          type: string
          default: UTC
        group_by_dimensions:
          description: The dimensions to group the results by.
          type: array
          items:
            type: string
          example:
            - model
            - type
          maxItems: 100
        filters:
          description: Filters to apply to the query.
          type: object
          additionalProperties: false
          properties:
            dimensions:
              description: |-
                Filters to apply to the dimensions of the query. For `subject` and `customer_id`
                only equals ("eq", "in") comparisons are supported.
              type: object
              additionalProperties:
                $ref: '#/components/schemas/QueryFilterStringMapItem'
              maxProperties: 10
      example:
        from: '2023-01-01T00:00:00Z'
        to: '2023-01-02T00:00:00Z'
        granularity: P1D
        time_zone: UTC
      additionalProperties: false
    MeterQueryResult:
      description: Meter query result.
      type: object
      properties:
        from:
          description: The start of the period the usage is queried from.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        to:
          description: The end of the period the usage is queried to.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        data:
          description: 'The usage data. If no data is available, an empty array is returned.'
          type: array
          items:
            $ref: '#/components/schemas/MeterQueryRow'
      example:
        from: '2023-01-01T00:00:00Z'
        to: '2023-01-02T00:00:00Z'
        data:
          - value: '12.3456'
            from: '2023-01-01T00:00:00Z'
            to: '2023-01-02T00:00:00Z'
            dimensions:
              customer_id: 01G65Z755AFWAKHE12NY0CQ9FH
              model: gpt-4-turbo
              type: input
      additionalProperties: false
      required:
        - data
    MeterQueryRow:
      description: A row in the result of a meter query.
      type: object
      properties:
        value:
          description: The aggregated value.
          type: string
          pattern: '^\-?[0-9]+(\.[0-9]+)?$'
        from:
          description: The start of the time bucket the value is aggregated over.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        to:
          description: The end of the time bucket the value is aggregated over.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        dimensions:
          description: |-
            The dimensions the value is aggregated over. `subject` and `customer_id` are
            reserved dimensions.
          type: object
          additionalProperties:
            type: string
      example:
        value: '12.3456'
        from: '2023-01-01T00:00:00Z'
        to: '2023-01-02T00:00:00Z'
        dimensions:
          customer_id: 01G65Z755AFWAKHE12NY0CQ9FH
          model: gpt-4-turbo
          type: input
      additionalProperties: false
      required:
        - value
        - from
        - to
        - dimensions
    MeteringEvent:
      description: Metering event following the CloudEvents specification.
      type: object
      properties:
        id:
          description: Identifies the event.
          type: string
          example: 5c10fade-1c9e-4d6c-8275-c52c36731d3c
          minLength: 1
        source:
          description: Identifies the context in which an event happened.
          type: string
          format: uri-reference
          example: service-name
          minLength: 1
        specversion:
          description: The version of the CloudEvents specification which the event uses.
          type: string
          example: '1.0'
          default: '1.0'
          minLength: 1
        type:
          description: |-
            Contains a value describing the type of event related to the originating
            occurrence.
          type: string
          example: com.example.someevent
          minLength: 1
        datacontenttype:
          description: |-
            Content type of the CloudEvents data value. Only the value "application/json" is
            allowed over HTTP.
          type: string
          example: application/json
          enum:
            - application/json
          nullable: true
        dataschema:
          description: Identifies the schema that data adheres to.
          type: string
          format: uri
          minLength: 1
          nullable: true
        subject:
          description: |-
            Describes the subject of the event in the context of the event producer
            (identified by source).
          type: string
          example: customer-id
          minLength: 1
        time:
          description: Timestamp of when the occurrence happened. Must adhere to RFC 3339.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          nullable: true
          title: RFC3339 Date-Time
        data:
          description: 'The event payload. Optional, if present it must be a JSON object.'
          type: object
          additionalProperties: {}
          nullable: true
      example:
        specversion: '1.0'
        id: 5c10fade-1c9e-4d6c-8275-c52c36731d3c
        source: service-name
        type: prompt
        subject: customer-id
        time: '2023-01-01T01:01:01.001Z'
        data:
          prompt: 'Hello, world!'
          tokens: 100
          model: gpt-4o
          type: input
      additionalProperties: false
      required:
        - id
        - source
        - specversion
        - type
        - subject
      title: Metering Event
    MeteringIngestedEvent:
      description: An ingested metering event with ingestion metadata.
      type: object
      properties:
        event:
          description: The original event ingested.
          type: object
          example:
            specversion: '1.0'
            id: 5c10fade-1c9e-4d6c-8275-c52c36731d3c
            source: service-name
            type: prompt
            subject: customer-id
            time: '2023-01-01T01:01:01.001Z'
            data:
              prompt: 'Hello, world!'
              tokens: 100
              model: gpt-4o
              type: input
          additionalProperties: false
          properties:
            id:
              description: Identifies the event.
              type: string
              example: 5c10fade-1c9e-4d6c-8275-c52c36731d3c
              minLength: 1
            source:
              description: Identifies the context in which an event happened.
              type: string
              format: uri-reference
              example: service-name
              minLength: 1
            specversion:
              description: The version of the CloudEvents specification which the event uses.
              type: string
              example: '1.0'
              default: '1.0'
              minLength: 1
            type:
              description: |-
                Contains a value describing the type of event related to the originating
                occurrence.
              type: string
              example: com.example.someevent
              minLength: 1
            datacontenttype:
              description: |-
                Content type of the CloudEvents data value. Only the value "application/json" is
                allowed over HTTP.
              type: string
              example: application/json
              enum:
                - application/json
              nullable: true
            dataschema:
              description: Identifies the schema that data adheres to.
              type: string
              format: uri
              minLength: 1
              nullable: true
            subject:
              description: |-
                Describes the subject of the event in the context of the event producer
                (identified by source).
              type: string
              example: customer-id
              minLength: 1
            time:
              description: Timestamp of when the occurrence happened. Must adhere to RFC 3339.
              type: string
              format: date-time
              example: '2023-01-01T01:01:01.001Z'
              nullable: true
              title: RFC3339 Date-Time
            data:
              description: 'The event payload. Optional, if present it must be a JSON object.'
              type: object
              additionalProperties: {}
              nullable: true
          required:
            - id
            - source
            - specversion
            - type
            - subject
          title: Metering Event
        customer:
          description: The customer if the event is associated with a customer.
          type: object
          additionalProperties: false
          properties:
            id:
              $ref: '#/components/schemas/ULID'
          required:
            - id
        ingested_at:
          description: The date and time the event was ingested and its processing started.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        stored_at:
          description: The date and time the event was stored in the database.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        validation_errors:
          description: The validation errors of the ingested event.
          type: array
          items:
            $ref: '#/components/schemas/MeteringIngestedEventValidationError'
      example:
        event:
          id: 5c10fade-1c9e-4d6c-8275-c52c36731d3c
          source: service-name
          specversion: '1.0'
          type: prompt
          subject: customer_key
          time: '2023-01-01T01:01:01.001Z'
        customer:
          id: 01G65Z755AFWAKHE12NY0CQ9FH
        ingested_at: '2023-01-01T01:01:01.001Z'
        stored_at: '2023-01-01T01:01:02.001Z'
      additionalProperties: false
      required:
        - event
        - ingested_at
        - stored_at
      title: Ingested Event
