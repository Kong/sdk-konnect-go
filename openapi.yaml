    Vault:
      description: >-
        Vault entities are used to configure different Vault connectors.
        Examples of Vaults are Environment Variables, Hashicorp Vault and AWS
        Secrets Manager. Configuring a Vault allows referencing the secrets with
        other entities. For example a certificate entity can store a reference
        to a certificate and key, stored in a vault, instead of storing the
        certificate and key within the entity. This allows a proper separation
        of secrets and configuration and prevents secret sprawl.
      type: object
      properties:
        config:
          description: >-
            The configuration properties for the Vault which can be found on the
            vaults' documentation page.
          type: object
          additionalProperties: true
          nullable: true
        created_at:
          description: Unix epoch when the resource was created.
          type: integer
          nullable: true
        description:
          description: The description of the Vault entity.
          type: string
          nullable: true
        id:
          description: A string representing a UUID (universally unique identifier).
          type: string
          nullable: true
        managed_by:
          description: >-
            Arbitrary JSON data for client responsible for managing the entity.
            Konnect only field, not synced to the Gateway.
          type: object
          additionalProperties: true
          nullable: true
        name:
          description: >-
            The name of the Vault that's going to be added. Currently, the Vault
            implementation must be installed in every Kong instance.
          type: string
        prefix:
          description: >-
            The unique prefix (or identifier) for this Vault configuration. The
            prefix is used to load the right Vault configuration and
            implementation when referencing secrets with the other entities.
          type: string
        tags:
          description: >-
            An optional set of strings associated with the Vault for grouping
            and filtering.
          type: array
          items:
            description: A string representing a tag.
            type: string
          nullable: true
        updated_at:
          description: Unix epoch when the resource was last updated.
          type: integer
          nullable: true
      example:
        config:
          prefix: ENV_PREFIX
        description: environment variable based vault
        id: 2747d1e5-8246-4f65-a939-b392f1ee17f8
        name: env
        prefix: env
        tags:
          - foo
          - bar
      additionalProperties: false
      required:
        - name
        - prefix
      x-property-annotations:
        managed_by:
          - x-unstable
          - x-internal
    CertificateRequest:
      description: >-
        A certificate object represents a public certificate, and can be
        optionally paired with the corresponding private key. These objects are
        used by Kong to handle SSL/TLS termination for encrypted requests, or
        for use as a trusted CA store when validating peer certificate of
        client/service. Certificates are optionally associated with SNI objects
        to tie a cert/key pair to one or more hostnames. If intermediate
        certificates are required in addition to the main certificate, they
        should be concatenated together into one string according to the
        following order: main certificate on the top, followed by any
        intermediates.
      example:
        cert: |-
          -----BEGIN CERTIFICATE-----
          certificate-content
          -----END CERTIFICATE-----
        id: b2f34145-0343-41a4-9602-4c69dec2f269
        key: |-
          -----BEGIN PRIVATE KEY-----
          private-key-content
          -----END PRIVATE KEY-----
      allOf:
        - additionalProperties: false
          properties:
            cert:
              description: >-
                PEM-encoded public certificate chain of the SSL key pair. This
                field is _referenceable_, which means it can be securely stored
                as a
                [secret](/gateway/latest/plan-and-deploy/security/secrets-management/getting-started)
                in a vault. References must follow a [specific
                format](/gateway/latest/plan-and-deploy/security/secrets-management/reference-format).
              type: string
              x-referenceable: true
            cert_alt:
              description: >-
                PEM-encoded public certificate chain of the alternate SSL key
                pair. This should only be set if you have both RSA and ECDSA
                types of certificate available and would like Kong to prefer
                serving using ECDSA certs when client advertises support for it.
                This field is _referenceable_, which means it can be securely
                stored as a
                [secret](/gateway/latest/plan-and-deploy/security/secrets-management/getting-started)
                in a vault. References must follow a [specific
                format](/gateway/latest/plan-and-deploy/security/secrets-management/reference-format).
              type: string
              nullable: true
              x-referenceable: true
            created_at:
              description: Unix epoch when the resource was created.
              type: integer
              nullable: true
            description:
              description: >-
                User-defined entity description. Konnect only field, not synced
                to the Gateway.
              type: string
              nullable: true
            id:
              description: A string representing a UUID (universally unique identifier).
              type: string
              nullable: true
            key:
              description: >-
                PEM-encoded private key of the SSL key pair. This field is
                _referenceable_, which means it can be securely stored as a
                [secret](/gateway/latest/plan-and-deploy/security/secrets-management/getting-started)
                in a vault. References must follow a [specific
                format](/gateway/latest/plan-and-deploy/security/secrets-management/reference-format).
              type: string
              x-encrypted: true
              x-referenceable: true
            key_alt:
              description: >-
                PEM-encoded private key of the alternate SSL key pair. This
                should only be set if you have both RSA and ECDSA types of
                certificate available and would like Kong to prefer serving
                using ECDSA certs when client advertises support for it. This
                field is _referenceable_, which means it can be securely stored
                as a
                [secret](/gateway/latest/plan-and-deploy/security/secrets-management/getting-started)
                in a vault. References must follow a [specific
                format](/gateway/latest/plan-and-deploy/security/secrets-management/reference-format).
              type: string
              nullable: true
              x-encrypted: true
              x-referenceable: true
            managed_by:
              description: >-
                Arbitrary JSON data for client responsible for managing the
                entity. Konnect only field, not synced to the Gateway.
              type: object
              additionalProperties: true
              nullable: true
            snis:
              type: array
              items:
                description: >-
                  A string representing a wildcard host name, such as
                  *.example.com.
                type: string
              nullable: true
            tags:
              description: >-
                An optional set of strings associated with the Certificate for
                grouping and filtering.
              type: array
              items:
                description: A string representing a tag.
                type: string
              nullable: true
            updated_at:
              description: Unix epoch when the resource was last updated.
              type: integer
              nullable: true
            vault:
              description: >-
                Shorthand that expands into cert and key; when both vault and
                cert/key are provided, the vault expansion takes precedence.
              type: string
              nullable: true
              writeOnly: true
            vault_alt:
              description: >-
                Shorthand that expands into cert_alt and key_alt; when both
                vault_alt and cert_alt/key_alt are provided, the vault_alt
                expansion takes precedence.
              type: string
              nullable: true
              writeOnly: true
          type: object
        - anyOf:
            - required:
                - vault
            - required:
                - cert
                - key
      x-property-annotations:
        description:
          - x-unstable
          - x-internal
        managed_by:
          - x-unstable
          - x-internal
