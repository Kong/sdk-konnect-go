    Meter:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
        - key
        - aggregation
        - event_type
      properties:
        id:
          type: string
          pattern: ^[0-7][0-9A-HJKMNP-TV-Z]{25}$
          description: ULID (Universally Unique Lexicographically Sortable Identifier).
          title: ULID
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
        description:
          type: string
          maxLength: 1024
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          type: string
          format: date-time
          description: An ISO-8601 timestamp representation of entity creation date.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        updated_at:
          type: string
          format: date-time
          description: An ISO-8601 timestamp representation of entity last update date.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          description: An ISO-8601 timestamp representation of entity deletion date.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        key:
          $ref: '#/components/schemas/ResourceKey'
        aggregation:
          type: string
          enum:
            - sum
            - count
            - unique_count
            - avg
            - min
            - max
            - latest
          description: The aggregation type to use for the meter.
          x-speakeasy-unknown-values: allow
        event_type:
          type: string
          minLength: 1
          description: The event type to include in the aggregation.
          example: prompt
        events_from:
          type: string
          format: date-time
          description: >-
            The date since the meter should include events. Useful to skip old
            events. If

            not specified, all historical events are included.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
        value_property:
          type: string
          minLength: 1
          description: >-
            JSONPath expression to extract the value from the ingested event's
            data

            property.


            The ingested value for sum, avg, min, and max aggregations is a
            number or a

            string that can be parsed to a number.


            For unique_count aggregation, the ingested value must be a string.
            For count

            aggregation the value_property is ignored.
          example: $.tokens
        dimensions:
          type: object
          additionalProperties:
            type: string
          description: >-
            Named JSONPath expressions to extract the group by values from the
            event data.


            Keys must be unique and consist only alphanumeric and underscore
            characters.
          example:
            type: $.type
      additionalProperties: false
      description: >-
        A meter is a configuration that defines how to match and aggregate
        events.
      example:
        id: 01G65Z755AFWAKHE12NY0CQ9FH
        key: tokens_total
        name: Tokens Total
        description: AI Token Usage
        aggregation: sum
        event_type: prompt
        value_property: $.tokens
        dimensions:
          model: $.model
          type: $.type
        created_at: '2024-01-01T01:01:01.001Z'
        updated_at: '2024-01-01T01:01:01.001Z'
    MeterPagePaginatedResponse:
      type: object
      required:
