          type: string
          nullable: true
        catalog_reference:
          $ref: '#/components/schemas/VulnerabilityScanCatalogReference'
        environment:
          type: string
          nullable: true
          example: prod
        region:
          type: string
          nullable: true
          example: us-east-2
        source_correlation_key:
          type: string
          nullable: true
          example: kong/repo-id
        attributes:
          type: object
          additionalProperties:
            type: string
          example:
            org.kong.enterprise.source.version: v1
        ts:
          type: string
          format: date-time
