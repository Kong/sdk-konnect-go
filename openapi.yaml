    DeviceAuthorizationResponse:
      description: Device authorization response
      content:
        application/json:
          schema:
            type: object
            title: Device Authorization Response
            properties:
              device_code:
                type: string
                description: The device verification code.
              user_code:
                type: string
                description: The end-user verification code.
              verification_uri:
                type: string
                description: The end-user verification URI on the authorization server.
              verification_uri_complete:
                type: string
                description: A verification URI that includes the "user_code".
              expires_in:
                type: integer
                description: The lifetime in seconds of the "device_code" and "user_code".
              interval:
                type: integer
                description: >-
                  The minimum amount of time in seconds that the client should
                  wait between polling requests to the token endpoint.
            required:
              - device_code
              - user_code
              - verification_uri
              - expires_in
            example:
              device_code: GmRhmhcxhwAzkoEqiMEg_DnyEysNkuNhszIySk9eS
              user_code: WDJB-MJHT
              verification_uri: https://example.com/device
              verification_uri_complete: https://example.com/device?user_code=WDJB-MJHT
              expires_in: 1800
              interval: 5
    DeviceAccessTokenResponse:
      description: Device access token response
      content:
        application/json:
          schema:
            type: object
            title: Device Access Token Response
            properties:
              access_token:
                type: string
                description: The access token issued by the authorization server.
              token_type:
                type: string
                description: The type of the token issued.
              expires_in:
                type: integer
                description: The lifetime in seconds of the access token.
              refresh_token:
                type: string
                description: >-
                  The refresh token, which can be used to obtain new access
                  tokens using the same authorization grant.
              scope:
                type: string
                description: The scope of the access token.
            required:
              - access_token
              - token_type
              - expires_in
            example:
              access_token: 2YotnFZFEjr1zCsicMWpAA
              token_type: Bearer
              expires_in: 3600
              refresh_token: tGzv3JOkF0XG5Qx2TlKWIA
              scope: read write
    DeviceAuthorizationUserResponse:
      description: User device authorization response
      content:
