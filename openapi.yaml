    ScorecardEntitySelector:
      title: ScorecardEntitySelector
      description: |
        Selector used to dynamically target catalog entities that will be
        included in the given scorecard's evaluated score.
      oneOf:
        - $ref: '#/components/schemas/ServiceSelector'
      example:
        selector: label
        selector_parameters:
          label_key: product_area
          operator: eq
          value: cloud_platform
      type: object
      nullable: true
    ScorecardScore:
      type: object
      description: >
        The current score for the given Scorecard.

        A `null` value indicates the scorecard has not yet been evaluated and
        therefore no score has been computed.
      nullable: true
      required:
        - value
        - raw_value
      properties:
        value:
          type: string
          description: >-
            The human-readable score value coverted to the Scorecard's assigned
            grading system.
          example: 88%
        raw_value:
          type: number
          description: >
            The raw, numeric score calculated during evaluation of the
            scorecard.

            Rounded to 3 decimal places.
          minimum: 0
          maximum: 100
          example: 87.5
    ScorecardServiceFilterParameters:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UuidFieldFilter'
        name:
          $ref: '#/components/schemas/StringFieldFilter'
        display_name:
          $ref: '#/components/schemas/StringFieldFilter'
        custom_fields:
          description: >
            Filter by custom fields using dot-notation to specify the custom
            field.

            Filter operators are dictated by the custom field type. For example:
              - `filter[custom_fields.owner]`
              - `filter[custom_fields.owner][neq]=kong`
              - `filter[custom_fields.dashboard.link][contains]=https`
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
            - $ref: '#/components/schemas/BooleanFieldFilter'
            - $ref: '#/components/schemas/NumericFieldFilter'
        labels:
          $ref: '#/components/schemas/LabelsFieldFilter'
        created_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        updated_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        score.value:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
        score.raw_value:
          oneOf:
            - $ref: '#/components/schemas/NumericFieldFilter'
    ScorecardService:
      title: ScorecardService
      description: Service object that includes its score for the given scorecard.
      type: object
      required:
        - id
        - name
        - display_name
        - description
        - custom_fields
        - labels
        - created_at
        - updated_at
        - score
      properties:
        id:
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          description: The service ID.
          readOnly: true
        name:
          type: string
          description: >
            The machine name of the Service that uniquely identifies it within
            the catalog.
          minLength: 1
          maxLength: 120
          pattern: ^[0-9a-z.-]+$
          example: user-svc
        display_name:
          type: string
          description: The display name of the Service.
          minLength: 1
          maxLength: 120
          example: User Service
        description:
          type: string
          description: Optionally provide a description of the Service.
          nullable: true
          maxLength: 2048
        custom_fields:
          $ref: '#/components/schemas/CustomFields'
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
        score:
          $ref: '#/components/schemas/ScorecardScore'
    ScorecardCriteriaFilterParameters:
      type: object
      properties:
        evaluation.passing_services_count:
          oneOf:
            - $ref: '#/components/schemas/NumericFieldFilter'
    ScorecardCriteriaServiceFilterParameters:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UuidFieldFilter'
        name:
          $ref: '#/components/schemas/StringFieldFilter'
        display_name:
          $ref: '#/components/schemas/StringFieldFilter'
        custom_fields:
          description: >
            Filter by custom fields using dot-notation to specify the custom
            field.

            Filter operators are dictated by the custom field type. For example:
              - `filter[custom_fields.owner]`
              - `filter[custom_fields.owner][neq]=kong`
              - `filter[custom_fields.dashboard.link][contains]=https`
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
            - $ref: '#/components/schemas/BooleanFieldFilter'
            - $ref: '#/components/schemas/NumericFieldFilter'
        labels:
          $ref: '#/components/schemas/LabelsFieldFilter'
        created_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        updated_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        evaluation.is_passing:
          oneOf:
            - $ref: '#/components/schemas/BooleanFieldFilter'
        evaluation.successfully_evaluated_at:
          title: DateTimeFieldFilter
          description: Filters on the given datetime (RFC-3339) field value.
          oneOf:
            - *ref_4
            - *ref_5
            - *ref_6
            - *ref_7
            - *ref_8
        evaluation.attempted_at:
          title: DateTimeFieldFilter
          description: Filters on the given datetime (RFC-3339) field value.
          oneOf:
            - *ref_4
            - *ref_5
            - *ref_6
            - *ref_7
            - *ref_8
