                  was validated by a Confluent schema registry. Fields: `id`
                  (uint), `version` (uint,

                  when returned by the registry), `format` ("avro"|"json"), and
                  either

                  `avro.{name, namespace}` or `json.{title, id}`. Sub-fields are
                  absent when not

                  applicable; use `has()` to test presence.


                  **Requires a minimum runtime version of `1.2`**.
              - name: record.key.schema
                type: object
                x-min-runtime-version: '1.2'
