    PlatformGranularity:
      type: string
      description: >
        Force time grouping into buckets of the specified duration. Only has an
        effect if "time" is in the "dimensions" list.


        If granularity is not specified and "time" is in the dimensions list, a
        default will be chosen based on the time range requested.


        Different relative times support different granularities:
          - 24h                                          => daily
          - 7d, current_week, previous_week              => daily, weekly
          - 30d, current_month, previous_month           => daily, weekly, monthly
          - 90d, 180d, 365d, current_quarter,
            previous_quarter                             => daily, weekly, monthly

        For absolute time ranges, daily will be used.


        Granularity values:
          - `daily`: Groups data into 24-hour buckets.
          - `weekly`: Groups data into 7-day buckets.
          - `monthly`: Groups data into calendar month buckets.
      enum:
        - daily
        - weekly
        - monthly
      x-speakeasy-unknown-values: allow
    PlatformRelativeTimeRange:
      title: Relative time range
      type: object
      description: >-
        A duration representing a relative-to-now span of time for platform
        queries.
      properties:
        tz:
          type: string
          default: Etc/UTC
        type:
          type: string
          enum:
            - relative
        time_range:
          type: string
          enum:
            - 24h
            - 7d
            - 30d
            - 90d
            - 180d
            - 365d
            - current_week
            - current_month
            - current_quarter
            - previous_week
            - previous_month
            - previous_quarter
          default: 30d
          x-speakeasy-unknown-values: allow
      required:
        - type
        - time_range
    PlatformTimeRange:
      description: The time range to query for platform data.
      oneOf:
        - $ref: '#/components/schemas/PlatformRelativeTimeRange'
        - $ref: '#/components/schemas/MetricsAbsoluteTimeRangeDtoV2'
      discriminator:
        propertyName: type
        mapping:
          relative: '#/components/schemas/PlatformRelativeTimeRange'
          absolute: '#/components/schemas/MetricsAbsoluteTimeRangeDtoV2'
      default:
        type: relative
        time_range: 30d
    DonutChart:
      type: object
      properties:
        chart_title:
          description: The title of the chart, which is displayed in the tile's header.
          type: string
          nullable: false
        type:
          type: string
          enum:
            - donut
      title: Donut chart
      description: >
        A chart that can display one-dimensional data in a hollow, segmented
        circle.  To use this chart, ensure that

        the query includes only one dimension (not `time`).
      required:
        - type
      additionalProperties: false
    TimeseriesChart:
      type: object
      properties:
        chart_title:
          description: The title of the chart, which is displayed in the tile's header.
          type: string
          nullable: false
        type:
          type: string
          enum:
            - timeseries_line
            - timeseries_bar
          x-speakeasy-unknown-values: allow
        stacked:
          type: boolean
          nullable: false
          description: >
            Whether to stack the bars or lines (implicitly adding them together
            to form a total), or leave them independent from each other.
      title: Timeseries chart
      description: >
        A chart that can render timeseries data -- data from a query that has
        `time` as a dimension -- as lines or bars.


        This type of chart can support:


        - One or more metrics: `{ metrics: ["response_latency_p99",
        "response_latency_p95"], dimensions: ["time"] }`

        - One metric plus one non-time dimension: `{ metrics: ["request_count"],
        dimensions: ["time", "gateway_service"] }` 


        Either way, ensure that `time` is in the list of query dimensions.
      required:
        - type
      additionalProperties: false
    BarChart:
      type: object
      properties:
        chart_title:
          description: The title of the chart, which is displayed in the tile's header.
          type: string
          nullable: false
        type:
          type: string
          enum:
            - horizontal_bar
            - vertical_bar
          x-speakeasy-unknown-values: allow
        stacked:
          type: boolean
          nullable: false
          description: >
            Whether to stack the bars (implicitly adding them together to form a
            total), or leave them independent from each other.
      title: Bar chart
      description: >
        A chart that can display non-timeseries data as bars.  This type of
        chart supports up to 2 dimensions (not `time`).

        To render a bar chart of timeseries data, use a `timeseries_bar` chart
        instead.
      required:
        - type
      additionalProperties: false
    TopNChart:
      type: object
      properties:
        chart_title:
          description: The title of the chart, which is displayed in the tile's header.
          type: string
          nullable: false
        type:
          type: string
          enum:
            - top_n
      title: Top N chart
      description: >
        A chart that ranks dimension values by a metric and renders them as a
        table, showing

        the top results.  This type of chart supports up to 3 dimensions.
      required:
        - type
      additionalProperties: false
    SingleValueChart:
      type: object
      properties:
        chart_title:
          description: The title of the chart, which is displayed in the tile's header.
          type: string
          nullable: false
        type:
          type: string
          enum:
            - single_value
        decimal_points:
          type: number
          description: >-
            The number of figures to render after the decimal.  Most metrics
            only support up to 2 decimals, but some may support more.
      title: Single value chart
      description: >-
        A chart that can render a single number.  This chart works with a single
        metric and no dimensions.
      required:
        - type
      additionalProperties: false
    ChoroplethMapChart:
      type: object
      properties:
        chart_title:
          description: The title of the chart, which is displayed in the tile's header.
          type: string
          nullable: false
        type:
          type: string
          enum:
            - choropleth_map
      title: Choropleth map chart
