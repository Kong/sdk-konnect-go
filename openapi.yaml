          readOnly: true
        name:
          type: string
          description: >
            The machine name of the Service that uniquely identifies it within
            the catalog.
          minLength: 1
          maxLength: 120
          pattern: ^[0-9a-z.-]+$
          example: user-svc
        display_name:
          type: string
          description: The display name of the Service.
          minLength: 1
          maxLength: 120
          example: User Service
        description:
          type: string
          description: Optionally provide a description of the Service.
          nullable: true
          maxLength: 2048
        custom_fields:
          $ref: '#/components/schemas/CustomFields'
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
        score:
          $ref: '#/components/schemas/ScorecardCriteriaServiceEvaluation'
    ScorecardCriteriaServiceEvaluation:
      type: object
      description: >
        Evaluation for a scorecard criteria relative to the given service
        service.

        Has a `null` value when the criteria has not yet been evaluated for the
        service.
      nullable: true
      required:
        - is_passing
        - evaluation_context
        - evaluation_error
        - successfully_evaluated_at
        - attempted_at
        - created_at
      properties:
        is_passing:
          type: boolean
          description: >-
            Whether or not the service has most recently passed the criteria
            check.
        evaluation_context:
          $ref: '#/components/schemas/CriteriaEvaluationResultDetails'
        evaluation_error:
          type: object
          nullable: true
          description: >
            Details about an error that occurred during evaluation preventing
            computation of a pass/fail result.

            Will be `null` when no error occurred.
          required:
            - type
            - details
          properties:
            type:
              type: string
              description: The type of error that occurred.
              example: integration_unauthorized
            details:
              type: string
              description: Human-readable error message about the error.
              example: >
                The GitHub integration is unauthorized. Please ensure that the

                integration is re-authorized for the criteria to be successfully
                evaluated.
          example: null
        attempted_at:
          type: string
          format: date-time
          example: '2023-02-15T07:20:50Z'
          description: >-
            The timestamp denoting the last evaluation attempt of the criteria
            for the service.
        successfully_evaluated_at:
          type: string
          format: date-time
          example: '2023-02-15T07:20:50Z'
          description: >
            The timestamp denoting when the criteria was last successfully
            evaluated for the service.

            Error states preventing the evaluation from being performed will not
            update this timestamp.
        created_at:
          $ref: '#/components/schemas/CreatedAt'
    CriteriaEvaluationResultDetails:
      type: object
      description: Provides additional metadata about the criteria evaluation result.
      nullable: true
      required:
        - raw_value
        - display_text
      properties:
        raw_value:
          description: >
            Raw value of the criteria evaluation.


            For example, a service may be failing the `time_to_acknowledge`
            criteria evaluation when

            the the mean time-to-ack is greater than 15 minutes. This value
            represents the _actual_

            mean time-to-ack value for the service which if not passing could be
            25 minutes.
          oneOf:
            - type: number
            - type: string
            - type: boolean
            - $ref: '#/components/schemas/TimeValue'
            - $ref: '#/components/schemas/CriteriaEvaluationRelationMap'
            - type: object
              additionalProperties: true
            - nullable: true
        display_text:
          type: string
          example: 25 minutes
          description: >-
            Renderable text providing human-readable context about the
            evaluation value.
      example:
        raw_value:
          unit: minutes
          value: 25
        display_text: 25 minutes
    CriteriaEvaluationRelationMap:
      type: object
      required:
        - instance
        - relation
        - map
      properties:
        instance:
          type: string
          enum:
            - criteria_result_relation_map
        relation:
          type: string
          example: gateway_svc
        map:
          additionalProperties:
            oneOf:
              - $ref: '#/components/schemas/CriteriaEvaluationRelationResult'
              - $ref: '#/components/schemas/CriteriaEvaluationErrorResult'
    CriteriaEvaluationRelationResult:
      type: object
      required:
        - is_passing
        - relation
        - details
      properties:
        is_passing:
          type: boolean
          description: Whether or not the relation has passed the criteria evaluation.
        relation:
          type: object
          required:
            - id
            - name
          properties:
            id:
              type: string
            name:
              type: string
        details:
          $ref: '#/components/schemas/CriteriaEvaluationResultDetails'
    CriteriaEvaluationErrorResult:
      type: object
      required:
        - relation
        - error
      properties:
        relation:
          type: object
          required:
            - id
            - name
          properties:
            id:
              type: string
            name:
              type: string
        error:
          type: object
          nullable: true
          description: >
            Details about an error that occurred during evaluation preventing
            computation of a pass/fail result.

            Will be `null` when no error occurred.
          required:
            - type
            - details
          properties:
            type:
              type: string
              description: The type of error that occurred.
              example: integration_unauthorized
            details:
              type: string
              description: Human-readable error message about the error.
              example: >
                The GitHub integration is unauthorized. Please ensure that the

                integration is re-authorized for the criteria to be successfully
                evaluated.
          example: null
    SuggestionRuleFilterParameters:
      title: SuggestionRuleFilterParameters
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/StringFieldFilterExact'
        name:
          $ref: '#/components/schemas/StringFieldFilter'
        active:
          $ref: '#/components/schemas/BooleanFieldFilter'
        auto_accept:
          $ref: '#/components/schemas/BooleanFieldFilter'
        binding:
          $ref: '#/components/schemas/StringFieldFilterExact'
        action.type:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilterExact'
        created_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        updated_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
    SuggestionRuleErrorFilterParameters:
      title: SuggestionRuleErrorFilterParameters
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/UuidFieldFilter'
        resource_id:
          $ref: '#/components/schemas/StringFieldFilterExact'
        suggestion_rule_id:
          $ref: '#/components/schemas/UuidFieldFilter'
        created_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        updated_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
    CustomFields:
      type: object
      x-speakeasy-type-override: any
      description: >
        Map of customizable, catalog-defined fields providing information about
        a service.
      additionalProperties:
        oneOf:
          - $ref: '#/components/schemas/TextCustomField'
          - $ref: '#/components/schemas/NumericCustomField'
          - $ref: '#/components/schemas/BooleanCustomField'
          - $ref: '#/components/schemas/UrlCustomField'
      example:
        owner: John Appleseed
        dashboard:
          name: On-Call Dashboard
          link: https://my-dashboard-svc.io/dashboards/1
    CustomFieldsSuggestion:
      type: object
      description: >
        Map of customizable, catalog-defined fields providing information about
        a service.
      additionalProperties:
        anyOf:
          - $ref: '#/components/schemas/TextCustomField'
          - $ref: '#/components/schemas/NumericCustomField'
          - $ref: '#/components/schemas/BooleanCustomField'
          - $ref: '#/components/schemas/UrlCustomFieldSuggestion'
      example:
        owner: John Appleseed
        dashboard:
          name: On-Call Dashboard
          link: https://my-dashboard-svc.io/dashboards/1
    TextCustomField:
      type: string
      nullable: true
    NumericCustomField:
      type: number
      nullable: true
    BooleanCustomField:
      type: boolean
      nullable: true
    UrlCustomField:
      type: object
      nullable: true
      required:
        - name
        - link
      properties:
        name:
          description: The human-readable name of the URL link.
          type: string
          example: On-Call Dashboard
        link:
          description: The href value of the URL link.
          type: string
          format: uri-reference
          example: https://my-dashboard-svc.io/dashboards/1
    UrlCustomFieldSuggestion:
      additionalProperties:
        type: string
    ServiceSelector:
      oneOf:
        - $ref: '#/components/schemas/AllEntitiesSelector'
        - $ref: '#/components/schemas/ByIDsSelector'
        - $ref: '#/components/schemas/ByNameSelector'
        - $ref: '#/components/schemas/ByDisplayNameSelector'
        - $ref: '#/components/schemas/ByCustomFieldSelector'
        - $ref: '#/components/schemas/ByLabelSelector'
        - $ref: '#/components/schemas/HasLabelKeySelector'
        - $ref: '#/components/schemas/HasDocsSelector'
        - $ref: '#/components/schemas/HasApisSelector'
        - $ref: '#/components/schemas/HasResourcesSelector'
    AllEntitiesSelector:
      type: object
      description: >-
        Entity selector that includes all entities of the given type within the
        catalog.
      required:
        - selector
        - selector_parameters
      properties:
        selector:
          type: string
          enum:
            - all
        selector_parameters:
          type: string
          enum:
            - null
          nullable: true
    ByIDsSelector:
      type: object
      description: Entity selector that includes entities contained within a list of IDs.
      required:
        - selector
        - selector_parameters
      properties:
        selector:
          type: string
          enum:
            - ids
        selector_parameters:
          type: object
          required:
            - ids
          properties:
            ids:
              type: array
              items:
                type: string
                format: uuid
    ByNameSelector:
      type: object
      description: Entity selector that includes entities by `name`.
      required:
        - selector
        - selector_parameters
      properties:
        selector:
          type: string
          enum:
            - name
        selector_parameters:
          $ref: '#/components/schemas/StringFieldSelectorParams'
    ByDisplayNameSelector:
      type: object
      description: Entity selector that includes entities by `display_name`.
      required:
        - selector
        - selector_parameters
      properties:
        selector:
          type: string
          enum:
            - display_name
        selector_parameters:
          $ref: '#/components/schemas/StringFieldSelectorParams'
    ByCustomFieldSelector:
      type: object
      description: Entity selector that include entities by a custom field.
      required:
        - selector
        - selector_parameters
      properties:
        selector:
          type: string
          enum:
            - custom_field
        selector_parameters:
          oneOf:
            - type: object
              title: StringCustomFieldSelectorParams
              required:
                - field
                - value
                - operator
              properties:
                field:
                  type: string
                  description: Name of the custom field.
                value:
                  type: string
                operator:
                  $ref: '#/components/schemas/StringSelectorOperator'
            - type: object
              title: NumberCustomFieldSelectorParams
              required:
                - field
                - value
                - operator
              properties:
                field:
                  type: string
                  description: Name of the custom field.
                value:
                  type: number
                operator:
                  $ref: '#/components/schemas/NumberSelectorOperator'
            - type: object
              title: BooleanCustomFieldSelectorParams
              required:
                - field
                - value
                - operator
              properties:
                field:
                  type: string
                  description: Name of the custom field.
                value:
                  type: boolean
                operator:
                  $ref: '#/components/schemas/BooleanSelectorOperator'
            - type: object
              title: UrlCustomFieldSelectorParams
              required:
                - field
                - subfield
                - value
                - operator
              properties:
                field:
                  type: string
                  description: Name of the custom field.
                subfield:
                  type: string
                  enum:
                    - name
                    - link
                  description: >-
                    Specify which subfield of the `url` custom field value to
                    use for selection.
                  x-speakeasy-unknown-values: allow
                value:
                  type: string
                operator:
                  $ref: '#/components/schemas/StringSelectorOperator'
    ByLabelSelector:
      type: object
      description: Entity selector that includes entities by `label` value.
      required:
        - selector
        - selector_parameters
      properties:
        selector:
          type: string
          enum:
            - label
        selector_parameters:
          type: object
          required:
            - operator
            - value
            - label_key
          properties:
            operator:
              $ref: '#/components/schemas/StringSelectorOperator'
            value:
              type: string
            label_key:
              type: string
          title: LabelSelectorParams
    HasLabelKeySelector:
      type: object
      description: Entity selector that includes entities by inclusion of a `label` key.
      required:
        - selector
        - selector_parameters
      properties:
        selector:
          type: string
          enum:
            - has_label_key
        selector_parameters:
          type: object
          title: HasLabelKeySelectorParams
          required:
            - label_key
          properties:
            label_key:
              type: string
    HasDocsSelector:
      type: object
      description: Entity selector to include entities by attached documentation.
      required:
        - selector
        - selector_parameters
      properties:
        selector:
          type: string
          enum:
            - has_docs
        selector_parameters:
          type: string
          enum:
            - null
          nullable: true
    HasApisSelector:
      type: object
      description: Entity selector that includes services by attached APIs.
      required:
        - selector
        - selector_parameters
      properties:
        selector:
          type: string
          enum:
            - api_count
        selector_parameters:
          $ref: '#/components/schemas/HasSelectorParams'
    HasResourcesSelector:
      type: object
      description: Entity selector that includes services by mapped resources.
      required:
        - selector
        - selector_parameters
      properties:
        selector:
          type: string
          enum:
            - resource_count
        selector_parameters:
          type: object
          required:
            - operator
            - value
            - resource_type
            - integration
          properties:
            operator:
              $ref: '#/components/schemas/HasRelationshipSelectorOperator'
            value:
              type: number
            resource_type:
              $ref: '#/components/schemas/CatalogResourceType'
            integration:
              type: string
              description: >-
                The machine name of the integration that uniquely identifies it
                within the catalog.
              example: gateway-manager
          title: HasResourcesSelectorParams
    StringFieldSelectorParams:
      type: object
      required:
        - operator
        - value
      properties:
        operator:
          $ref: '#/components/schemas/StringSelectorOperator'
        value:
          type: string
    HasSelectorParams:
      type: object
      required:
        - operator
        - value
      properties:
        operator:
          $ref: '#/components/schemas/HasRelationshipSelectorOperator'
        value:
          type: number
    StringSelectorOperator:
      type: string
      enum:
        - eq
        - contains
      x-speakeasy-unknown-values: allow
    NumberSelectorOperator:
      type: string
      enum:
        - eq
        - lt
        - gt
      x-speakeasy-unknown-values: allow
    BooleanSelectorOperator:
      type: string
      enum:
        - eq
    HasRelationshipSelectorOperator:
      type: string
      enum:
        - eq
        - gte
        - lte
      x-speakeasy-unknown-values: allow
    SimpleSchema:
      type: object
      required:
        - type
        - definition
      properties:
        type:
          type: string
          enum:
            - simple
        definition:
          type: object
          additionalProperties:
            type: string
            enum:
              - string
              - number
              - boolean
            x-speakeasy-unknown-values: allow
    CatalogServiceRef:
      type: object
      description: Short-hand descriptor of a catalog service.
      required:
        - id
        - name
        - display_name
      properties:
        id:
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          description: The service ID.
        name:
          type: string
          description: >
            The machine name of the service that uniquely identifies it within
            the catalog.
          example: user-svc
        display_name:
          type: string
          description: The display name of the service.
          example: User Service
    IntegrationRef:
      type: object
      description: Short-hand descriptor of an integration installed within the catalog.
      required:
        - name
        - display_name
        - instance
      properties:
        name:
          type: string
          example: gateway-manager
        display_name:
          type: string
          example: gateway-manager
        instance:
          $ref: '#/components/schemas/IntegrationInstanceRef'
    IntegrationRefWithoutInstance:
      type: object
      description: Short-hand descriptor of an integration that omits instance metadata.
      required:
        - name
        - display_name
      properties:
        name:
          type: string
          example: gateway-manager
        display_name:
          type: string
          example: gateway-manager
    IntegrationInstanceRef:
      type: object
      description: Short-hand descriptor of an integration instance.
      required:
        - id
        - name
        - display_name
      properties:
        id:
          type: string
          format: uuid
          example: 772b9caf-ddbc-4f4f-8aa4-8dfbbe420351
          description: The integration instance ID.
        name:
          type: string
          description: >
            The machine name of the integration instance that uniquely
            identifies it within the catalog.
          pattern: ^[0-9a-z.-]+$
          example: aws-lambda-prod
        display_name:
          type: string
          description: The display name of the integration instance.
          example: AWS (prod)
    CatalogResourceRef:
      type: object
      description: Short-hand descriptor of a catalog resource.
      required:
        - id
        - name
        - type
        - config
        - integration
      properties:
        id:
          $ref: '#/components/schemas/CatalogResourceId'
        name:
          type: string
          nullable: true
          description: The name of the resource.
        integration:
          $ref: '#/components/schemas/IntegrationRef'
        type:
          $ref: '#/components/schemas/CatalogResourceType'
        config:
          $ref: '#/components/schemas/CatalogResourceConfig'
    ResourceIngestionStatus:
      title: ResourceIngestionStatus
      description: The resource ingestion status.
      type: object
      additionalProperties: false
      required:
        - last_scheduled
        - next_scheduled_at
        - scheduler_state
      properties:
        last_scheduled:
          type: string
          nullable: true
          format: date-time
          description: >
            The timestamp denoting when the last ingestion job was run.

            RFC-3339 format is used with a "T" character separating date from
            time within the field value.

            A `null` value denotes that ingestion for the given integration was
            never run.
        next_scheduled_at:
          type: string
          nullable: true
          format: date-time
          description: >
            The timestamp denoting when the ingestion job is scheduled to run.

            RFC-3339 format is used with a "T" character separating date from
            time within the field value.

            A `null` value denotes that ingestion for the given integration is
            not scheduled to run.
        scheduler_state:
          oneOf:
            - $ref: '#/components/schemas/ResourceSchedulerStateOk'
            - $ref: '#/components/schemas/ResourceSchedulerStateNotOk'
    ResourceSchedulerStateOk:
      title: ResourceSchedulerStateOk
      type: object
      description: Describes the resource ingestion scheduler state.
      additionalProperties: false
      properties:
        status:
          type: string
          enum:
            - ok
      required:
        - status
    ResourceSchedulerStateNotOk:
      title: ResourceSchedulerStateNotOk
      type: object
      description: Describes the resource ingestion scheduler state.
      additionalProperties: false
      properties:
        status:
          type: string
          enum:
            - delayed
            - halted
          x-speakeasy-unknown-values: allow
        reason:
          type: string
          description: Reason for the current resource ingestion scheduler status.
        remediation:
          type: string
          nullable: true
          description: >-
            Possible steps which can be taken to resolve resource scheduler
            status back to "ok".
      required:
        - status
        - reason
        - remediation
    TimeValue:
      type: object
      description: Represents a time value inclusive of units.
      required:
        - value
        - unit
      properties:
        value:
          type: number
          example: 3.25
        unit:
          type: string
          example: hours
          enum:
            - milliseconds
            - seconds
            - minutes
            - hours
            - days
            - months
            - years
          x-speakeasy-unknown-values: allow
    IntegrationNotInstalledError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 404
            title:
              example: Not Found
            type:
              example: https://httpstatuses.com/404
            instance:
              example: kong:trace:1234567890
            detail:
              example: Not found
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - service_catalog_integration_not_installed
        status:
          type: integer
          description: >
            The HTTP status code of the error. Useful when passing the response

            body to child properties in a frontend UI. Must be returned as an
            integer.
          readOnly: true
        title:
          type: string
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          readOnly: true
        instance:
          type: string
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          readOnly: true
    IntegrationUnauthorizedError:
      type: object
      title: IntegrationUnauthorizedError
      properties:
        type:
          type: string
          enum:
            - service_catalog_integration_unauthorized
        status:
          type: integer
          enum:
            - 400
        title:
          type: string
          example: Invalid Request
        instance:
          type: string
          description: The Konnect trace ID.
          example: konnect:trace:3674017986744198214
        detail:
          type: string
          example: >-
            The integration instance "cc461d8c-dade-4ce0-ad86-290f3ff8de1a" is
            unauthorized
        invalid_parameters:
          $ref: '#/components/schemas/InvalidParameters'
      required:
        - type
        - status
        - title
        - detail
        - instance
        - invalid_parameters
    ResourceAction:
      title: ResourceAction
      description: Contains information about a resource action
      type: object
      additionalProperties: false
      required:
        - id
        - user_id
        - action_type
        - cause
        - service_id
        - resource_id
        - resource_name
        - integration
        - created_at
      properties:
        id:
          description: The resource action ID.
          type: string
          format: uuid
          example: 93b411db-6f68-47d2-8959-de2d91914f2f
        user_id:
          description: |
            Represents the user who performed the action.
            A `null` value represents that action was taken by the system.
          type: string
          nullable: true
        action_type:
          description: |
            Represents which action was performed on a resource:
              - `map`: a resource was mapped to a service
              - `unmap`: a resource was unmapped from a service
              - `archive`: a resource was archived
              - `restore`: a resource was restored
          type: string
          enum:
            - map
            - unmap
            - archive
            - restore
          x-speakeasy-unknown-values: allow
        cause:
          description: >
            Represents what caused the resource action to occur:

            - `user-action`: user performed a resource action

            - `suggestion-rule`: resource action performed based on the
            configuration of a suggestion rule
          type: string
          enum:
            - user-action
            - suggestion-rule
          x-speakeasy-unknown-values: allow
        service_id:
          description: The service effected by the resource action
          type: string
          format: uuid
          nullable: true
          example: 6567bdab-9a94-4763-a736-7638b777fc04
        resource_id:
          description: The resource effected by the resource action
          type: string
          example: R4bimspbBIFkYA1v
        resource_name:
          type: string
          nullable: true
          maxLength: 255
          description: The name of the resource affected by the resource action
          example: Billing Service
        integration:
          $ref: '#/components/schemas/IntegrationRef'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
    ResourceActionFilterParameters:
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/StringFieldFilterExact'
        user_id:
          $ref: '#/components/schemas/StringFieldFilter'
        service_id:
          $ref: '#/components/schemas/StringFieldFilterExact'
        resource_id:
          $ref: '#/components/schemas/StringFieldFilterExact'
        resource_name:
          $ref: '#/components/schemas/StringFieldFilter'
        integration.name:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
        integration.instance.name:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
        integration.instance.display_name:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
        integration.instance.id:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilterExact'
        action_type:
          $ref: '#/components/schemas/StringFieldFilterExact'
        cause:
          $ref: '#/components/schemas/StringFieldFilterExact'
        created_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
    LabelsTemplate:
      title: LabelsTemplate
      type: object
      example:
        env: test
      description: >
        Labels to facilitate grouping and tagged search.

        Resolved keys must be of length 1-63 characters, and cannot start with
        ''kong'', ''konnect'', ''mesh'', ''kic'', or ''_''.'

        Label key and value supports JQ expression syntax on discovered entity's
        `integration_record` property.
      additionalProperties:
        type: string
        minLength: 1
    LabelsSuggestion:
      title: LabelsTemplate
      type: object
      example:
        env: test
      description: >
        Labels to facilitate grouping and tagged search.

        Resolved keys must be of length 1-63 characters, and cannot start with
        ''kong'', ''konnect'', ''mesh'', ''kic'', or ''_''.'

        Label key and value supports JQ expression syntax on discovered entity's
        `integration_record` property.
      additionalProperties:
        type: string
    UrlMetadataValueBase:
      type: object
      nullable: true
      required:
        - name
      properties:
        name:
          description: The human-readable name for the url metadata value
          type: string
          minLength: 1
          example: '#public-slack-channel'
    UrlMetadataValueTemplate:
      type: object
      description: >-
        Contains the name and link value associated with a URL Metadata Field.
        Supports JQ templates which resolves to a string.
      allOf:
        - $ref: '#/components/schemas/UrlMetadataValueBase'
        - type: object
          required:
            - link
          properties:
            link:
              description: The url link associated with the metadata value.
              type: string
              minLength: 1
              example: '#public-slack-channel'
    MetadataTemplate:
      type: object
      description: >-
        Contains key value pairs information about entity's metadata. Supports
        JQ templates on values which resolves to a string.
      additionalProperties:
        anyOf:
          - type: string
            nullable: true
          - type: number
            nullable: true
          - type: boolean
            nullable: true
          - $ref: '#/components/schemas/UrlMetadataValueTemplate'
    MapById:
      type: object
      additionalProperties: false
      required:
        - id
      properties:
        id:
          type: string
          description: >
            Exact match on service identifier based on suggestion rule scope.

            Supports JQ expression syntax on discovered entity's
            `integration_record` property.
          example: 1ace6cb5-75ca-4488-a05d-9260628a37a8
    MapByName:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: >
            Exact match on service name based on suggestion rule scope.

            Supports JQ expression syntax on discovered entity's
            `integration_record` property.
          example: '{{ .gateway_service.name }}-{{ .runtime_group.labels.env }}'
    ArchiveActionPayload:
      title: ArchiveActionPayload
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - archive
    MapServiceAction:
      title: MapServiceAction
      type: object
      additionalProperties: false
      required:
        - type
        - data
      properties:
        type:
          type: string
          enum:
            - map
        data:
          type: object
          additionalProperties: false
          required:
            - service
            - resource
          properties:
            service:
              type: object
              additionalProperties: false
              required:
                - id
              properties:
                id:
                  description: >-
                    The identifier of the service associated to this resource
                    action.
                  type: string
                  format: uuid
                  example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
            resource:
              type: object
              additionalProperties: false
              required:
                - labels
              properties:
                labels:
                  $ref: '#/components/schemas/LabelsSuggestion'
    CreateAndMapServiceActionPayload:
      title: CreateAndMapServiceActionPayload
      type: object
      additionalProperties: false
      required:
        - type
        - data
      properties:
        type:
          type: string
          enum:
            - create
        data:
          type: object
          additionalProperties: false
          required:
            - service
            - resource
          properties:
            service:
              $ref: '#/components/schemas/CreateCatalogService'
            resource:
              type: object
              additionalProperties: false
              required:
                - labels
              properties:
                labels:
                  $ref: '#/components/schemas/LabelsSuggestion'
    IgnoreActionPayload:
      title: IgnoreAction
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - ignore
    MapActionPayload:
      title: MapAction
      description: >
        Must specify **at least one** of the following properties when
        `action_type` is `map`:

        - `id`

        - `name`
      type: object
      additionalProperties: false
      required:
        - type
        - data
      properties:
        type:
          type: string
          enum:
            - map
        data:
          type: object
          additionalProperties: false
          required:
            - service
            - resource
          properties:
            service:
              oneOf:
                - $ref: '#/components/schemas/MapByName'
                - $ref: '#/components/schemas/MapById'
            resource:
              type: object
              additionalProperties: false
              required:
                - labels
              properties:
                labels:
                  $ref: '#/components/schemas/LabelsTemplate'
    CreateOrMapAction:
      title: CreateOrMapAction
      type: object
      required:
        - type
        - data
      properties:
        type:
          type: string
          enum:
            - create-or-map
        data:
          type: object
          additionalProperties: false
          required:
            - service
            - resource
          properties:
            service:
              type: object
              additionalProperties: false
              required:
                - name
                - display_name
                - description
                - labels
                - metadata
              properties:
                name:
                  description: >
                    The name of the service to create or map to.

                    Supports JQ expression syntax on discovered entity's
                    `integration_record` property.
                  type: string
                  minLength: 1
                display_name:
                  type: string
                  nullable: true
                  description: >
                    The display name of the service on create. This property is
                    ignored on map.

                    Supports JQ expression syntax on discovered entity's
                    `integration_record` property.

                    If value is set to null, display name will be set to name.
                  minLength: 1
                description:
                  type: string
                  description: >
                    The description of the service. This property is ignored on
                    map.

                    Supports JQ expression syntax on discovered entity's
                    `integration_record` property.
                labels:
                  $ref: '#/components/schemas/LabelsTemplate'
                metadata:
                  $ref: '#/components/schemas/MetadataTemplate'
            resource:
              type: object
              additionalProperties: false
              required:
                - labels
              properties:
                labels:
                  $ref: '#/components/schemas/LabelsTemplate'
    CreateActionEvaluated:
      title: CreateActionEvaluated
      type: object
      required:
        - type
        - data
      properties:
        type:
          type: string
          enum:
            - create
        data:
          type: object
          additionalProperties: false
          required:
            - service
            - resource
          properties:
            service:
              $ref: '#/components/schemas/CatalogServiceSuggestion'
            resource:
              type: object
              additionalProperties: false
              required:
                - labels
              properties:
                labels:
                  $ref: '#/components/schemas/LabelsTemplate'
    SuggestedRuleAction:
      oneOf:
        - $ref: '#/components/schemas/ArchiveActionPayload'
        - $ref: '#/components/schemas/IgnoreActionPayload'
        - $ref: '#/components/schemas/MapActionPayload'
        - $ref: '#/components/schemas/CreateOrMapAction'
    RankAfterPayload:
      writeOnly: true
      type: object
      description: >
        Determines how this suggestion rule ranks against existing suggestion
        rules for the integration.

        When rank is not specified, this suggestion rule will placed as the
        lowest priority rule.
      additionalProperties: false
      required:
        - after_suggestion_rule_id
      properties:
        after_suggestion_rule_id:
          type: string
          format: uuid
          nullable: true
          description: >
            When set to `null`, this rule is indicated to be the highest
            priority rule.
    RankBeforePayload:
      writeOnly: true
      type: object
      description: >
        Determines how this suggestion rule ranks against existing suggestion
        rules for the integration.

        When rank is not specified, this suggestion rule will placed as the
        lowest priority rule.
      additionalProperties: false
      required:
        - before_suggestion_rule_id
      properties:
        before_suggestion_rule_id:
          type: string
          format: uuid
          nullable: true
          description: >
            When set to `null`, this rule is indicated to be the lowest priority
            rule.
    SystemSuggestionRule:
      title: SystemSuggestionRule
      description: Contains information about the system defined suggestion rule.
      allOf:
        - type: object
          required:
            - id
            - name
            - description
            - binding
            - active
            - auto_accept
            - action
          properties:
            id:
              type: string
              format: uuid
              example: 22f72bd1-2897-473e-9471-302de3ccf38b
              description: The suggestion rule ID.
              readOnly: true
            name:
              type: string
              description: The display name of the suggestion rule.
              minLength: 1
              maxLength: 120
            description:
              type: string
              nullable: true
              default: null
              minLength: 1
              maxLength: 2048
              description: The description of the suggestion rule
              example: Suggestion rule description
            binding:
              type: string
              description: The integration binding object name
              example: pagerduty_service
            active:
              type: boolean
              description: >-
                Determines if this suggestion rule should be evaluated when
                generating suggested actions.
            auto_accept:
              type: boolean
              description: >
                Determines if the suggested action should be applied
                automatically.

                - `true`: Suggested action will be applied automatically

                - `false`: Suggested action will not be automatically applied,
                user input required
            action:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - archive
                    - map
                    - create-or-map
                  description: The type of action this system suggestion rule performs
                  x-speakeasy-unknown-values: allow
              description: The action configuration for this system suggestion rule.
    SuggestionRulePayload:
      title: SuggestionRulePayload
      description: Payload to create a suggestion rule for an integration.
      type: object
      required:
        - name
        - binding
        - active
        - auto_accept
        - action
        - discovery_selector
      additionalProperties: false
      properties:
        name:
          type: string
          description: The display name of the suggestion rule
          minLength: 1
          maxLength: 120
        description:
          type: string
          nullable: true
          default: null
          minLength: 1
          maxLength: 2048
          description: The description of the suggestion rule
          example: Suggestion rule description
        binding:
          type: string
          description: The integration binding object name
          example: pagerduty_service
        active:
          type: boolean
          description: >-
            Determines if this suggestion rule should be evaluated when
            generating suggested actions.
        auto_accept:
          type: boolean
          description: >
            Determines if the suggested action should be applied automatically.

            - `true`: Suggested action will be applied automatically

            - `false`: Suggested action will not be automatically applied, user
            input required
        discovery_selector:
          type: string
          description: >
            A boolean string or JQ expression that must evaluate to a boolean
            value.

            Supports JQ expressions syntax on discovered entity's
            `integration_record` property.
          maxLength: 2048
          example: .gateway_service.tags | contains(["_KonnectDeployment:"])
        action:
          oneOf:
            - $ref: '#/components/schemas/ArchiveActionPayload'
            - $ref: '#/components/schemas/MapActionPayload'
            - $ref: '#/components/schemas/CreateOrMapAction'
        rank:
          oneOf:
            - $ref: '#/components/schemas/RankAfterPayload'
            - $ref: '#/components/schemas/RankBeforePayload'
    TestSuggestionRulePayload:
      title: TestSuggestionRulePayload
      description: >-
        Payload to test suggestion rule configuration against an integration
        record.
      type: object
      additionalProperties: false
      required:
        - binding
        - discovery_selector
        - action
        - integration_record
      properties:
        binding:
          type: string
          description: The integration binding object name
          example: pagerduty_service
        discovery_selector:
          type: string
          description: >
            A boolean string or JQ expression that must evaluate to a boolean
            value.

            Supports JQ expressions syntax on discovered entity's
            `integration_record` property.
          maxLength: 2048
          example: .gateway_service.tags | contains(["_KonnectDeployment:"])
        action:
          $ref: '#/components/schemas/SuggestedRuleAction'
        integration_record:
          type: object
          description: JSON object that may contain additional context about the entity.
          additionalProperties: true
          example:
            control_plane:
              id: 0a7647d1-483a-4817-a5ac-28937b511563
              name: control_plane_name
            gateway_service:
              id: 3fd1bff6-b60d-4c22-bb74-e4cac63196fb
              name: gateway_service_name
    SuggestionRule:
      title: SuggestionRule
      description: Contains information about the suggestion rule.
      allOf:
        - $ref: '#/components/schemas/SystemSuggestionRule'
        - type: object
          required:
            - created_at
            - updated_at
            - action
            - discovery_selector
          properties:
            created_at:
              $ref: '#/components/schemas/CreatedAt'
            updated_at:
              $ref: '#/components/schemas/UpdatedAt'
            discovery_selector:
              type: string
              description: >
                A boolean string or JQ expression that must evaluate to a
                boolean value.

                Supports JQ expressions syntax on discovered entity's
                `integration_record` property.
              example: .gateway_service.tags | contains(["_KonnectDeployment:"])
            action:
              $ref: '#/components/schemas/SuggestedRuleAction'
    TestSuggestionRule:
      title: TestSuggestionRule
      description: >-
        Contains evaluation results of a suggestion rule configuration against
        an integration record.
      type: object
      additionalProperties: false
      required:
        - evaluation
        - errors
      properties:
        evaluation:
          description: >-
            Evaluation result of suggesetion rule configuration against given
            integration record.
          type: object
          additionalProperties: false
          required:
            - matched
            - action
            - service_id
          properties:
            matched:
              description: >-
                Represents if the suggestion rule configuration matches the
                given integration record.
              type: boolean
            service_id:
              description: >-
                The identifier of a service the suggesiton rule configuration
                matches with the given integration record.
              type: string
              format: uuid
              nullable: true
              example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
            action:
              $ref: '#/components/schemas/SuggestedRuleActionEvaluated'
        errors:
          description: >-
            List of errors that occured when evaluating suggestion rule
            configuration against given integration record.
          type: array
          items:
            $ref: '#/components/schemas/SuggestionRuleErrorDetail'
    SuggestionRuleError:
      title: SuggestionRuleError
      description: Represents any errors which occured when evaluating a suggestion rule
      allOf:
        - type: object
          nullable: true
          required:
            - suggestion_rule_id
            - details
            - created_at
            - updated_at
          properties:
            id:
              description: |
                The id of the suggestion rule error
              type: string
              example: e4698717-7f0b-434d-aa16-a472089c2504
            resource_id:
              description: |
                The id of the related resource which generated this error
              type: string
              example: qLgnGlFp4iveGUFl
            suggestion_rule_id:
              description: |
                The id of the suggestion rule which generated this error
              type: string
              example: fd109d4a-e183-4488-98f2-10eab0964155
            details:
              description: >
                Details of the error generated from the related suggested rule
                when evaluated
              type: array
              items:
                $ref: '#/components/schemas/SuggestionRuleErrorDetail'
            created_at:
              $ref: '#/components/schemas/CreatedAt'
            updated_at:
              $ref: '#/components/schemas/UpdatedAt'
    SuggestedRuleActionEvaluated:
      oneOf:
        - $ref: '#/components/schemas/ArchiveActionPayload'
        - $ref: '#/components/schemas/IgnoreActionPayload'
        - $ref: '#/components/schemas/MapActionPayload'
        - $ref: '#/components/schemas/CreateActionEvaluated'
    SuggestionRuleErrorDetail:
      type: object
      required:
        - type
        - field
        - expression
        - message
      properties:
        type:
          type: string
          description: >
            The type of error that occured when evaluating suggestion rule
            configuration against given integration record.
              - `error`: represents a generic error.
              - `timeout`: timeout occured when evaluating jq expression
              - `invalid-expression`: jq expression could not be evaluated due to syntax error(s).
              - `result-not-boolean`: jq expression was not evaluated to a boolean
              - `result-not-string`: jq expression was not evaluated to a string
              - `unexpected-result`: jq expression was not evaluated to a result that could not be determined
              - `InvalidLabelKeyInputType`: Indicates the label key is of an invalid type (i.e. number or symbol)
              - `InvalidEmptyLabelKey`: Indicates the label key is empty
              - `InvalidLabelKeyFormat`: Indicates that the format of the label key is invalid, ex: "-bad-format-"
              - `LabelKeyHasReservedPrefix`: Indicates that the label key starts with a Kong-reserved key prefix, ex: "kong-test-key"
              - `MaxLabelKeyCharsExceeded`: Indicates that a label key exceeds the maximum number of allowed characters
              - `InvalidLabelValueInputType`: Indicates the label value is of an invalid type (i.e. number or symbol)
              - `InvalidEmptyLabelValue`: Indicates that the label value is empty
              - `InvalidLabelValueFormat`: Indicates that the format of the label value is invalid, ex: "-bad-format-"
              - `MaxLabelValueCharsExceeded`: Indicates that a label value exceeds the maximum number of allowed characters
              - `InvalidLabelsInputType`: Indicates that a collection of labels is of an invalid type (i.e. array instead of key-value object)
              - `MaxLabelsPerEntityExceeded`: Indicates that a collection of labels exceeds the maximum number of labels allowed for a given entity
              - `ConflictingKeys`: Indicates that labels keys are not unique
              - `InvalidName`: Indicates that the name is invalid
              - `InvalidDisplayName`: Indicates that the display name is invalid
              - `InvalidDescription`: Indicates that the description is invalid
              - `InvalidLabels`: Indicates that the labels are invalid
              - `InvalidMetadata`: Indicates that the metadata is invalid
        field:
          type: string
          description: >-
            The field from the payload given which is responsible for this
            error.
        expression:
          type: string
          description: >-
            Represents the resolved or unresolved JQ expression which failed
            validation
        message:
          type: string
          description: >-
            Details of the error which occured when evaluating suggestion rule
            configuration against given integration record.
    EventsAttributesFieldFilter:
      title: EventsAttributesFieldFilter
      description: >
        Filters the events by values contained within the `attributes` field.
        Filters must use dot-notation to identify

        the details property that will be used to filter the results.
      oneOf:
        - $ref: '#/components/schemas/StringFieldFilter'
    BaseServiceEventsFilterParameters:
      title: BaseServiceEventsFilterParameters
      type: object
      properties:
        type:
          $ref: '#/components/schemas/StringFieldFilter'
        ts:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        integration.name:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
        integration.instance.id:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilterExact'
        integration.instance.name:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
        integration.instance.display_name:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
        binding:
          $ref: '#/components/schemas/StringFieldFilterExact'
        attributes:
          $ref: '#/components/schemas/EventsAttributesFieldFilter'
        detail:
          $ref: '#/components/schemas/StringFieldFilter'
        actor.type:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
        actor.id:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
        actor.name:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
    IntegrationEventsFilterParameters:
      title: IntegrationEventsFilterParameters
      type: object
      additionalProperties: false
      allOf:
        - $ref: '#/components/schemas/BaseServiceEventsFilterParameters'
        - type: object
          properties:
            service_id:
              $ref: '#/components/schemas/StringFieldFilter'
    CatalogServiceIntegrationEventsFilterParameters:
      title: ServiceEventsFilterParameters
      type: object
      additionalProperties: false
      allOf:
        - $ref: '#/components/schemas/BaseServiceEventsFilterParameters'
    IntegrationEventActor:
      title: Integration Event Actor
      type: object
      description: >
        Information about the entity that triggered the integration event in the
        external system.
      additionalProperties: false
      nullable: true
      properties:
        type:
          type: string
          nullable: true
          description: >-
            Type of the entity that triggered the integration event in the
            external system.
          example: user
        id:
          type: string
          description: >-
            Identifier of the entity that triggered the integration event in the
            external system.
          example: PLH1HKV
        name:
          type: string
          nullable: true
          description: >-
            Name of the entity that triggered the integration event in the
            external system.
          example: John Doe
      required:
        - type
        - id
    IntegrationEvent:
      title: IntegrationEvent
      type: object
      description: Event on a resource binding for an integration.
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of the integration event.
          example: a90c4c20-bbd3-4229-8340-8b18e38cb1e5
          readOnly: true
        type:
          type: string
          description: Type of the integration event.
          example: incident.triggered
        ts:
          type: string
          format: date-time
          description: Date the integration event occurred at.
          example: '2024-01-01T00:00:00Z'
        service_id:
          type: string
          format: uuid
          description: Identifier of the service the integration event corresponds to.
          example: b268ca70-9b75-4355-8726-63788463a66f
          readOnly: true
        deduplication_id:
          type: string
          description: >-
            Idempotent processing identifier of the integration event on
            ingestion.
          example: 1d34191ebfe305a56bf4f3303d1a8dcf
        resource_id:
          type: string
          description: Identifier of the resource the integration event corresponds to.
          example: 8_l-yZ8UQtc_e6Pp
        actor:
          $ref: '#/components/schemas/IntegrationEventActor'
        attributes:
          type: object
          description: >-
            Additional attributes of the integration event, specific to the
            binding resource and integration.
          additionalProperties: true
          example:
            service_id: PLK33TY
            incident_id: PGR0VU2
            escalation_policy_id: P005NFS
            priority_id: P9BO35Z
            urgency: low
            title: Example API Service Incident
            html_url: https://acme.pagerduty.com/incidents/PGR0VU2
        integration:
          $ref: '#/components/schemas/IntegrationRef'
        binding:
          type: string
          description: Binding resource the integration event corresponds to.
          example: pagerduty_service
        detail:
          type: string
          nullable: true
          description: Additional detail about the integration event.
          example: Example API Service Incident
        link_html:
          type: string
          nullable: true
          description: URL to the web-page for the source of the integration event.
          example: https://acme.pagerduty.com/incidents/PGR0VU2
      required:
        - id
        - type
        - ts
        - service_id
        - deduplication_id
        - resource_id
        - actor
        - attributes
        - integration
        - binding
        - detail
        - link_html
    CreateIntegrationEvent:
      type: object
      description: >
        DTO object for creating an integration event for an integration. `type`
        and `binding` are parameters restricted by the

        integration the event is being created for, found in the related
        integration manifest.
      additionalProperties: false
      properties:
        type:
          type: string
          description: Type of the event.
          example: incident.triggered
        ts:
          type: string
          format: date-time
          description: Date the event occurred at.
          example: '2024-01-01T00:00:00Z'
        deduplication_id:
          type: string
          description: Idempotent processing identifier of the event on ingestion.
          example: 1d34191ebfe305a56bf4f3303d1a8dcf
        actor:
          $ref: '#/components/schemas/IntegrationEventActor'
        attributes:
          type: object
          description: >-
            Additional attributes of the event, specific to the binding resource
            and integration.
          additionalProperties: true
          example:
            service_id: PLK33TY
            incident_id: PGR0VU2
            escalation_policy_id: P005NFS
            priority_id: P9BO35Z
            urgency: low
            title: Example API Service Incident
            html_url: https://acme.pagerduty.com/incidents/PGR0VU2
        data:
          type: object
          description: >
            JSON object containing the data which binds the integration to a
            service. Must match the schema defined for

            the integration binding, referenced by the `binding` parameter.
          additionalProperties: true
          example:
            pagerduty_service_id: PLK33TY
        binding:
          type: string
          description: Binding resource the event corresponds to.
          example: pagerduty_service
        detail:
          type: string
          nullable: true
          description: Additional detail about the event.
          example: Example API Service Incident
        link_html:
          type: string
          nullable: true
          description: URL to the web-page for the source of the event.
          example: https://acme.pagerduty.com/incidents/PGR0VU2
      required:
        - type
        - binding
        - ts
        - deduplication_id
        - actor
        - attributes
        - data
        - detail
        - link_html
    DocumentContentTypeEnum:
      type: string
