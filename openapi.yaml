    BillingPlan:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
        - key
        - version
        - currency
        - billing_cadence
        - status
        - phases
      properties:
        id:
          type: string
          pattern: ^[0-7][0-9A-HJKMNP-TV-Z]{25}$
          description: ULID (Universally Unique Lexicographically Sortable Identifier).
          title: ULID
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
        description:
          type: string
          maxLength: 1024
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          type: string
          format: date-time
          description: An ISO-8601 timestamp representation of entity creation date.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        updated_at:
          type: string
          format: date-time
          description: An ISO-8601 timestamp representation of entity last update date.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          description: An ISO-8601 timestamp representation of entity deletion date.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        key:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^[a-z0-9]+(?:_[a-z0-9]+)*$
          description: >-
            A key is a semi-unique string that is used to identify the plan. It
            is used to

            reference the latest `active` version of the plan and is unique with
            the version

            number.
          title: Key
          example: resource_key
        version:
          type: integer
          minimum: 1
          description: >-
            Plans are versioned to allow you to make changes without affecting
            running

            subscriptions.
          title: Version
          default: 1
          readOnly: true
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: ^[A-Z]{3}$
          description: The currency code of the plan.
          example: USD
          title: Currency
        billing_cadence:
          type: string
          pattern: >-
            ^P(?:\d+(?:\.\d+)?Y)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?W)?(?:\d+(?:\.\d+)?D)?(?:T(?:\d+(?:\.\d+)?H)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?S)?)?$
          description: The billing cadence for subscriptions using this plan.
          title: Billing cadence
          example: P1Y
          format: ISO8601
        pro_rating_enabled:
          type: boolean
          description: Whether pro-rating is enabled for this plan.
          title: Pro-rating enabled
          default: true
        effective_from:
          type: string
          format: date-time
          description: >-
            The date and time when the plan becomes `active`. When not
            specified, the plan

            is in `draft` status.
          title: Effective start date
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        effective_to:
          type: string
          format: date-time
          description: >-
            A scheduled date and time when the plan becomes `archived`. When not
            specified,

            the plan is in `active` status indefinitely.
          title: Effective end date
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        status:
          type: string
          enum:
            - draft
            - active
            - archived
            - scheduled
          description: >-
            The status of the plan. Computed based on the effective start and
            end dates:


            - `draft`: `effective_from` is not set.

            - `scheduled`: `now < effective_from`.

            - `active`: `effective_from <= now` and (`effective_to` is not set
            or

            `now < effective_to`).

            - `archived`: `effective_to <= now`.
          title: Status
          readOnly: true
          x-speakeasy-unknown-values: allow
        phases:
          type: array
          items:
            $ref: '#/components/schemas/BillingPlanPhase'
          minItems: 1
          description: >-
            The plan phases define the pricing ramp for a subscription. A phase
            switch

            occurs only at the end of a billing period. At least one phase is
            required.
          title: Plan phases
        settlement_mode:
          type: string
          enum:
            - credit_then_invoice
            - credit_only
          description: >-
            Settlement mode for plan.


            Values:


            - `credit_then_invoice`: Credits are applied first, then any
            remainder is

            invoiced.

            - `credit_only`: Usage is settled exclusively against credits.
          title: Settlement Mode
          default: credit_then_invoice
          readOnly: true
          x-speakeasy-unknown-values: allow
        validation_errors:
          type: array
          items:
            $ref: '#/components/schemas/ProductCatalogValidationError'
          description: >-
            List of validation errors in `draft` state that prevent the plan
            from being

            published.
          title: Validation errors
          readOnly: true
      additionalProperties: false
      description: Plans provide a template for subscriptions.
    BillingPlanPhase:
      type: object
      required:
        - name
        - key
        - rate_cards
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
        description:
          type: string
          maxLength: 1024
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
        labels:
          $ref: '#/components/schemas/Labels'
        key:
          $ref: '#/components/schemas/ResourceKey'
        duration:
          type: string
          pattern: >-
            ^P(?:\d+(?:\.\d+)?Y)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?W)?(?:\d+(?:\.\d+)?D)?(?:T(?:\d+(?:\.\d+)?H)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?S)?)?$
          description: >-
            The duration of the phase. When not specified, the phase runs
            indefinitely. Only

            the last phase may omit the duration.
          title: Duration
          example: P1Y
          format: ISO8601
        rate_cards:
          type: array
          items:
            $ref: '#/components/schemas/BillingRateCard'
          description: The rate cards of the plan.
          title: Rate cards
      additionalProperties: false
      description: >-
        The plan phase or pricing ramp allows changing a plan's rate cards over
        time as

        a subscription progresses.
    BillingPriceFlat:
      type: object
      required:
        - type
        - amount
      properties:
        type:
          type: string
          enum:
            - flat
          description: The type of the price.
          title: Type
        amount:
          type: string
          pattern: ^\-?[0-9]+(\.[0-9]+)?$
          description: The amount of the flat price.
          title: Amount
      additionalProperties: false
      description: Flat price.
    BillingPriceFree:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - free
          description: The type of the price.
          title: Type
      additionalProperties: false
      description: Free price.
    BillingPriceGraduated:
      type: object
      required:
        - type
        - tiers
      properties:
        type:
          type: string
          enum:
            - graduated
          description: The type of the price.
          title: Type
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/BillingPriceTier'
          minItems: 1
          description: The tiers of the graduated price. At least one tier is required.
          title: Tiers
      additionalProperties: false
      description: >-
        Graduated tiered price.


        Each tier's rate applies only to the usage within that tier. Pricing can
        change

        as cumulative usage crosses tier boundaries.


        When UnitConfig is present on the rate card, tier boundaries
        (up_to_amount) are

        expressed in converted billing units.
    BillingPriceTier:
      type: object
      properties:
        up_to_amount:
          type: string
          pattern: ^\-?[0-9]+(\.[0-9]+)?$
          description: >-
            Up to and including this quantity will be contained in the tier. If
            undefined,

            the tier is open-ended (the last tier).
          title: Up to quantity
        flat_price:
          type: object
          required:
            - type
            - amount
          properties:
            type:
              type: string
              enum:
                - flat
              description: The type of the price.
              title: Type
            amount:
              type: string
              pattern: ^\-?[0-9]+(\.[0-9]+)?$
              description: The amount of the flat price.
              title: Amount
          additionalProperties: false
          description: >-
            The flat price component of the tier. Charged once when the tier is
            entered.
          title: Flat price component
        unit_price:
          type: object
          required:
            - type
            - amount
          properties:
            type:
              type: string
              enum:
                - unit
              description: The type of the price.
              title: Type
            amount:
              type: string
              pattern: ^\-?[0-9]+(\.[0-9]+)?$
              description: The amount of the unit price.
              title: Amount
          additionalProperties: false
          description: >-
            The unit price component of the tier. Charged per billing unit
            within the tier.
          title: Unit price component
      additionalProperties: false
      description: >-
        A price tier used in graduated and volume pricing.


        At least one price component (flat_price or unit_price) must be set.
        When

        UnitConfig is present on the rate card, up_to_amount is expressed in
        converted

        billing units.
    BillingPriceUnit:
      type: object
      required:
        - type
        - amount
      properties:
        type:
          type: string
          enum:
            - unit
          description: The type of the price.
          title: Type
        amount:
          type: string
          pattern: ^\-?[0-9]+(\.[0-9]+)?$
          description: The amount of the unit price.
          title: Amount
      additionalProperties: false
      description: >-
        Unit price.


        Charges a fixed rate per billing unit. When UnitConfig is present on the
        rate

        card, billing units are the converted quantities (e.g. GB instead of
        bytes).
    BillingPriceVolume:
      type: object
      required:
        - type
        - tiers
      properties:
        type:
          type: string
          enum:
            - volume
          description: The type of the price.
          title: Type
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/BillingPriceTier'
          minItems: 1
          description: The tiers of the volume price. At least one tier is required.
          title: Tiers
      additionalProperties: false
      description: >-
        Volume tiered price.


        The maximum quantity within a period determines the per-unit price for
        all units

        in that period.


        When UnitConfig is present on the rate card, tier boundaries
        (up_to_amount) are

        expressed in converted billing units.
    BillingProfile:
