          $ref: '#/components/schemas/FetchKongIdentityPrincipal'
    VirtualClusterAuthenticationOauthBearer:
      type: object
      description: Oauth Bearer authentication scheme for the virtual cluster.
      additionalProperties: false
      required:
        - type
        - mediation
      properties:
        type:
          type: string
          const: oauth_bearer
        mediation:
          type: string
          enum:
            - passthrough
            - validate_forward
            - terminate
          description: >
            Methods to mediate authentication:

            * passthrough - pass authentication from the client through proxy to
            the backend cluster without any kind of
              validation
            * validate_forward - pass authentication from the client through
