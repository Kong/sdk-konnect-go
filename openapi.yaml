    BillingRateCard:
      description: A rate card defines the pricing and entitlement of a feature or service.
      type: object
      properties:
        name:
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
          type: string
          maxLength: 1024
        labels:
          $ref: '#/components/schemas/Labels'
        key:
          $ref: '#/components/schemas/ResourceKey'
        feature:
          description: The feature associated with the rate card.
          type: object
          additionalProperties: false
          properties:
            id:
              $ref: '#/components/schemas/ULID'
          required:
            - id
          title: Feature reference
        billing_cadence:
          description: |-
            The billing cadence of the rate card. When null, the charge is one-time
            (non-recurring). Only valid for flat prices.
          type: string
          format: ISO8601
          example: P1Y
          pattern: '^P(?:\d+(?:\.\d+)?Y)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?W)?(?:\d+(?:\.\d+)?D)?(?:T(?:\d+(?:\.\d+)?H)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?S)?)?$'
          title: Billing cadence
        price:
          description: The price of the rate card.
          type: object
          discriminator:
            propertyName: type
            mapping:
              free: '#/components/schemas/BillingPriceFree'
              flat: '#/components/schemas/BillingPriceFlat'
              unit: '#/components/schemas/BillingPriceUnit'
              graduated: '#/components/schemas/BillingPriceGraduated'
              volume: '#/components/schemas/BillingPriceVolume'
          oneOf:
            - $ref: '#/components/schemas/BillingPriceFree'
            - $ref: '#/components/schemas/BillingPriceFlat'
            - $ref: '#/components/schemas/BillingPriceUnit'
            - $ref: '#/components/schemas/BillingPriceGraduated'
            - $ref: '#/components/schemas/BillingPriceVolume'
          title: Price
        unit_config:
          description: |-
            Unit conversion configuration for the rate card.

            Synthesized on read for plans authored with v1 dynamic or package prices:
            dynamic prices map to a unit price with a multiply unit config, and package
            prices map to a unit price with a divide unit config.

            Accepted on create and update only when the UnitConfig feature is enabled on the
            deployment; otherwise rejected.
          type: object
          additionalProperties: false
          properties:
            operation:
              description: The arithmetic operation to apply to the raw metered quantity.
              type: string
              enum:
                - divide
                - multiply
              title: Conversion operation
              x-speakeasy-unknown-values: allow
            conversion_factor:
              description: |-
                The factor used in the conversion operation.

                - For `divide`: `converted = raw / conversionFactor`.
                - For `multiply`: `converted = raw × conversionFactor`.

                Must be a positive non-zero value.
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
              title: Conversion factor
            rounding:
              description: |-
                The rounding mode applied to the converted quantity for invoicing.

                Defaults to none (no rounding). Entitlement checks always use the precise
                (unrounded) value.
              type: string
              default: none
              enum:
                - ceiling
                - floor
                - half_up
                - none
              title: Rounding mode
              x-speakeasy-unknown-values: allow
            precision:
              description: |-
                The number of decimal places to retain after rounding.

                Only meaningful when rounding is not "none". Defaults to 0 (round to whole
                numbers).
              type: integer
              default: 0
              title: Rounding precision (decimal places)
            display_unit:
              description: |-
                A human-readable label for the converted unit shown on invoices and in the
                customer portal (e.g., "GB", "hours", "M tokens").

                Optional. When omitted, no unit label is rendered.
              type: string
              title: Display unit label
          required:
            - operation
            - conversion_factor
          title: Unit config
        payment_term:
          description: |-
            The payment term of the rate card. In advance payment term can only be used for
            flat prices.
          type: string
          default: in_arrears
          enum:
            - in_advance
            - in_arrears
          title: Payment term
          x-speakeasy-unknown-values: allow
        commitments:
          description: |-
            Spend commitments for this rate card. Only applicable to usage-based prices
            (unit, graduated, volume).
          type: object
          additionalProperties: false
          properties:
            minimum_amount:
              description: The customer is committed to spend at least the amount.
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
              title: Minimum amount
            maximum_amount:
              description: The customer is limited to spend at most the amount.
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
              title: Maximum amount
          title: Commitments
        discounts:
          description: The discounts of the rate card.
          type: object
          additionalProperties: false
          properties:
            percentage:
              description: Percentage discount applied to the price (0–100).
              type: number
              maximum: 100
              minimum: 0
            usage:
              description: |-
                Number of usage units granted free before billing starts. Only applies to
                usage-based lines (not flat fees). Usage is treated as zero until this amount is
                exhausted.
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
          title: Discounts
        tax_config:
          description: The tax config of the rate card.
          type: object
          additionalProperties: false
          properties:
            behavior:
              $ref: '#/components/schemas/BillingTaxBehavior'
            code:
              $ref: '#/components/schemas/TaxCodeReference'
          required:
            - code
          title: Tax config
        entitlement:
          description: |-
            The entitlement template granted to subscribers of a plan or addon containing
            this rate card. Requires `feature` to be set.
          type: object
          discriminator:
            propertyName: type
            mapping:
              metered: '#/components/schemas/BillingRateCardMeteredEntitlement'
              static: '#/components/schemas/BillingRateCardStaticEntitlement'
              boolean: '#/components/schemas/BillingRateCardBooleanEntitlement'
          oneOf:
            - $ref: '#/components/schemas/BillingRateCardMeteredEntitlement'
            - $ref: '#/components/schemas/BillingRateCardStaticEntitlement'
            - $ref: '#/components/schemas/BillingRateCardBooleanEntitlement'
          title: Entitlement template
      additionalProperties: false
      required:
        - name
        - key
        - price
    BillingRateCardBooleanEntitlement:
      description: The entitlement template of a boolean entitlement.
      type: object
      properties:
        type:
          description: The type of the entitlement template.
          type: string
          enum:
            - boolean
          title: Type
      additionalProperties: false
      required:
        - type
    BillingRateCardMeteredEntitlement:
      description: The entitlement template of a metered entitlement.
      type: object
      properties:
        type:
          description: The type of the entitlement template.
          type: string
          enum:
            - metered
          title: Type
        is_soft_limit:
          description: |-
            If soft limit is true, the subject can use the feature even if the entitlement
            is exhausted; access remains granted.
          type: boolean
          default: false
          title: Soft limit
        limit:
          description: |-
            The amount of usage granted each usage period, in the feature's unit. Usage is
            counted against this allowance and the balance resets every usage period. When
            `is_soft_limit` is true the subject keeps access after the limit is reached;
            otherwise access is denied once the allowance is exhausted.
          type: number
          format: double
          minimum: 0
          title: Usage limit
        usage_period:
          description: |-
            The reset interval of the metered entitlement in ISO8601 format. Defaults to the
            billing cadence of the rate card.
          type: string
          format: ISO8601
          example: P1Y
          pattern: '^P(?:\d+(?:\.\d+)?Y)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?W)?(?:\d+(?:\.\d+)?D)?(?:T(?:\d+(?:\.\d+)?H)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?S)?)?$'
          title: Usage period
      additionalProperties: false
      required:
        - type
    BillingRateCardProrationMode:
      description: |-
        The proration mode of the rate card.

        Values:

        - `no_proration`: No proration.
        - `prorate_prices`: Prorate the price based on the time remaining in the billing
        period.
      type: string
      enum:
        - no_proration
        - prorate_prices
      x-speakeasy-unknown-values: allow
    BillingRateCardStaticEntitlement:
      description: The entitlement template of a static entitlement.
      type: object
      properties:
        type:
          description: The type of the entitlement template.
          type: string
          enum:
            - static
          title: Type
        config:
          description: |-
            The entitlement config as a JSON object. Returned when checking entitlement
            access; useful for configuring fine-grained access settings implemented in your
            own system.
          title: Config
      additionalProperties: false
      required:
        - type
        - config
    BillingSubscription:
      description: Subscription.
      type: object
      properties:
        id:
          description: ULID (Universally Unique Lexicographically Sortable Identifier).
          type: string
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          readOnly: true
          title: ULID
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          description: An ISO-8601 timestamp representation of entity creation date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        updated_at:
          description: An ISO-8601 timestamp representation of entity last update date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        deleted_at:
          description: An ISO-8601 timestamp representation of entity deletion date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        customer_id:
          description: The customer ID of the subscription.
          type: string
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          readOnly: true
          title: Customer ID
        plan_id:
          description: The plan ID of the subscription. Set if subscription is created from a plan.
          type: string
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          readOnly: true
          title: Plan ID
        billing_anchor:
          description: |-
            A billing anchor is the fixed point in time that determines the subscription's
            recurring billing cycle. It affects when charges occur and how prorations are
            calculated. Common anchors:

            - Calendar month (1st of each month): `2025-01-01T00:00:00Z`
            - Subscription anniversary (day customer signed up)
            - Custom date (customer-specified day)
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: Billing anchor
        status:
          description: The status of the subscription.
          type: string
          enum:
            - active
            - inactive
            - canceled
            - scheduled
          readOnly: true
          title: Status
          x-speakeasy-unknown-values: allow
        settlement_mode:
          description: |-
            Settlement mode for billing.

            Values:

            - `credit_then_invoice`: Credits are applied first, then any remainder is
            invoiced.
            - `credit_only`: Usage is settled exclusively against credits.
          type: string
          enum:
            - credit_then_invoice
            - credit_only
          title: Settlement Mode
          x-speakeasy-unknown-values: allow
      additionalProperties: false
      required:
        - id
        - created_at
        - updated_at
        - customer_id
        - billing_anchor
        - status
