    BillingAppExternalInvoicing:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
        - type
        - definition
        - status
        - enable_draft_sync_hook
        - enable_issuing_sync_hook
      properties:
        id:
          type: string
          pattern: ^[0-7][0-9A-HJKMNP-TV-Z]{25}$
          description: ULID (Universally Unique Lexicographically Sortable Identifier).
          title: ULID
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
        description:
          type: string
          maxLength: 1024
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          type: string
          format: date-time
          description: An ISO-8601 timestamp representation of entity creation date.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        updated_at:
          type: string
          format: date-time
          description: An ISO-8601 timestamp representation of entity last update date.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          description: An ISO-8601 timestamp representation of entity deletion date.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        type:
          type: string
          enum:
            - external_invoicing
          description: The app type.
          readOnly: true
        definition:
          type: object
          required:
            - type
            - name
            - description
          properties:
            type:
              type: string
              enum:
                - sandbox
                - stripe
                - external_invoicing
              description: Type of the app.
              readOnly: true
              x-speakeasy-unknown-values: allow
            name:
              type: string
              description: Name of the app.
              readOnly: true
            description:
              type: string
              description: Description of the app.
              readOnly: true
          additionalProperties: false
          description: The app catalog definition that this installed app is based on.
          example:
            type: stripe
            name: Stripe
            description: Stripe integration allows you to collect payments with Stripe.
          readOnly: true
        status:
          type: string
          enum:
            - ready
            - unauthorized
          description: Status of the app connection.
          readOnly: true
          x-speakeasy-unknown-values: allow
        enable_draft_sync_hook:
          type: boolean
          description: >-
            Enable draft synchronization hook.


            When enabled, invoices will pause at the draft state and wait for
            the

            integration to call the draft synchronized endpoint before
            progressing to the

            issuing state. This allows the external system to validate and
            prepare the

            invoice data.


            When disabled, invoices automatically progress through the draft
            state based on

            the configured workflow timing.
        enable_issuing_sync_hook:
          type: boolean
          description: >-
            Enable issuing synchronization hook.


            When enabled, invoices will pause at the issuing state and wait for
            the

            integration to call the issuing synchronized endpoint before
            progressing to the

            issued state. This ensures the external invoicing system has
            successfully

            created and finalized the invoice before it is marked as issued.


            When disabled, invoices automatically progress through the issuing
            state and are

            immediately marked as issued.
      additionalProperties: false
      description: >-
        External Invoicing app enables integration with third-party invoicing or
        payment

        system.


        The app supports a bi-directional synchronization pattern where
        OpenMeter

        Billing manages the invoice lifecycle while the external system handles
        invoice

        presentation and payment collection.


        Integration workflow:


        1. The billing system creates invoices and transitions them through
        lifecycle

        states (draft → issuing → issued)

        2. The integration receives webhook notifications about invoice state
        changes

        3. The integration calls back to provide external system IDs and
        metadata

        4. The integration reports payment events back via the payment status
        API


        State synchronization is controlled by hooks that pause invoice
        progression

        until the external system confirms synchronization via API callbacks.
