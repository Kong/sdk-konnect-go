        - status
        - created_at
        - updated_at
    VulnerabilityScanKey:
      title: VulnerabilityScanKey
      type: string
      description: >
        Machine-usable value to correlate scans (and their vulnerabilities) on a
        given resource. This value is then

        used to determine vulnerabilities resolved/fixed between subsequent
        scans on the same resource.
      example: namespaces/foo:pods/bar-api
    VulnerabilityScanTool:
      type: string
      enum:
        - grype
        - trivy
      example: trivy
      x-speakeasy-unknown-values: allow
    VulnerabilityScanToolMetadata:
      type: object
      properties:
        name:
          type: string
          example: Trivy
        version:
          type: string
          nullable: true
          example: 1.0.0
      required:
        - name
        - version
    VulnerabilityScanCatalogReference:
      type: object
      oneOf:
        - $ref: '#/components/schemas/ServiceVulnerabilityScanCatalogReference'
    ServiceVulnerabilityScanCatalogReference:
      type: object
      additionalProperties: false
      properties:
        service:
          type: object
          additionalProperties: false
          properties:
            id:
              type: string
              format: uuid
              example: b72008a7-1a8b-42d7-9691-ed88cbc1e61f
            name:
              type: string
              example: user-svc
            display_name:
              type: string
              example: User Service
          required:
            - id
            - name
            - display_name
      required:
        - service
    VulnerabilityScanStatus:
      title: VulnerabilityScanStatus
      type: string
      enum:
        - in_progress
        - completed
        - failed
      x-speakeasy-unknown-values: allow
    ServiceVulnerabilityFilterParameters:
      title: ServiceVulnerabilityFilterParameters
