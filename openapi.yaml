            `developer_registration` form, supplied as a flat map keyed by field
            `name` (the field's non-built-in slug). Values match each field's
            input type. Built-in fields (`full_name`, `email`) come in via the
            top-level body properties — not here. Silently ignored when no
            developer registration form is active on the portal.
