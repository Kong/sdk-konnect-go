    ImagePNGDataUri:
      title: ImagePNGDataUri
      type: string
      format: uri
      pattern: >-
        ^data:image/png(;base64)?,(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$
      description: >-
        must be a data URL with base64 PNG image data, e.g.,
        data:image/png;base64,<BASE64_IMAGE_DATA>
      x-validation-message: >-
        must be a data URL with base64 PNG image data, e.g.,
        data:image/png;base64,<BASE64_IMAGE_DATA>
      example: data:image/png,YW5faW1hZ2VfZmlsZQ==
    ImageJPGDataUri:
      title: ImageJPGDataUri
      type: string
      format: uri
      pattern: >-
        ^data:image/jpeg(;base64)?,(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$
      description: >-
        must be a data URL with base64 JPEG image data, e.g.,
        data:image/jpeg;base64,<BASE64_IMAGE_DATA>
      x-validation-message: >-
        must be a data URL with base64 JPEG image data, e.g.,
        data:image/jpeg;base64,<BASE64_IMAGE_DATA>
      example: data:image/jpeg,YW5faW1hZ2VfZmlsZQ==
    ImageSVGDataUri:
      title: ImageSVGDataUri
      type: string
      format: uri
      pattern: >-
        ^data:image/svg\+xml(;base64)?,(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$
      description: >-
        must be a data URL with base64 SVG image data, e.g.,
        data:image/svg\+xml;base64,<BASE64_IMAGE_DATA>
      x-validation-message: >-
        must be a data URL with base64 SVG image data, e.g.,
        data:image/svg\+xml;base64,<BASE64_IMAGE_DATA>
      example: data:image/svg+xml,YW5faW1hZ2VfZmlsZQ==
    EntityType:
