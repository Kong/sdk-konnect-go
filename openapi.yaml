    SuggestedResourceActionFilterParameters:
      title: SuggestedResourceActionFilterParameters
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/StringFieldFilterExact'
        suggestion_rule_id:
          $ref: '#/components/schemas/StringFieldFilterExact'
        entity_name:
          $ref: '#/components/schemas/StringFieldFilter'
        service_id:
          $ref: '#/components/schemas/StringFieldFilterExact'
        integration.name:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
        integration.instance.name:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
        integration.instance.display_name:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilter'
        integration.instance.id:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilterExact'
        ignored:
          $ref: '#/components/schemas/BooleanFieldFilter'
        action.type:
          oneOf:
            - $ref: '#/components/schemas/StringFieldFilterExact'
        created_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        updated_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
    SuggestedResourceActionObject:
      title: SuggestedResourceAction
      description: Contains information about a suggested resource action
      allOf:
        - type: object
          required:
            - id
            - integration
            - suggestion_rule_id
            - entity_name
            - service_id
            - action
            - ignored
          properties:
            id:
              description: The suggested resource action rule ID.
              type: string
              example: 76ca0689-f08e-4c04-b2a6-4c992d89d554
            integration:
              $ref: '#/components/schemas/IntegrationRef'
            suggestion_rule_id:
              description: >-
                The identifier of the suggestion rule that generated this
                suggested resource action.
              type: string
              format: uuid
              nullable: true
              example: 22f72bd1-2897-473e-9471-302de3ccf38b
            entity_name:
              type: string
              description: >-
                The entity name of the discovered entity associated to this
                suggested action.
              example: My Service
            service_id:
              description: >-
                The identifier of the service this suggested resource action may
                act on.
              type: string
              format: uuid
              nullable: true
              example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
            ignored:
              description: |
                Determines if this suggested action has been ignored or not.
                - `true`: Suggested action has been ignored
                - `false`: Suggested action is ready to be accepted or ignored
              type: boolean
              example: false
            action:
              $ref: '#/components/schemas/SuggestedResourceAction'
            created_at:
              $ref: '#/components/schemas/CreatedAt'
            updated_at:
              $ref: '#/components/schemas/UpdatedAt'
    UpdateSuggestedResourceAction:
