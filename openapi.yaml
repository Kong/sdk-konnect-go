    CreateVirtualClusterRequest:
      description: The request schema for creating a virtual cluster.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              name:
                $ref: '#/components/schemas/VirtualClusterName'
              description:
                type: string
                description: A human-readable description of the virtual cluster.
                maxLength: 512
                default: ''
              destination:
                $ref: '#/components/schemas/BackendClusterReferenceModify'
              authentication:
                $ref: '#/components/schemas/VirtualClusterAuthenticationSchemes'
              namespace:
                $ref: '#/components/schemas/VirtualClusterNamespace'
              topic_aliases:
                x-min-runtime-version: '1.2'
                type: array
                description: >-
                  Topic aliases allow exposing backend topics under additional
                  names.

                  An alias creates a new entry point to the same physical data.

                  The alias `topic` field references namespace-visible names (if
                  namespace is configured).

                  Aliases are independent of namespace and can be used without
                  it.


                  **Requires a minimum runtime version of `1.2`**.
                items:
                  $ref: '#/components/schemas/VirtualClusterTopicAlias'
              acl_mode:
                $ref: '#/components/schemas/VirtualClusterACLMode'
              dns_label:
                $ref: '#/components/schemas/VirtualClusterDNSLabel'
              labels:
                $ref: '#/components/schemas/Labels'
            required:
              - name
              - destination
              - authentication
              - dns_label
              - acl_mode
