        usage_period:
          type: string
          pattern: >-
            ^P(?:\d+(?:\.\d+)?Y)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?W)?(?:\d+(?:\.\d+)?D)?(?:T(?:\d+(?:\.\d+)?H)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?S)?)?$
          description: >-
            The reset interval of the metered entitlement in ISO8601 format.
            Defaults to the

            billing cadence of the rate card.
          title: Usage period
          example: P1Y
          format: ISO8601
      additionalProperties: false
      description: The entitlement template of a metered entitlement.
    BillingRateCardProrationMode:
      type: string
      enum:
        - no_proration
        - prorate_prices
      description: >-
        The proration mode of the rate card.


        Values:


        - `no_proration`: No proration.

