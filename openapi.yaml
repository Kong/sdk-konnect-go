              $ref: '#/components/schemas/NumericFieldFilter'
    VulnerabilityServiceFilterParameters:
      title: VulnerabilityServiceFilterParameters
      type: object
      allOf:
        - type: object
          properties:
            name:
              $ref: '#/components/schemas/StringFieldFilter'
            display_name:
              $ref: '#/components/schemas/StringFieldFilter'
            labels:
              $ref: '#/components/schemas/LabelsFieldFilter'
            vulnerability.state:
              $ref: '#/components/schemas/StringFieldFilterExact'
            vulnerability.opened_at:
              $ref: '#/components/schemas/DateTimeFieldFilter'
            vulnerability.reopened_at:
              $ref: '#/components/schemas/DateTimeFieldFilter'
            vulnerability.last_opened_at:
              $ref: '#/components/schemas/DateTimeFieldFilter'
            vulnerability.dismissed_at:
              $ref: '#/components/schemas/DateTimeFieldFilter'
            vulnerability.fixed_at:
