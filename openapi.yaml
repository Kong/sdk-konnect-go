        workflow:
          type: object
          properties:
            collection:
              type: object
              properties:
                alignment:
                  type: object
                  oneOf:
                    - *ref_15
                    - *ref_16
                  discriminator:
                    propertyName: type
                    mapping:
                      subscription: >-
                        #/components/schemas/BillingWorkflowCollectionAlignmentSubscription
                      anchored: >-
                        #/components/schemas/BillingWorkflowCollectionAlignmentAnchored
                  description: >-
                    The alignment for collecting the pending line items into an
                    invoice.
                  default:
                    type: subscription
                interval:
                  type: string
                  format: ISO8601
                  description: >-
                    This grace period can be used to delay the collection of the
                    pending line items

                    specified in alignment.


                    This is useful, in case of multiple subscriptions having
                    slightly different

                    billing periods.
                  example: P1D
                  default: PT1H
              additionalProperties: false
              description: The collection settings for this workflow
              title: Workflow collection settings
            invoicing:
              type: object
              properties:
                auto_advance:
                  type: boolean
                  description: >-
                    Whether to automatically issue the invoice after the
                    draftPeriod has passed.
                  default: true
                draft_period:
                  type: string
                  format: ISO8601
                  description: >-
                    The period for the invoice to be kept in draft status for
                    manual reviews.
                  example: P1D
                  default: P0D
                progressive_billing:
                  type: boolean
                  description: Should progressive billing be allowed for this workflow?
                  default: true
                subscription_end_proration_mode:
                  type: string
                  enum:
                    - bill_full_period
                    - bill_actual_period
                  description: >-
                    Controls how subscription-ending shortened service periods
                    are billed.
                  default: bill_actual_period
                  x-speakeasy-unknown-values: allow
              additionalProperties: false
              description: The invoicing settings for this workflow
              title: Workflow invoice settings
            payment:
              type: object
              oneOf:
                - $ref: >-
                    #/components/schemas/BillingWorkflowPaymentChargeAutomaticallySettings
                - $ref: >-
                    #/components/schemas/BillingWorkflowPaymentSendInvoiceSettings
              discriminator:
                propertyName: collection_method
                mapping:
                  charge_automatically: >-
                    #/components/schemas/BillingWorkflowPaymentChargeAutomaticallySettings
                  send_invoice: >-
                    #/components/schemas/BillingWorkflowPaymentSendInvoiceSettings
              description: The payment settings for this workflow
            tax:
              type: object
              properties:
                enabled:
                  type: boolean
                  description: >-
                    Enable automatic tax calculation when tax is supported by
                    the app. For example,

                    with Stripe Invoicing when enabled, tax is calculated via
                    Stripe Tax.
                  default: true
                enforced:
                  type: boolean
                  description: >-
                    Enforce tax calculation when tax is supported by the app.
                    When enabled, the

                    billing system will not allow to create an invoice without
                    tax calculation.

                    Enforcement is different per apps, for example, Stripe app
                    requires customer to

                    have a tax location when starting a paid subscription.
                  default: false
                default_tax_config:
                  type: object
                  properties:
                    behavior:
                      type: string
                      enum:
                        - inclusive
                        - exclusive
                      description: >-
                        Tax behavior.


                        If not specified the billing profile is used to
                        determine the tax behavior. If

                        not specified in the billing profile, the provider's
                        default behavior is used.
                      title: Tax behavior
                      x-speakeasy-unknown-values: allow
                    stripe:
                      type: object
                      required:
                        - code
                      properties:
                        code:
                          type: string
                          pattern: ^txcd_\d{8}$
                          description: >-
                            Product [tax
                            code](https://docs.stripe.com/tax/tax-codes).
                          title: Tax code
                          example: txcd_10000000
                      additionalProperties: false
                      description: Stripe tax config.
                      title: Stripe tax config
                      deprecated: true
                    external_invoicing:
                      type: object
                      required:
                        - code
                      properties:
                        code:
                          type: string
                          maxLength: 64
                          description: >-
                            The tax code should be interpreted by the external
                            invoicing provider.
                          title: Tax code
                      additionalProperties: false
                      description: External invoicing tax config.
                      title: External invoicing tax config
                      deprecated: true
                    tax_code_id:
                      type: string
                      pattern: ^[0-7][0-9A-HJKMNP-TV-Z]{25}$
                      description: Tax code ID.
                      title: Tax code ID
                      example: 01G65Z755AFWAKHE12NY0CQ9FH
                      deprecated: true
                    tax_code:
                      type: object
                      required:
                        - id
                      properties:
                        id:
                          $ref: '#/components/schemas/ULID'
                      additionalProperties: false
                      description: >-
                        Tax code reference.


                        When both `tax_code` and `tax_code_id` are provided,
                        `tax_code` takes

                        precedence. When `stripe.code` is also provided,
                        `tax_code` still wins and

                        `stripe.code` is ignored.
                      title: Tax code
                  additionalProperties: false
                  description: >-
                    Default tax configuration to apply to the invoices for line
                    items.


                    Setting a tax code (`stripe.code` / `taxCodeId`) on a
                    profile's default tax

                    config is deprecated and can no longer be added or changed:
                    the organization

                    default tax code is used instead. Existing tax-code values
                    may still be removed,

                    and `behavior` remains fully supported.
              additionalProperties: false
              description: The tax settings for this workflow
              title: Workflow tax settings
          additionalProperties: false
          description: The billing workflow settings for this profile
        default:
          type: boolean
          description: Whether this is the default profile.
      additionalProperties: false
      description: BillingProfile upsert request.
