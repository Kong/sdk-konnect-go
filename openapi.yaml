            the policy is applied.


            When the policy is applied as a child policy of schema_validation,
            the expression can also reference

            `record.value` fields.
          maxLength: 1000
          default: ''
          x-expression:
            type: boolean
            fields:
              - name: context.auth.principal.name
                type: string
                description: >-
                  Name of authenticated principal. Username in case of
                  PLAIN/SCRAM, `sub` claim in case of OAUTHBEARER.
              - name: context.auth.principal.id
                type: string
                description: >-
                  Kong Identity principal ID. Only populated when Kong Identity
                  principal fetching is configured and succeeds.


                  **Requires a minimum runtime version of `1.2`**.
                x-min-runtime-version: '1.2'
              - name: context.auth.principal.metadata
                type: object
                description: >-
                  Kong Identity principal metadata. Only populated when Kong
                  Identity principal fetching is configured and succeeds. Values
