        config:
          description: The configuration of the policy.
          type: object
          $ref: '#/components/schemas/EventGatewayTLSListenerPolicyConfig'
      title: TLS Listener
    EventGatewayTLSListenerPolicyConfigSensitiveDataAware:
      type: object
      required:
        - certificates
      properties:
        certificates:
          minItems: 1
          maxItems: 1
          type: array
          items:
            $ref: '#/components/schemas/TLSCertificateSensitiveDataAware'
        versions:
          $ref: '#/components/schemas/TLSVersionRange'
        allow_plaintext:
          type: boolean
          description: >
            If false, only TLS connections are allowed. If true, both TLS and
            plaintext connections are allowed.
          default: false
        client_authentication:
          type: object
          x-min-runtime-version: '1.1'
          description: >-
            Configures mutual TLS (mTLS) client certificate verification. When
            set, the gateway

            requests or requires clients to present a certificate during the TLS
            handshake.


            **Requires a minimum runtime version of `1.1`**.
          required:
            - mode
            - tls_trust_bundles
          properties:
            mode:
              type: string
              enum:
                - required
                - requested
              description: >
                * required - Reject TLS connections without a valid client
                certificate.

                * requested - Request a client certificate during the TLS
                handshake, but allow connections without one (falls back to
                other configured authentication methods). If a certificate is
                presented but cannot be verified, the connection is closed.
              x-speakeasy-unknown-values: allow
            tls_trust_bundles:
              type: array
              minItems: 1
              description: >
                TLS trust bundles contain CA certificate bundles used to verify
                client certificates.

                All bundles are merged into a single trust store; a client
                certificate is accepted if it

                chains to any trusted CA across all bundles.
              items:
                $ref: '#/components/schemas/TLSTrustBundleReference'
            principal_mapping:
              type: string
              x-min-runtime-version: '1.1'
              description: >-
                An expression that extracts a principal identifier from a
                verified client certificate.

                This expression must evaluate to a string.


                **Requires a minimum runtime version of `1.1`**.
              example: >-
                ${context.certificate.subject['CN'] ?
                context.certificate.subject['CN'] :
                context.certificate.sans.uri[0]}
              x-expression:
                type: string
                fields:
                  - name: context.certificate.serialNumber
                    type: string
                    description: The string serial number of the certificate
                  - name: context.certificate.subject
                    type: object
                    description: >
                      A map of the subject distinguished name.


                      A distinguished name as described by RFC 4514 is
                      represented as a map with each key being

                      the attribute type and the value being the attribute
                      value.

                      For example:

                      * `certificate.subject['CN']` is the common name

                      * `certificate.subject['O']` is the organization
                  - name: context.certificate.issuer
                    type: object
                    description: >
                      A map of the issuer distinguished name.


                      A distinguished name as described by RFC 4514 is
                      represented as a map with each key being

                      the attribute type and the value being the attribute
                      value.

                      For example:

                      * `certificate.issuer['CN']` is the common name

                      * `certificate.issuer['O']` is the organization
                  - name: context.certificate.sans.dns
                    type: array
                    items:
                      type: string
                    description: >-
                      An array of the DNS Subject Alternative Names from the
                      certificate.
                  - name: context.certificate.sans.uri
                    type: array
                    items:
                      type: string
                    description: >-
                      An array of the URI Subject Alternative Names from the
                      certificate.
    EventGatewayTLSListenerPolicyConfig:
      type: object
      required:
        - certificates
      properties:
        certificates:
          minItems: 1
          maxItems: 1
          type: array
          items:
            $ref: '#/components/schemas/TLSCertificate'
        versions:
          $ref: '#/components/schemas/TLSVersionRange'
        allow_plaintext:
          type: boolean
          description: >
            If false, only TLS connections are allowed. If true, both TLS and
            plaintext connections are allowed.
          default: false
        client_authentication:
          type: object
          x-min-runtime-version: '1.1'
          description: >-
            Configures mutual TLS (mTLS) client certificate verification. When
            set, the gateway

            requests or requires clients to present a certificate during the TLS
            handshake.


            **Requires a minimum runtime version of `1.1`**.
          required:
            - mode
            - tls_trust_bundles
          properties:
            mode:
              type: string
              enum:
                - required
                - requested
              description: >
                * required - Reject TLS connections without a valid client
                certificate.

                * requested - Request a client certificate during the TLS
                handshake, but allow connections without one (falls back to
                other configured authentication methods). If a certificate is
                presented but cannot be verified, the connection is closed.
              x-speakeasy-unknown-values: allow
            tls_trust_bundles:
              type: array
              minItems: 1
              description: >
                TLS trust bundles contain CA certificate bundles used to verify
                client certificates.

                All bundles are merged into a single trust store; a client
                certificate is accepted if it

                chains to any trusted CA across all bundles.
              items:
                $ref: '#/components/schemas/TLSTrustBundleReference'
            principal_mapping:
              type: string
              x-min-runtime-version: '1.1'
              description: >-
                An expression that extracts a principal identifier from a
                verified client certificate.

                This expression must evaluate to a string.


                **Requires a minimum runtime version of `1.1`**.
              example: >-
                ${context.certificate.subject['CN'] ?
                context.certificate.subject['CN'] :
                context.certificate.sans.uri[0]}
              x-expression:
                type: string
                fields:
                  - name: context.certificate.serialNumber
                    type: string
                    description: The string serial number of the certificate
                  - name: context.certificate.subject
                    type: object
                    description: >
                      A map of the subject distinguished name.


                      A distinguished name as described by RFC 4514 is
                      represented as a map with each key being

                      the attribute type and the value being the attribute
                      value.

                      For example:

                      * `certificate.subject['CN']` is the common name

                      * `certificate.subject['O']` is the organization
                  - name: context.certificate.issuer
                    type: object
                    description: >
                      A map of the issuer distinguished name.


                      A distinguished name as described by RFC 4514 is
                      represented as a map with each key being

                      the attribute type and the value being the attribute
                      value.

                      For example:

                      * `certificate.issuer['CN']` is the common name

                      * `certificate.issuer['O']` is the organization
                  - name: context.certificate.sans.dns
                    type: array
                    items:
                      type: string
                    description: >-
                      An array of the DNS Subject Alternative Names from the
                      certificate.
                  - name: context.certificate.sans.uri
                    type: array
                    items:
                      type: string
                    description: >-
                      An array of the URI Subject Alternative Names from the
                      certificate.
