          description: Payment settings for this invoice.
          title: Payment settings
          readOnly: true
      additionalProperties: false
      description: >-
        Invoice-level snapshot of the workflow configuration.


        Contains only the settings that are meaningful for an already-created
        invoice:

        invoicing behaviour and payment settings. Collection alignment and tax
        policy

        are gather-time / profile-wide concerns and are not included.
