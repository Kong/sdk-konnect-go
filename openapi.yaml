                  pattern: '^\-?[0-9]+(\.[0-9]+)?$'
                  readOnly: true
                  title: Exclusive taxes total
                charges_total:
                  description: The total amount contributed by additional charges.
                  type: string
                  pattern: '^\-?[0-9]+(\.[0-9]+)?$'
                  readOnly: true
                  title: Charges total
                discounts_total:
                  description: The total amount deducted through discounts.
                  type: string
                  pattern: '^\-?[0-9]+(\.[0-9]+)?$'
                  readOnly: true
                  title: Discounts total
                credits_total:
                  description: The total amount deducted through credits before taxes are applied.
                  type: string
                  pattern: '^\-?[0-9]+(\.[0-9]+)?$'
                  readOnly: true
                  title: Credits total
                total:
                  description: 'The final total value of the resource after taxes, discounts and commitments.'
                  type: string
                  pattern: '^\-?[0-9]+(\.[0-9]+)?$'
                  readOnly: true
                  title: Total
              readOnly: true
              required:
                - amount
                - taxes_total
                - taxes_inclusive_total
                - taxes_exclusive_total
                - charges_total
                - discounts_total
                - credits_total
                - total
              title: Realtime totals
          readOnly: true
          required:
            - booked
          title: Totals for the charge
        price:
          description: The price of the charge.
          type: object
          discriminator:
            propertyName: type
            mapping:
              free: '#/components/schemas/BillingPriceFree'
              flat: '#/components/schemas/BillingPriceFlat'
              unit: '#/components/schemas/BillingPriceUnit'
              graduated: '#/components/schemas/BillingPriceGraduated'
              volume: '#/components/schemas/BillingPriceVolume'
          oneOf:
            - $ref: '#/components/schemas/BillingPriceFree'
            - $ref: '#/components/schemas/BillingPriceFlat'
            - $ref: '#/components/schemas/BillingPriceUnit'
            - $ref: '#/components/schemas/BillingPriceGraduated'
            - $ref: '#/components/schemas/BillingPriceVolume'
          title: Price
      additionalProperties: false
      required:
        - id
        - name
        - created_at
        - updated_at
        - type
        - customer
        - lifecycle_controller
        - currency
        - status
        - invoice_at
        - service_period
        - full_service_period
        - billing_period
        - settlement_mode
        - feature_key
        - totals
        - price
      title: Usage-based charge
    BillingChargesExpand:
      description: |-
        Expands for customer charges.

        Values:

        - `real_time_usage`: The charge's real-time usage.
      type: string
      enum:
        - real_time_usage
      title: Customer charge expands
    BillingCreditAdjustment:
      description: |-
        A credit adjustment can be used to make manual adjustments to a customer's
        credit balance.

        Supported use-cases:

        - Usage correction
      type: object
      properties:
        name:
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
          type: string
          maxLength: 1024
        labels:
          $ref: '#/components/schemas/Labels'
      additionalProperties: false
      required:
        - name
      title: Credit adjustment
    BillingCreditAvailabilityPolicy:
      description: |-
        When credits become available for consumption.

        - `on_creation`: Credits are available as soon as the grant is created.
        - `on_authorization`: Credits are available once the payment is authorized.
        - `on_settlement`: Credits are available once the payment is settled.
      type: string
      enum:
        - on_creation
      title: Credit availability policy
    BillingCreditBalances:
      description: The balances of the credits of a customer.
      type: object
      properties:
        retrieved_at:
          description: The timestamp of the balance retrieval.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        balances:
          description: The balances by currencies.
          type: array
          items:
            $ref: '#/components/schemas/CreditBalance'
          readOnly: true
      additionalProperties: false
      required:
        - retrieved_at
        - balances
      title: Credit balances
    BillingCreditGrant:
      description: |-
        A credit grant allocates credits to a customer.

        Credits are drawn down against charges according to the settlement mode
        configured on the rate card.
      type: object
      properties:
        id:
          description: ULID (Universally Unique Lexicographically Sortable Identifier).
          type: string
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          readOnly: true
          title: ULID
        name:
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
          type: string
          maxLength: 1024
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          description: An ISO-8601 timestamp representation of entity creation date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        updated_at:
          description: An ISO-8601 timestamp representation of entity last update date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        deleted_at:
          description: An ISO-8601 timestamp representation of entity deletion date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        funding_method:
          description: Funding method of the grant.
          type: string
          enum:
            - none
            - invoice
            - external
          title: Credit funding method
          x-speakeasy-unknown-values: allow
        currency:
          description: Fiat or custom currency code.
          type: string
          example: USD
          maxLength: 3
          minLength: 3
          pattern: '^[A-Z]{3}$'
        amount:
          description: Granted credit amount.
          type: string
          pattern: '^\-?[0-9]+(\.[0-9]+)?$'
        purchase:
          description: Present when a funding workflow applies (funding_method is not `none`).
          type: object
          additionalProperties: false
          properties:
            currency:
              description: Currency of the purchase amount.
              type: string
              example: USD
              maxLength: 3
              minLength: 3
              pattern: '^[A-Z]{3}$'
            per_unit_cost_basis:
              description: |-
                Cost basis per credit unit used to calculate the purchase amount.

                If `per_unit_cost_basis` is 0.50 and credit amount is $100.00, the total charge
                is $50.00. The value must be greater than 0. If the cost basis is 0, use
                `funding_method=none` instead.

                Defaults to 1.0.
              type: string
              default: '1.0'
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            amount:
              description: The purchase amount. Calculated from `per_unit_cost_basis` and credit `amount`.
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
              readOnly: true
            availability_policy:
              description: |-
                Controls when credits become available for consumption.

                Defaults to `on_creation`.
              type: string
              default: on_creation
              enum:
                - on_creation
              title: Credit availability policy
            settlement_status:
              description: Current payment settlement status.
              type: string
              enum:
                - pending
                - authorized
                - settled
              readOnly: true
              title: Credit purchase payment settlement status
              x-speakeasy-unknown-values: allow
          required:
            - currency
            - amount
        tax_config:
          description: |-
            Tax configuration for the grant.

            For `invoice` and `external` funding methods, tax configuration should be
            provided to ensure correct revenue recognition. When not provided, the default
            credit grant tax code is applied, if that's not set the global default taxcode
            is used.
          type: object
          additionalProperties: false
          properties:
            behavior:
              description: Tax behavior applied to the invoice line item.
              type: string
              enum:
                - inclusive
                - exclusive
              x-speakeasy-unknown-values: allow
            tax_code:
              description: Tax code applied to the invoice line item.
              type: object
              additionalProperties: false
              properties:
                id:
                  $ref: '#/components/schemas/ULID'
              required:
                - id
          title: Tax configuration for a credit grant
        invoice:
          description: Available when `funding_method` is `invoice`.
          type: object
          additionalProperties: false
          properties:
            id:
              description: Identifier of the invoice associated with the grant.
              type: string
              example: 01G65Z755AFWAKHE12NY0CQ9FH
              pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
              readOnly: true
              title: ULID
            line:
              description: Identifier of the invoice line associated with the grant.
              type: object
              additionalProperties: false
              properties:
                id:
                  $ref: '#/components/schemas/ULID'
              readOnly: true
              required:
                - id
          readOnly: true
        filters:
          $ref: '#/components/schemas/BillingCreditGrantFilters'
        priority:
          description: Draw-down priority of the grant. Lower values have higher priority.
          type: integer
          format: int16
          default: 10
          maximum: 1000
          minimum: 1
        effective_at:
          description: |-
            The timestamp when the credit grant becomes effective.

            Defaults to the current date and time.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        key:
          description: |-
            Idempotency key for the credit grant creation request.

            When provided, reusing the same key returns an HTTP 409 Conflict instead of
            creating a duplicate grant, which makes create requests safe to retry.
          type: string
          example: 019ae40f-4258-7f15-9491-842f42a7d6ac
          maxLength: 256
          minLength: 1
          title: External Resource Key
        expires_at:
          description: |-
            The timestamp when the credit grant expires.

            Calculated from the grant effective time and `expires_after` if provided.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        voided_at:
          description: Timestamp when the grant was voided.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        status:
          description: Current lifecycle status of the grant.
          type: string
          enum:
            - pending
            - active
            - expired
            - voided
          readOnly: true
          title: Credit grant lifecycle status
          x-speakeasy-unknown-values: allow
      additionalProperties: false
      required:
        - id
        - name
        - created_at
        - updated_at
        - funding_method
        - currency
        - amount
        - status
      title: Credit grant
    BillingCreditGrantFilters:
      description: Filters for the credit grant.
      type: object
      properties:
        features:
          description: |-
            Limit the credit grant to specific features. If no features are specified, the
            credit grant can be used for any feature.
          type: array
          items:
            $ref: '#/components/schemas/ResourceKey'
          example:
            - input_tokens
            - output_tokens
      additionalProperties: false
    BillingCreditPurchasePaymentSettlementStatus:
      description: |-
        Credit purchase payment settlement status.

        - `pending`: Payment has been initiated and is not yet authorized.
        - `authorized`: Payment has been authorized.
        - `settled`: Payment has been settled.
      type: string
      enum:
        - pending
        - authorized
        - settled
      title: Credit purchase payment settlement status
      x-speakeasy-unknown-values: allow
    BillingCreditTransaction:
      description: |-
        A credit transaction represents a single credit movement on the customer's
        balance.

        Credit transactions are immutable.
      type: object
      properties:
        id:
          description: ULID (Universally Unique Lexicographically Sortable Identifier).
          type: string
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          readOnly: true
          title: ULID
        name:
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
          type: string
          maxLength: 1024
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          description: An ISO-8601 timestamp representation of entity creation date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        booked_at:
          description: The date and time the transaction was booked.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        type:
          description: The type of credit transaction.
          type: string
          enum:
            - funded
            - consumed
            - expired
          readOnly: true
          x-speakeasy-unknown-values: allow
        currency:
          description: Fiat or custom currency code.
          type: string
          example: USD
          maxLength: 3
          minLength: 3
          pattern: '^[A-Z]{3}$'
        amount:
          description: |-
            Signed amount of the credit movement. Positive values add balance, negative
            values reduce balance.
          type: string
          pattern: '^\-?[0-9]+(\.[0-9]+)?$'
          readOnly: true
        available_balance:
          description: The available balance before and after the transaction.
          type: object
          additionalProperties: false
          properties:
            before:
              $ref: '#/components/schemas/Numeric'
            after:
              $ref: '#/components/schemas/Numeric'
          readOnly: true
          required:
            - before
            - after
      additionalProperties: false
      required:
        - id
        - name
        - created_at
        - booked_at
        - type
        - currency
        - amount
        - available_balance
      title: Credit transaction
    BillingCustomer:
      description: |-
        Customers can be individuals or organizations that can subscribe to plans and
        have access to features.
      type: object
      properties:
        id:
          description: ULID (Universally Unique Lexicographically Sortable Identifier).
          type: string
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          readOnly: true
          title: ULID
        name:
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
          type: string
          maxLength: 1024
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          description: An ISO-8601 timestamp representation of entity creation date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        updated_at:
          description: An ISO-8601 timestamp representation of entity last update date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        deleted_at:
          description: An ISO-8601 timestamp representation of entity deletion date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        key:
          $ref: '#/components/schemas/ExternalResourceKey'
        usage_attribution:
          description: Mapping to attribute metered usage to the customer by the event subject.
          type: object
          additionalProperties: false
          properties:
            subject_keys:
              description: |-
                The subjects that are attributed to the customer. Can be empty when no usage
                event subjects are associated with the customer.
              type: array
              items:
                $ref: '#/components/schemas/UsageAttributionSubjectKey'
              minItems: 0
              title: Subject Keys
          required:
            - subject_keys
          title: Usage Attribution
        primary_email:
          description: The primary email address of the customer.
          type: string
          title: Primary Email
        currency:
          description: 'Currency of the customer. Used for billing, tax and invoicing.'
          type: string
          example: USD
          maxLength: 3
          minLength: 3
          pattern: '^[A-Z]{3}$'
          title: Currency
        billing_address:
          description: The billing address of the customer. Used for tax and invoicing.
          type: object
          additionalProperties: false
          properties:
            country:
              description: |-
                Country code in [ISO 3166-1](https://www.iso.org/iso-3166-country-codes.html)
                alpha-2 format.
              type: string
              example: US
              maxLength: 2
              minLength: 2
              pattern: '^[A-Z]{2}$'
              title: Country
            postal_code:
              description: Postal code.
              type: string
              title: Postal Code
            state:
              description: State or province.
              type: string
              title: State
            city:
              description: City.
              type: string
              title: City
            line1:
              description: First line of the address.
              type: string
              title: Line 1
            line2:
              description: Second line of the address.
              type: string
              title: Line 2
            phone_number:
              description: Phone number.
              type: string
              title: Phone Number
          title: Billing Address
      additionalProperties: false
      required:
        - id
        - name
        - created_at
        - updated_at
        - key
    BillingCustomerData:
      description: Billing customer data.
      type: object
      properties:
        billing_profile:
          description: |-
            The billing profile for the customer.

            If not provided, the default billing profile will be used.
          type: object
          additionalProperties: false
          properties:
            id:
              description: The ID of the billing profile.
              type: string
              example: 01G65Z755AFWAKHE12NY0CQ9FH
              pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
              title: ULID
          required:
            - id
          title: Billing profile
        app_data:
          description: App customer data.
          type: object
          additionalProperties: false
          properties:
            stripe:
              description: Used if the customer has a linked Stripe app.
              type: object
              additionalProperties: false
              properties:
                customer_id:
                  description: The Stripe customer ID used.
                  type: string
                  example: cus_1234567890
                  title: Stripe customer ID
                default_payment_method_id:
                  description: The Stripe default payment method ID.
                  type: string
                  example: pm_1234567890
                  title: Stripe default payment method ID
                labels:
                  description: Labels for this Stripe integration on the customer.
                  type: object
                  example:
                    env: test
                  additionalProperties:
                    type: string
                    pattern: '^[a-z0-9A-Z]{1}([a-z0-9A-Z-._]*[a-z0-9A-Z]+)?$'
                    minLength: 1
                    maxLength: 63
                  maxProperties: 50
                  title: Labels
              title: Stripe
            external_invoicing:
              description: Used if the customer has a linked external invoicing app.
              type: object
              additionalProperties: false
              properties:
                labels:
                  description: Labels for this external invoicing integration on the customer.
                  type: object
                  example:
                    env: test
                  additionalProperties:
                    type: string
                    pattern: '^[a-z0-9A-Z]{1}([a-z0-9A-Z-._]*[a-z0-9A-Z]+)?$'
                    minLength: 1
                    maxLength: 63
                  maxProperties: 50
                  title: Labels
              title: External invoicing
          title: App customer data
      additionalProperties: false
    BillingCustomerStripeCreateCheckoutSessionRequest:
      description: |-
        Request to create a Stripe Checkout Session for the customer.

        Checkout Sessions are used to collect payment method information from customers
        in a secure, Stripe-hosted interface. This integration uses setup mode to
        collect payment methods that can be charged later for subscription billing.
      type: object
      properties:
        stripe_options:
          description: |-
            Options for configuring the Stripe Checkout Session.

            These options are passed directly to Stripe's
            [checkout session creation API](https://docs.stripe.com/api/checkout/sessions/create).
          type: object
          additionalProperties: false
          properties:
            billing_address_collection:
              description: |-
                Whether to collect the customer's billing address.

                Defaults to auto, which only collects the address when necessary for tax
                calculation.
              type: string
              default: auto
              enum:
                - auto
                - required
              x-speakeasy-unknown-values: allow
            cancel_url:
              description: |-
                URL to redirect customers who cancel the checkout session.

                Not allowed when ui_mode is "embedded".
              type: string
            client_reference_id:
              description: |-
                Unique reference string for reconciling sessions with internal systems.

                Can be a customer ID, cart ID, or any other identifier.
              type: string
            customer_update:
              description: Controls which customer fields can be updated by the checkout session.
              type: object
              additionalProperties: false
              properties:
                address:
                  description: |-
                    Whether to save the billing address to customer.address.

                    Defaults to "never".
                  type: string
                  default: never
                  enum:
                    - auto
                    - never
                  x-speakeasy-unknown-values: allow
                name:
                  description: |-
                    Whether to save the customer name to customer.name.

                    Defaults to "never".
                  type: string
                  default: never
                  enum:
                    - auto
                    - never
                  x-speakeasy-unknown-values: allow
                shipping:
                  description: |-
                    Whether to save shipping information to customer.shipping.

                    Defaults to "never".
                  type: string
                  default: never
                  enum:
                    - auto
                    - never
                  x-speakeasy-unknown-values: allow
            consent_collection:
              description: Configuration for collecting customer consent during checkout.
              type: object
              additionalProperties: false
              properties:
                payment_method_reuse_agreement:
                  description: Controls the visibility of payment method reuse agreement.
                  type: object
                  additionalProperties: false
                  properties:
                    position:
                      description: Position and visibility of the payment method reuse agreement.
                      type: string
                      enum:
                        - auto
                        - hidden
                      x-speakeasy-unknown-values: allow
                promotions:
                  description: |-
                    Enables collection of promotional communication consent.

                    Only available to US merchants. When set to "auto", Checkout determines whether
                    to show the option based on the customer's locale.
                  type: string
                  enum:
                    - auto
                    - none
                  x-speakeasy-unknown-values: allow
                terms_of_service:
                  description: |-
                    Requires customers to accept terms of service before payment.

                    Requires a valid terms of service URL in your Stripe Dashboard settings.
                  type: string
                  enum:
                    - none
                    - required
                  x-speakeasy-unknown-values: allow
            currency:
              description: |-
                Three-letter ISO 4217 currency code in uppercase.

                Required for payment mode sessions. Optional for setup mode sessions.
              type: string
              example: USD
              maxLength: 3
              minLength: 3
              pattern: '^[A-Z]{3}$'
            custom_text:
              description: Custom text to display during checkout at various stages.
              type: object
              additionalProperties: false
              properties:
                after_submit:
                  description: Text displayed after the payment confirmation button.
                  type: object
                  additionalProperties: false
                  properties:
                    message:
                      description: The custom message text (max 1200 characters).
                      type: string
                      maxLength: 1200
                shipping_address:
                  description: Text displayed alongside shipping address collection.
                  type: object
                  additionalProperties: false
                  properties:
                    message:
                      description: The custom message text (max 1200 characters).
                      type: string
                      maxLength: 1200
                submit:
                  description: Text displayed alongside the payment confirmation button.
                  type: object
                  additionalProperties: false
                  properties:
                    message:
                      description: The custom message text (max 1200 characters).
                      type: string
                      maxLength: 1200
                terms_of_service_acceptance:
                  description: Text replacing the default terms of service agreement text.
                  type: object
                  additionalProperties: false
                  properties:
                    message:
                      description: The custom message text (max 1200 characters).
                      type: string
                      maxLength: 1200
            expires_at:
              description: |-
                Unix timestamp when the checkout session expires.

                Can be 30 minutes to 24 hours from creation. Defaults to 24 hours.
              type: integer
              format: int64
            locale:
              description: |-
                IETF language tag for the checkout UI locale.

                If blank or "auto", uses the browser's locale. Example: "en", "fr", "de".
              type: string
            metadata:
              description: |-
                Set of key-value pairs to attach to the checkout session.

                Useful for storing additional structured information.
              type: object
              additionalProperties:
                type: string
            return_url:
              description: |-
                Return URL for embedded checkout sessions after payment authentication.

                Required if ui_mode is "embedded" and redirect-based payment methods are
                enabled.
              type: string
            success_url:
              description: |-
                Success URL to redirect customers after completing payment or setup.

                Not allowed when ui_mode is "embedded". See:
                https://docs.stripe.com/payments/checkout/custom-success-page
              type: string
            ui_mode:
              description: |-
                The UI mode for the checkout session.

                "hosted" displays a Stripe-hosted page. "embedded" integrates directly into your
                app. Defaults to "hosted".
              type: string
              default: hosted
              enum:
                - embedded
                - hosted
              x-speakeasy-unknown-values: allow
            payment_method_types:
              description: |-
                List of payment method types to enable (e.g., "card", "us_bank_account").

                If not specified, Stripe enables all relevant payment methods.
              type: array
              items:
                type: string
            redirect_on_completion:
              description: |-
                Redirect behavior for embedded checkout sessions.

                Controls when to redirect users after completion. See:
                https://docs.stripe.com/payments/checkout/custom-success-page?payment-ui=embedded-form
              type: string
              enum:
                - always
                - if_required
                - never
              x-speakeasy-unknown-values: allow
            tax_id_collection:
              description: Configuration for collecting tax IDs during checkout.
              type: object
              additionalProperties: false
              properties:
                enabled:
                  description: |-
                    Enable tax ID collection during checkout.

                    Defaults to false.
                  type: boolean
                  default: false
                required:
                  description: |-
                    Whether tax ID collection is required.

                    Defaults to "never".
                  type: string
                  default: never
                  enum:
                    - if_supported
                    - never
                  x-speakeasy-unknown-values: allow
      additionalProperties: false
      required:
        - stripe_options
    BillingCustomerStripeCreateCustomerPortalSessionRequest:
      description: |-
        Request to create a Stripe Customer Portal Session for the customer.

        Useful to redirect the customer to the Stripe Customer Portal to manage their
        payment methods, change their billing address and access their invoice history.
        Only returns URL if the customer billing profile is linked to a stripe app and
        customer.
      type: object
      properties:
        stripe_options:
          description: Options for configuring the Stripe Customer Portal Session.
          type: object
          additionalProperties: false
          properties:
            configuration_id:
              description: |-
                The ID of an existing
                [Stripe configuration](https://docs.stripe.com/api/customer_portal/configurations)
                to use for this session, describing its functionality and features. If not
                specified, the session uses the default configuration.
              type: string
            locale:
              description: |-
                The IETF
                [language tag](https://docs.stripe.com/api/customer_portal/sessions/create#create_portal_session-locale)
                of the locale customer portal is displayed in. If blank or `auto`, the
                customer's preferred_locales or browser's locale is used.
              type: string
            return_url:
              description: |-
                The
                [URL to redirect](https://docs.stripe.com/api/customer_portal/sessions/create#create_portal_session-return_url)
                the customer to after they have completed their requested actions.
              type: string
      additionalProperties: false
      required:
        - stripe_options
    BillingEntitlementAccessResult:
      description: Entitlement access result.
      type: object
      properties:
        type:
          description: The type of the entitlement.
          type: string
          example: static
          enum:
            - metered
            - static
            - boolean
          readOnly: true
          x-speakeasy-unknown-values: allow
        feature_key:
          description: The feature key of the entitlement.
          type: string
          example: available_models
          maxLength: 64
          minLength: 1
          pattern: '^[a-z0-9]+(?:_[a-z0-9]+)*$'
          readOnly: true
          title: Resource Key
        has_access:
          description: |-
            Whether the customer has access to the feature. Always true for `boolean` and
            `static` entitlements. Depends on balance for `metered` entitlements.
          type: boolean
          example: true
          readOnly: true
        config:
          description: |-
            Only available for static entitlements. Config is the JSON parsable
            configuration of the entitlement. Useful to describe per customer configuration.
          type: string
          example: '{ "availableModels": ["gpt-5", "gpt-4o"] }'
          readOnly: true
      additionalProperties: false
      required:
        - type
        - feature_key
        - has_access
    BillingFeatureLLMUnitCost:
      description: |-
        LLM cost lookup configuration. Each dimension (provider, model, token type) can
        be specified as either a static value or a meter group-by property name
        (mutually exclusive).
      type: object
      properties:
        type:
          description: The type discriminator for LLM unit cost.
          type: string
          enum:
            - llm
        provider_property:
          description: |-
            Meter group-by property that holds the LLM provider. Use this when the meter has
            a group-by dimension for provider. Mutually exclusive with `provider`.
          type: string
          title: Provider property
        provider:
          description: |-
            Static LLM provider value (e.g., "openai", "anthropic"). Use this when the
            feature tracks a single provider. Mutually exclusive with `provider_property`.
          type: string
          title: Provider
        model_property:
          description: |-
            Meter group-by property that holds the model ID. Use this when the meter has a
            group-by dimension for model. Mutually exclusive with `model`.
          type: string
          title: Model property
        model:
          description: |-
            Static model ID value (e.g., "gpt-4", "claude-3-5-sonnet"). Use this when the
            feature tracks a single model. Mutually exclusive with `model_property`.
          type: string
          title: Model
        token_type_property:
          description: |-
            Meter group-by property that holds the token type. Use this when the meter has a
            group-by dimension for token type. Mutually exclusive with `token_type`.
          type: string
          title: Token type property
        token_type:
          description: |-
            Static token type value. Use this when the feature tracks a single token type
            (e.g., only input tokens). `request` is an alias for `input`, `response` is an
            alias for `output`. Mutually exclusive with `token_type_property`.
          type: string
          enum:
            - input
            - output
            - cache_read
            - cache_write
            - reasoning
            - request
            - response
          title: Token type
          x-speakeasy-unknown-values: allow
        pricing:
          description: |-
            Resolved per-token pricing from the LLM cost database. Populated in responses
            when the provider and model can be determined, either from static values or from
            meter group-by filters with exact matches.
          type: object
          additionalProperties: false
          properties:
            input_per_token:
              description: Cost per input token in USD.
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
              title: Input per token
            output_per_token:
              description: Cost per output token in USD.
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
              title: Output per token
            cache_read_per_token:
              description: Cost per cache read token in USD.
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
              title: Cache read per token
            reasoning_per_token:
              description: Cost per reasoning token in USD.
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
              title: Reasoning per token
            cache_write_per_token:
              description: Cost per cache write token in USD.
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
              title: Cache write per token
          readOnly: true
          required:
            - input_per_token
            - output_per_token
          title: Resolved pricing
      additionalProperties: false
      required:
        - type
    BillingFeatureManualUnitCost:
      description: A fixed per-unit cost amount.
      type: object
      properties:
        type:
          description: The type discriminator for manual unit cost.
          type: string
          enum:
            - manual
        amount:
          description: Fixed per-unit cost amount in USD.
          type: string
          pattern: '^\-?[0-9]+(\.[0-9]+)?$'
      additionalProperties: false
      required:
        - type
        - amount
    BillingPlan:
      description: Plans provide a template for subscriptions.
      type: object
      properties:
        id:
          description: ULID (Universally Unique Lexicographically Sortable Identifier).
          type: string
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          readOnly: true
          title: ULID
        name:
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
          type: string
          maxLength: 1024
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          description: An ISO-8601 timestamp representation of entity creation date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        updated_at:
          description: An ISO-8601 timestamp representation of entity last update date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        deleted_at:
          description: An ISO-8601 timestamp representation of entity deletion date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        key:
          description: |-
            A key is a semi-unique string that is used to identify the plan. It is used to
            reference the latest `active` version of the plan and is unique with the version
            number.
          type: string
          example: resource_key
          maxLength: 64
          minLength: 1
          pattern: '^[a-z0-9]+(?:_[a-z0-9]+)*$'
          title: Key
        version:
          description: |-
            Plans are versioned to allow you to make changes without affecting running
            subscriptions.
          type: integer
          default: 1
          minimum: 1
          readOnly: true
          title: Version
        currency:
          description: The currency code of the plan.
          type: string
          example: USD
          maxLength: 3
          minLength: 3
          pattern: '^[A-Z]{3}$'
          title: Currency
        billing_cadence:
          description: The billing cadence for subscriptions using this plan.
          type: string
          format: ISO8601
          example: P1Y
          pattern: '^P(?:\d+(?:\.\d+)?Y)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?W)?(?:\d+(?:\.\d+)?D)?(?:T(?:\d+(?:\.\d+)?H)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?S)?)?$'
          title: Billing cadence
        pro_rating_enabled:
          description: Whether pro-rating is enabled for this plan.
          type: boolean
          default: true
          title: Pro-rating enabled
        effective_from:
          description: |-
            The date and time when the plan becomes `active`. When not specified, the plan
            is in `draft` status.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: Effective start date
        effective_to:
          description: |-
            A scheduled date and time when the plan becomes `archived`. When not specified,
            the plan is in `active` status indefinitely.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: Effective end date
        status:
          description: |-
            The status of the plan. Computed based on the effective start and end dates:

            - `draft`: `effective_from` is not set.
            - `scheduled`: `now < effective_from`.
            - `active`: `effective_from <= now` and (`effective_to` is not set or
            `now < effective_to`).
            - `archived`: `effective_to <= now`.
          type: string
          enum:
            - draft
            - active
            - archived
            - scheduled
          readOnly: true
          title: Status
          x-speakeasy-unknown-values: allow
        phases:
          description: |-
            The plan phases define the pricing ramp for a subscription. A phase switch
            occurs only at the end of a billing period. At least one phase is required.
          type: array
          items:
            $ref: '#/components/schemas/BillingPlanPhase'
          minItems: 1
          title: Plan phases
        settlement_mode:
          description: |-
            Settlement mode for plan.

            Values:

            - `credit_then_invoice`: Credits are applied first, then any remainder is
            invoiced.
            - `credit_only`: Usage is settled exclusively against credits.
          type: string
          default: credit_then_invoice
          enum:
            - credit_then_invoice
            - credit_only
          readOnly: true
          title: Settlement Mode
          x-speakeasy-unknown-values: allow
        validation_errors:
          description: |-
            List of validation errors in `draft` state that prevent the plan from being
            published.
          type: array
          items:
            $ref: '#/components/schemas/ProductCatalogValidationError'
          readOnly: true
          title: Validation errors
      additionalProperties: false
      required:
        - id
        - name
        - created_at
        - updated_at
        - key
        - version
        - currency
        - billing_cadence
        - status
        - phases
    BillingPlanPhase:
      description: |-
        The plan phase or pricing ramp allows changing a plan's rate cards over time as
        a subscription progresses.
      type: object
      properties:
        name:
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
          type: string
          maxLength: 1024
        labels:
          $ref: '#/components/schemas/Labels'
        key:
          $ref: '#/components/schemas/ResourceKey'
        duration:
          description: |-
            The duration of the phase. When not specified, the phase runs indefinitely. Only
            the last phase may omit the duration.
          type: string
          format: ISO8601
          example: P1Y
          pattern: '^P(?:\d+(?:\.\d+)?Y)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?W)?(?:\d+(?:\.\d+)?D)?(?:T(?:\d+(?:\.\d+)?H)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?S)?)?$'
          title: Duration
        rate_cards:
          description: The rate cards of the plan.
          type: array
          items:
            $ref: '#/components/schemas/BillingRateCard'
          title: Rate cards
      additionalProperties: false
      required:
        - name
        - key
        - rate_cards
    BillingPriceFlat:
      description: Flat price.
      type: object
      properties:
        type:
          description: The type of the price.
          type: string
          enum:
            - flat
          title: Type
        amount:
          description: The amount of the flat price.
          type: string
          pattern: '^\-?[0-9]+(\.[0-9]+)?$'
          title: Amount
      additionalProperties: false
      required:
        - type
        - amount
    BillingPriceFree:
      description: Free price.
      type: object
      properties:
        type:
          description: The type of the price.
          type: string
          enum:
            - free
          title: Type
      additionalProperties: false
      required:
        - type
    BillingPriceGraduated:
      description: |-
        Graduated tiered price.

        Each tier's rate applies only to the usage within that tier. Pricing can change
        as cumulative usage crosses tier boundaries.

        When UnitConfig is present on the rate card, tier boundaries (up_to_amount) are
        expressed in converted billing units.
      type: object
      properties:
        type:
          description: The type of the price.
          type: string
          enum:
            - graduated
          title: Type
        tiers:
          description: The tiers of the graduated price. At least one tier is required.
          type: array
          items:
            $ref: '#/components/schemas/BillingPriceTier'
          minItems: 1
          title: Tiers
      additionalProperties: false
      required:
        - type
        - tiers
    BillingPriceTier:
      description: |-
        A price tier used in graduated and volume pricing.

        At least one price component (flat_price or unit_price) must be set. When
        UnitConfig is present on the rate card, up_to_amount is expressed in converted
        billing units.
      type: object
      properties:
        up_to_amount:
          description: |-
            Up to and including this quantity will be contained in the tier. If undefined,
            the tier is open-ended (the last tier).
          type: string
          pattern: '^\-?[0-9]+(\.[0-9]+)?$'
          title: Up to quantity
        flat_price:
          description: The flat price component of the tier. Charged once when the tier is entered.
          type: object
          additionalProperties: false
          properties:
            type:
              description: The type of the price.
              type: string
              enum:
                - flat
              title: Type
            amount:
              description: The amount of the flat price.
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
              title: Amount
          required:
            - type
            - amount
          title: Flat price component
        unit_price:
          description: The unit price component of the tier. Charged per billing unit within the tier.
          type: object
          additionalProperties: false
          properties:
            type:
              description: The type of the price.
              type: string
              enum:
                - unit
              title: Type
            amount:
              description: The amount of the unit price.
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
              title: Amount
          required:
            - type
            - amount
          title: Unit price component
      additionalProperties: false
    BillingPriceUnit:
      description: |-
        Unit price.

        Charges a fixed rate per billing unit. When UnitConfig is present on the rate
        card, billing units are the converted quantities (e.g. GB instead of bytes).
      type: object
      properties:
        type:
          description: The type of the price.
          type: string
          enum:
            - unit
          title: Type
        amount:
          description: The amount of the unit price.
          type: string
          pattern: '^\-?[0-9]+(\.[0-9]+)?$'
          title: Amount
      additionalProperties: false
      required:
        - type
        - amount
    BillingPriceVolume:
      description: |-
        Volume tiered price.

        The maximum quantity within a period determines the per-unit price for all units
        in that period.

        When UnitConfig is present on the rate card, tier boundaries (up_to_amount) are
        expressed in converted billing units.
      type: object
      properties:
        type:
          description: The type of the price.
          type: string
          enum:
            - volume
          title: Type
        tiers:
          description: The tiers of the volume price. At least one tier is required.
          type: array
          items:
            $ref: '#/components/schemas/BillingPriceTier'
          minItems: 1
          title: Tiers
      additionalProperties: false
      required:
        - type
        - tiers
    BillingProfile:
      description: |-
        Billing profiles contain the settings for billing and controls invoice
        generation.
      type: object
      properties:
        id:
          description: ULID (Universally Unique Lexicographically Sortable Identifier).
          type: string
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          readOnly: true
          title: ULID
        name:
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
          type: string
          maxLength: 1024
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          description: An ISO-8601 timestamp representation of entity creation date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        updated_at:
          description: An ISO-8601 timestamp representation of entity last update date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        deleted_at:
          description: An ISO-8601 timestamp representation of entity deletion date.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        supplier:
          description: |-
            The name and contact information for the supplier this billing profile
            represents
          type: object
          additionalProperties: false
          properties:
            id:
              description: Unique identifier for the party.
              type: string
              readOnly: true
            key:
              description: An optional unique key of the party.
              type: string
              example: 019ae40f-4258-7f15-9491-842f42a7d6ac
              maxLength: 256
              minLength: 1
              title: External Resource Key
            name:
              description: Legal name or representation of the party.
              type: string
            tax_id:
              description: |-
                The entity's legal identification used for tax purposes. They may have other
                numbers, but we're only interested in those valid for tax purposes.
              type: object
              additionalProperties: false
              properties:
                code:
                  description: Normalized tax identification code shown on the original identity document.
                  type: string
                  maxLength: 32
                  minLength: 1
            addresses:
              description: Address for where information should be sent if needed.
              type: object
              additionalProperties: false
              properties:
                billing_address:
                  description: Billing address.
                  type: object
                  additionalProperties: false
                  properties:
                    country:
                      description: |-
                        Country code in [ISO 3166-1](https://www.iso.org/iso-3166-country-codes.html)
                        alpha-2 format.
                      type: string
                      example: US
                      maxLength: 2
                      minLength: 2
                      pattern: '^[A-Z]{2}$'
                      title: Country
                    postal_code:
                      description: Postal code.
                      type: string
                      title: Postal Code
                    state:
                      description: State or province.
                      type: string
                      title: State
                    city:
                      description: City.
                      type: string
                      title: City
                    line1:
                      description: First line of the address.
                      type: string
                      title: Line 1
                    line2:
                      description: Second line of the address.
                      type: string
                      title: Line 2
                    phone_number:
                      description: Phone number.
                      type: string
                      title: Phone Number
              required:
                - billing_address
        workflow:
          description: The billing workflow settings for this profile
          type: object
          additionalProperties: false
          properties:
            collection:
              description: The collection settings for this workflow
              type: object
              additionalProperties: false
              properties:
                alignment:
                  description: The alignment for collecting the pending line items into an invoice.
                  type: object
                  default:
                    type: subscription
                  discriminator:
                    propertyName: type
                    mapping:
                      subscription: '#/components/schemas/BillingWorkflowCollectionAlignmentSubscription'
                      anchored: '#/components/schemas/BillingWorkflowCollectionAlignmentAnchored'
                  oneOf:
                    - $ref: '#/components/schemas/BillingWorkflowCollectionAlignmentSubscription'
                    - $ref: '#/components/schemas/BillingWorkflowCollectionAlignmentAnchored'
                interval:
                  description: |-
                    This grace period can be used to delay the collection of the pending line items
                    specified in alignment.

                    This is useful, in case of multiple subscriptions having slightly different
                    billing periods.
                  type: string
                  format: ISO8601
                  example: P1D
                  default: PT1H
              title: Workflow collection settings
            invoicing:
              description: The invoicing settings for this workflow
              type: object
              additionalProperties: false
              properties:
                auto_advance:
                  description: Whether to automatically issue the invoice after the draftPeriod has passed.
                  type: boolean
                  default: true
                draft_period:
                  description: The period for the invoice to be kept in draft status for manual reviews.
                  type: string
                  format: ISO8601
                  example: P1D
                  default: P0D
                progressive_billing:
                  description: Should progressive billing be allowed for this workflow?
                  type: boolean
                  default: true
                subscription_end_proration_mode:
                  description: Controls how subscription-ending shortened service periods are billed.
                  type: string
                  default: bill_actual_period
                  enum:
                    - bill_full_period
                    - bill_actual_period
                  x-speakeasy-unknown-values: allow
              title: Workflow invoice settings
            payment:
              description: The payment settings for this workflow
              type: object
              discriminator:
                propertyName: collection_method
                mapping:
                  charge_automatically: '#/components/schemas/BillingWorkflowPaymentChargeAutomaticallySettings'
                  send_invoice: '#/components/schemas/BillingWorkflowPaymentSendInvoiceSettings'
              oneOf:
                - $ref: '#/components/schemas/BillingWorkflowPaymentChargeAutomaticallySettings'
                - $ref: '#/components/schemas/BillingWorkflowPaymentSendInvoiceSettings'
            tax:
              description: The tax settings for this workflow
              type: object
              additionalProperties: false
              properties:
                enabled:
                  description: |-
                    Enable automatic tax calculation when tax is supported by the app. For example,
                    with Stripe Invoicing when enabled, tax is calculated via Stripe Tax.
                  type: boolean
                  default: true
                enforced:
                  description: |-
                    Enforce tax calculation when tax is supported by the app. When enabled, the
                    billing system will not allow to create an invoice without tax calculation.
                    Enforcement is different per apps, for example, Stripe app requires customer to
                    have a tax location when starting a paid subscription.
                  type: boolean
                  default: false
                default_tax_config:
                  description: |-
                    Default tax configuration to apply to the invoices for line items.

                    Setting a tax code (`stripe.code` / `taxCodeId`) on a profile's default tax
                    config is deprecated and can no longer be added or changed: the organization
                    default tax code is used instead. Existing tax-code values may still be removed,
                    and `behavior` remains fully supported.
                  type: object
                  additionalProperties: false
                  properties:
                    behavior:
                      description: |-
                        Tax behavior.

                        If not specified the billing profile is used to determine the tax behavior. If
                        not specified in the billing profile, the provider's default behavior is used.
                      type: string
                      enum:
                        - inclusive
                        - exclusive
                      title: Tax behavior
                      x-speakeasy-unknown-values: allow
                    stripe:
                      description: Stripe tax config.
                      type: object
                      additionalProperties: false
                      deprecated: true
                      properties:
                        code:
                          description: 'Product [tax code](https://docs.stripe.com/tax/tax-codes).'
                          type: string
                          example: txcd_10000000
                          pattern: '^txcd_\d{8}$'
                          title: Tax code
                      required:
