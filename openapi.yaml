        erroring on a batch causes clients to get stuck on the problematic
        offset and requires manual intervention to skip it.

        * `skip` - the record is not delivered to the client.

        * `passthrough` - passes the record to the client even though policy
        execution failed.

        * `mark` - passes the record to the client but marks it with a
        `kong/policy-failure-<id>` header whose value is the reason for the
        policy failure (truncated to 512 characters).


