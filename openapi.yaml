          example: USD
          maxLength: 3
          minLength: 3
          pattern: '^[A-Z]{3}$'
          readOnly: true
        source:
          description: Where this price came from.
          type: string
          enum:
            - manual
            - system
          readOnly: true
          x-speakeasy-unknown-values: allow
