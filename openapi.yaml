    VulnerabilitiesMetricsFilterByScanAttributes:
      description: >
        Filters a metrics query by `scan_attributes` properties.

        Dot-notation off of `scan_attributes` is used to specify the property to
        filter by.


        Example: `scan_attributes.image_tag`.
      allOf:
        - type: object
          required:
            - field
          properties:
            field:
              type: string
              pattern: ^scan_attributes\.[^.\s]+$
        - oneOf:
            - $ref: '#/components/schemas/EmptyValueMetricsFilter'
            - $ref: '#/components/schemas/StringValueMetricsFilter'
            - $ref: '#/components/schemas/NumericValueMetricsFilter'
      example:
        field: scan_attributes.image_version
        operator: in
        value:
          - 2.0.7
    VulnerabilitiesMetricsQueryResult:
      type: object
      description: >-
        A query result with metrics grouped by the dimensions specified in the
        query, at a particular time.
      required:
        - timestamp
        - event
      properties:
        timestamp:
          type: string
          format: date-time
          example: '2025-04-01T07:20:50.000Z'
          description: >
            Timestamp corresponding to the aggregated metric data in the `event`
            object.

            RFC-3339 format with a "T" character separating date from time
            within the field value.
        event:
          $ref: '#/components/schemas/VulnerabilitiesMetricsQueryResultEvent'
    VulnerabilitiesMetricsQueryResultEvent:
      oneOf:
        - $ref: '#/components/schemas/VulnerabilityCountMetricEvent'
      description: >-
        Payload containing the aggregated metric data and associated dimensions
        included in the query.
    VulnerabilityCountMetricEvent:
      type: object
      description: >-
        Payload containing the aggregated vulnerability count metric data and
        associated dimensions included in the query.
      properties:
