        fetch_by:
          $ref: '#/components/schemas/FetchKongIdentityPrincipalFetchBy'
        failure_mode:
          $ref: '#/components/schemas/FetchKongIdentityPrincipalFailureMode'
    FetchKongIdentityPrincipalOauthBearer:
      x-min-runtime-version: '1.2'
      type: object
      description: >-
        Fetches principal metadata from Kong Identity after successful
        OAUTHBEARER authentication.

        The principal is looked up by the iss and sub claims from the JWT token.


        **Requires a minimum runtime version of `1.2`**.
      required:
        - directory
        - failure_mode
      properties:
        directory:
          type: string
          description: Kong Identity directory to use for principal lookup.
          minLength: 1
        failure_mode:
          $ref: '#/components/schemas/FetchKongIdentityPrincipalFailureMode'
    FetchKongIdentityPrincipalFetchBy:
      x-min-runtime-version: '1.2'
      type: object
      description: |-
        Defines how to look up the principal in Kong Identity.

        **Requires a minimum runtime version of `1.2`**.
      required:
        - key
      properties:
        key:
          type: string
          description: >
            The metadata key in Kong Identity to match the authenticated
            identity against.

            Value for the lookup is a `username` in case of `sasl_plain` or
            `sasl_scram`.

            In case of `client_certificate` it's a principal mapped by the
