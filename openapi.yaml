  - name: OpenMeter Billing Settings
    description: Billing settings manages the billing profiles and invoices for customers.
  - name: OpenMeter Apps
    description: >-
      Apps enable you to extend and customize billing and usage workflows by
      integrating with external systems and services. Apps can automate and
      enhance your billing ecosystem by supporting capabilities such as
      synchronizing usage data with third-party platforms, calculating taxes,
      generating and delivering invoices, handling payment collection, and other
      billing-related tasks.
  - name: OpenMeter Entitlements
    description: Entitlements are used to control access to features for customers.
  - name: OpenMeter Subscriptions
    description: >-
      Subscriptions are used to track usage of your product or service.
      Subscriptions can be individuals or organizations that can subscribe to
      plans and have access to features.
  - name: OpenMeter Customers
    description: >-
      Customers are used to track usage of your product or service. Customers
      can be individuals or organizations that can subscribe to plans and have
      access to features.
  - name: Metering Events
    description: >-
      Metering events are used to track usage of your product or service. Events
      are processed asynchronously by the meters, so they may not be immediately
      available for querying.
  - name: Meters
    description: >-
      Meters specify how to aggregate events for billing and analytics purposes.
      Meters can be configured with multiple aggregation methods and groupings.
      Multiple meters can be created for the same event type, enabling flexible
      metering scenarios.
