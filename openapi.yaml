  - name: Data-Plane Group Configurations
    description: >
      A Cloud Gateway configuration declares the desired state of a control
      plane's data plane groups — where they run,

      how many instances, the gateway version, and the autoscaling strategy.
      Apply a configuration with PUT, and Kong

      reconciles the running data planes to match.
  - name: Networks
    description: >
      Networks are provider-backed VPC or VNet resources that host dedicated
      Cloud Gateway data plane groups.

      Each network is tied to a specific cloud provider account, region, and
      CIDR block. A network must reach

      the `ready` state before it can be referenced in a configuration.
  - name: Transit Gateways
    description: >
      Transit gateways connect a Cloud Gateway network to your cloud
      infrastructure. Supported attachment types

      span all three major cloud providers: AWS Transit Gateway, AWS VPC
      Peering, AWS Resource Endpoint (PrivateLink),

      Azure VNet Peering, Azure Virtual Hub Peering, and GCP VPC Peering.
  - name: Private DNS
    description: >
      Private DNS attachments enable a Cloud Gateway network to resolve private
      DNS zones hosted in your cloud

      provider — AWS Private Hosted Zones, AWS Outbound Resolvers, Azure Private
      Hosted Zones, Azure Outbound

      Resolvers, and GCP Private Hosted Zones.
  - name: Add-Ons
    description: >
      Optional services that extend the capabilities of a Cloud Gateway data
      plane group. The currently supported add-on type is managed cache
      (`managed-cache.v0`), which provisions a Redis-compatible in-memory cache
      co-located with your data planes. Each add-on is scoped to a control plane
      or control plane group, and is automatically deployed across all data
      plane groups that belong to that owner.
  - name: Provider Accounts
    description: >
      Provider Accounts link your Konnect organization to a cloud provider
      account (AWS, Azure, or GCP) so that Cloud Gateway networks can be
      provisioned in the dedicated cloud provider account. Each provider account
      maps a Konnect organization to a cloud provider account ID, which Konnect
      uses when creating network peering and hub-and-spoke attachments.
  - name: Custom Domains
    description: >
      Custom Domains let you assign bring-your-own hostnames to a Cloud Gateway
      control plane. After creation the domain moves through `initializing →
      ready` as Konnect provisions TLS certificates and configures SNI routing
      on the data planes. Use the online-status endpoint to confirm CNAME and
      SSL readiness before routing traffic.
  - name: Cloud Gateways Resource Quotas
    description: >
      Resource Quotas define organization-level limits on the number of Cloud
      Gateway resources — active networks, data planes, serverless data planes,
      data plane groups, and provider accounts per cloud provider. Use these
      endpoints to view the default platform limits and any overrides applied to
      your organization.
  - name: Resource Configurations
    description: >
      Resource Configurations define organization-wide behavioral settings for
      Cloud Gateway resources. Use these endpoints to view platform defaults —
      such as the data plane group idle timeout — and any overrides applied to
      your organization.
  - name: Resource Availability
    description: >
      Resource Availability is a public, unauthenticated endpoint that describes
      what Kong Cloud Gateway infrastructure is available to provision. Use it
      to discover supported cloud providers, regions, gateway versions, and
      instance type details — all the building blocks you need before creating
      networks or configuring data plane groups.
  - name: Notifications
    description: Operations related to notifications
  - name: DCR Providers
    description: >
      Dynamic Client Registration Providers are configurations representing an
      external Identity Provider whose clients (i.e. Applications) Konnect will
      be authorized to manage.

      For instance, they will be able to perform dynamic client registration
      (DCR) with the provider. 

      The DCR provider provides credentials to each DCR-enabled application in
      Konnect that can be used to access Product Versions that the app is
      registered for.
  - name: App Auth Strategies
    description: >
      Application Auth Strategies are sets of plugin configurations that
      represent how the gateway will perform authentication and authorization
      for a Product Version. 

      Called “Auth Strategy” for short in the context of portals/applications. 

      The plugins are synced to any Gateway Service that is currently linked or
      becomes linked to the Product Version.
