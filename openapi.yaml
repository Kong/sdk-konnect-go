            type: object
            additionalProperties: false
            properties:
              id:
                type: string
                format: uuid
                example: 7710d5c4-d902-410b-992f-18b814155b53
                description: The API version identifier.
                readOnly: true
              version:
                type: string
                description: The version of the api.
                example: 1.0.0
              spec:
                type: object
                additionalProperties: false
                x-property-annotations:
                  provider:
                    - x-internal
                properties:
                  content:
                    type: string
                    description: >
                      The raw content of your API spec, in json or yaml format
                      (OpenAPI or AsyncAPI).
                    example: >-
                      {"openapi":"3.0.3","info":{"title":"Example
                      API","version":"1.0.0"},"paths":{"/example":{"get":{"summary":"Example
                      endpoint","responses":{"200":{"description":"Successful
                      response"}}}}}}
                  type:
                    title: API Spec Type
                    type: string
                    example: oas3
                    description: >
                      The type of specification being stored. This allows us to
                      render the specification correctly.
                    enum:
                      - oas2
                      - oas3
                      - asyncapi
                    readOnly: true
                    x-speakeasy-unknown-values: allow
                  validation_messages:
                    type: array
                    description: >-
                      The errors that occurred while parsing the API version
                      spec.
                    readOnly: true
                    items:
                      type: object
                      additionalProperties: false
                      required:
                        - message
                      properties:
                        message:
                          type: string
                  provider:
                    title: ApiSpecProvider
                    description: >
                      The provider used to supply the spec content. In write
                      requests, provide

                      this instead of or alongside content. If omitted on
                      writes, the server

                      infers type raw from spec.content.
                    x-internal: true
                    oneOf:
                      - &ref_0
                        $ref: '#/components/schemas/RawApiSpecProvider'
                      - &ref_1
                        $ref: '#/components/schemas/UrlApiSpecProvider'
                      - &ref_2
                        $ref: '#/components/schemas/IntegrationApiSpecProviderPayload'
                      - &ref_3
                        $ref: >-
                          #/components/schemas/ResourceBoundIntegrationApiSpecProviderPayload
              created_at:
                $ref: '#/components/schemas/CreatedAt'
              updated_at:
                $ref: '#/components/schemas/UpdatedAt'
            required:
              - id
              - version
              - created_at
              - updated_at
