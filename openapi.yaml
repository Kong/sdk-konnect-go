          oneOf:
            - $ref: '#/components/schemas/UrlApiSpecProvider'
            - $ref: '#/components/schemas/RawApiSpecProviderPayload'
            - $ref: '#/components/schemas/IntegrationApiSpecProviderPayload'
            - $ref: >-
                #/components/schemas/ResourceBoundIntegrationApiSpecProviderPayload
    CatalogServiceApiSpecFilterParameters:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/StringFieldFilter'
    CatalogServiceApiSpec:
      type: object
      required:
        - id
        - service_id
        - name
        - description
        - resource_id
        - provider
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: eadb88fe-e8eb-45c2-9591-dc783f93f29b
          description: The API spec ID
        service_id:
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          description: The ID of the service the API spec is associated to.
        name:
          type: string
          description: The name of the API
          minLength: 1
          maxLength: 120
          example: Pet Store
        description:
          type: string
          description: The description of the API.
          nullable: true
          maxLength: 2048
          example: >
            A sample API that uses a pet store as an example to demonstrate
            features in the OpenAPI specification.
        resource_id:
          type: string
          nullable: true
          description: >
            The ID of the Resource that is bound to the API spec.

            Only set when the given `provider.type` requires a 1-to-1 mapping
            between Resource

            and API Spec.
          example: IqkHvMdyHukxcwAs
        provider:
          title: ApiSpecProvider
          description: Represents the provider, or source, of API spec contents.
          oneOf:
            - $ref: '#/components/schemas/UrlApiSpecProvider'
            - $ref: '#/components/schemas/RawApiSpecProvider'
            - $ref: '#/components/schemas/IntegrationApiSpecProvider'
            - $ref: '#/components/schemas/ResourceBoundIntegrationApiSpecProvider'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
    ApiSpecContents:
      title: ApiSpecContents
      description: Represents raw API spec contents
      type: object
      additionalProperties: true
      example:
        openapi: 3.0.0
        info:
          version: 1.0.0
          title: Swagger Petstore
        servers:
          - url: http://petstore.swagger.io/v1
        paths: {}
    ApiSpecContentsPreview:
      title: ApiSpecContentsPreview
      description: Represents raw API spec contents in JSON format
      type: string
    ApiSpecContentsPreviewYaml:
      title: ApiSpecContentsPreviewYaml
      description: Represents raw API spec contents in YAML format
      type: string
    ApiSpecContentsYaml:
      title: ApiSpecContentsYaml
      description: Represents raw API spec contents
      type: string
    RawApiSpecProviderPayload:
      type: object
      properties:
        type:
          type: string
          enum:
            - raw
        config:
          title: RawApiSpecProviderConfig
          type: object
          additionalProperties: false
          properties:
            contents:
              type: string
              description: |
                Raw API spec file contents.
                Supports JSON or YAML format.
                Raw specs have a maximum size limit of 8mb.
              example: >
                {"openapi":"3.0.0","info":{"version":"1.0.0","title":"Swagger
                Petstore","license":{"name":"MIT"}},"servers":[{"url":"http://petstore.swagger.io/v1"}],"paths":{"/pets":{"get":{"summary":"List
                all
                pets","operationId":"listPets","tags":["pets"],"parameters":[{"name":"limit","in":"query","description":"How
                many items to return at one time (max
                100)","required":false,"schema":{"type":"integer","maximum":100,"format":"int32"}}],"responses":{"200":{"description":"A
                paged array of pets","headers":{"x-next":{"description":"A link
                to the next page of
                responses","schema":{"type":"string"}}},"content":{"application/json":{"schema":{"$ref":"#/components/schemas/Pets"}}}},"default":{"description":"unexpected
                error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}}}},"post":{"summary":"Create
                a
                pet","operationId":"createPets","tags":["pets"],"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/Pet"}}},"required":true},"responses":{"201":{"description":"Null
                response"},"default":{"description":"unexpected
                error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}}}}},"/pets/{petId}":{"get":{"summary":"Info
                for a specific
                pet","operationId":"showPetById","tags":["pets"],"parameters":[{"name":"petId","in":"path","required":true,"description":"The
                id of the pet to
                retrieve","schema":{"type":"string"}}],"responses":{"200":{"description":"Expected
                response to a valid
                request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Pet"}}}},"default":{"description":"unexpected
                error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}}}}}},"components":{"schemas":{"Pet":{"type":"object","required":["id","name"],"properties":{"id":{"type":"integer","format":"int64"},"name":{"type":"string"},"tag":{"type":"string"}}},"Pets":{"type":"array","maxItems":100,"items":{"$ref":"#/components/schemas/Pet"}},"Error":{"type":"object","required":["code","message"],"properties":{"code":{"type":"integer","format":"int32"},"message":{"type":"string"}}}}}}
          required:
            - contents
      required:
        - type
        - config
    IntegrationApiSpecProvider:
      description: >
        API spec provider registered by a catalog integration.


        Integrations can function as API spec providers where they register a
        globally unique

        `type` and config schema which defines the shape of `config`.


        Consult integration documentation to learn more about available API spec
        providers.
      type: object
      required:
        - type
        - config
        - integration
      properties:
        type:
          type: string
          description: >-
            The globally unique API spec provider type that is registered by a
            given catalog integration.
          minLength: 1
          maxLength: 120
          example: swaggerhub_api_version
        config:
          type: object
          additionalProperties: true
          minProperties: 1
          description: >-
            JSON object containing values as defined by integration provider's
            config schema.
          example:
            owner: petco
            api: pet_store
            version: v3
        integration:
          $ref: '#/components/schemas/IntegrationRef'
    ResourceBoundIntegrationApiSpecProvider:
      description: >
        API spec provider registered by a catalog integration.


        These providers differ from `IntegrationApiSpecProvider` in that they

        denote a binding relationship between a resource type and the API spec.

        This means that the API Spec will automatically be created/deleted
        for/from a service

        as resources of the given type are mapped/unmapped.


        Consult integration documentation to learn more about available API spec
        providers.
      type: object
      required:
        - type
        - config
        - integration
      properties:
        type:
          type: string
          description: >
            The globally unique API spec provider type that is registered by a
            given catalog integration.

            Resource-bound providers create a 1-to-1 mapping between a resource
            type and the API Spec.
          minLength: 1
          maxLength: 120
        config:
          type: object
          required:
            - resource_id
          properties:
            resource_id:
              type: string
              description: ID of the associated Resource the API spec is bound to.
              example: IqkHvMdyHukxcwAs
        integration:
          $ref: '#/components/schemas/IntegrationRef'
    CatalogIntegrationFilterParameters:
      type: object
      x-property-annotations:
        visibility:
          - x-internal
          - x-unstable
      properties:
        name:
          $ref: '#/components/schemas/StringFieldFilter'
        display_name:
          $ref: '#/components/schemas/StringFieldFilter'
        visibility:
          $ref: '#/components/schemas/StringFieldFilter'
    CatalogIntegration:
      type: object
      required:
        - built_in
        - name
        - display_name
        - version
        - authorization
        - config_schema
        - resource_types
        - discovery
        - api_spec_provider
        - events
        - visibility
      x-property-annotations:
        incident_provider:
          - x-internal
          - x-unstable
        on_call_provider:
          - x-internal
          - x-unstable
        pull_request_provider:
          - x-internal
          - x-unstable
        workflow_provider:
          - x-internal
          - x-unstable
      properties:
        name:
          type: string
          description: >-
            The machine name of the integration that uniquely identifies it
            within the catalog.
          example: gateway-manager
          readOnly: true
        display_name:
          type: string
          description: The display name of the integration.
          example: Gateway Manager
        description:
          type: string
          description: The description of the integration.
        built_in:
          type: boolean
          description: |
            Denotes whether the integration is built-in to the catalog.
            Built-in integrations are always connected and available by default.
          example: true
          readOnly: true
        version:
          type: string
          description: The integration version.
          example: v1
          readOnly: true
        visibility:
          type: string
          description: The visibility of the integration.
          enum:
            - public
            - private
          example: public
          x-speakeasy-unknown-values: allow
        authorization:
          $ref: '#/components/schemas/CatalogIntegrationAuthorization'
        config_schema:
          $ref: '#/components/schemas/CatalogIntegrationConfigSchema'
        resource_types:
          $ref: '#/components/schemas/CatalogIntegrationResourceTypes'
        discovery:
          $ref: '#/components/schemas/CatalogIntegrationDiscovery'
        api_spec_provider:
          $ref: '#/components/schemas/CatalogIntegrationApiSpecProvider'
        events:
          $ref: '#/components/schemas/CatalogIntegrationEvents'
        incident_provider:
          $ref: '#/components/schemas/CatalogIntegrationIncidentProvider'
        on_call_provider:
          $ref: '#/components/schemas/CatalogIntegrationOnCallProvider'
        pull_request_provider:
          $ref: '#/components/schemas/CatalogIntegrationPullRequestProvider'
        workflow_provider:
          $ref: '#/components/schemas/CatalogIntegrationWorkflowProvider'
    CatalogIntegrationAuthorization:
      title: CatalogIntegrationAuthorization
      description: Defines the authorization strategy for an integration.
      oneOf:
        - type: object
          nullable: true
        - $ref: '#/components/schemas/OAuth'
        - $ref: '#/components/schemas/MultiKeyAuth'
        - $ref: '#/components/schemas/GitHubAppInstallationAuth'
    OAuth:
      type: object
      description: >
        Defines the OAuth 2.0 authorization strategy used by an integration.

        This schema provides all necessary information for the platform to
        initiate

        and manage OAuth-based authorization flows on behalf of customers.
      required:
        - type
        - config
      properties:
        type:
          type: string
          const: oauth
        overridable_config:
          description: >
            A list of field names from the `config` object (e.g., `client_id`,
            `authorization_endpoint`, etc)

            that can be overridden on a per-customer basis. When a field is
            listed here, the catalog allows

            customer-defined values to take precedence over the default
            configuration provided by the integration.

            This supports flexible deployment models, including both SaaS-based
            and self-hosted OAuth authorization flows.
          type: array
          items:
            type: string
            enum:
              - client_id
              - client_secret
              - authorization_endpoint
              - token_endpoint
            x-speakeasy-unknown-values: allow
        config:
          type: object
          required:
            - grant_type
            - client_id
            - authorization_endpoint
            - token_endpoint
            - scope
            - rolling_refresh_exp_seconds
          properties:
            grant_type:
              type: string
              enum:
                - authorization_code
              description: >
                The OAuth 2.0 grant type used for authorization (e.g.,
                `authorization_code`).

                Determines the flow the integration uses to request access
                tokens.
            client_id:
              type: string
              example: d745213a-b7e8-4998-abe3-41f164001970
              description: >-
                The OAuth client identifier registered with the integration
                provider.
            authorization_endpoint:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  example: https://identity.service.com/oauth/authorize
                  description: The URL where users are redirected to authorize access.
            token_endpoint:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  example: https://identity.service.com/oauth/token
                  description: The URL used to retrieve access tokens.
            scope:
              type: array
              items:
                type: string
              example:
                - read
                - write
              description: |
                A list of permission scopes requested by the integration.
                Defines what level of access the token will grant.
            scope_delimiter:
              type: string
              default: ' '
              description: >
                A string used to separate multiple scopes in the `scope`
                parameter.
            rolling_refresh_exp_seconds:
              type: number
              nullable: true
              description: >
                Number of seconds before the refresh token grant can no longer
                be used to mint

                a new access token. Once expired clients must re-authenticate to
                restart the

                window interval.
              example: 15780000
    MultiKeyAuth:
      type: object
      description: >
        Defines an authentication strategy based on one or more API keys passed
        via HTTP headers.

        This strategy supports integrations that require custom headers for
        credential-based access,

        allowing flexibility across providers with different authentication
        header requirements.
      required:
        - type
        - config
      properties:
        type:
          type: string
          const: multi_key_auth
        config:
          type: object
          required:
            - headers
          properties:
            headers:
              type: array
              minItems: 1
              description: >
                A list of header definitions used to transmit API credentials to
                the integration's external API.

                Each header represents a unique key required by the provider.
              items:
                type: object
                title: KeyAuthHeader
                required:
                  - name
                  - display_name
                  - description
                properties:
                  name:
                    description: >-
                      The exact name of the HTTP request header where the
                      credential should be inserted.
                    type: string
                    example: X-API-Key
                  display_name:
                    description: >-
                      An optional user-friendly label for the key, used in UI
                      forms to guide users.
                    type: string
                    example: API Key
                    nullable: true
                  description:
                    description: >-
                      An optional brief explanation of the purpose or usage of
                      the key.
                    type: string
                    nullable: true
    GitHubAppInstallationAuth:
      type: object
      description: >
        Defines the GitHub App authorization strategy used by the GitHub
        integration.

        This strategy enables secure access to GitHub APIs using app
        installation tokens.

        It supports both API-based interactions and real-time event delivery via
        GitHub webhooks.

        Unlike standard OAuth flows, this strategy leverages GitHub's custom app
        installation flow

        and token lifecycle, making it ideal for deep, organization-level GitHub
        integration.
      required:
        - type
        - config
      properties:
        type:
          type: string
          const: github_app_installation
        config:
          type: object
          required:
            - app_install_url
            - app_manage_url
            - authorize_app_installation_endpoint
            - pending_app_installs_endpoint
          properties:
            app_install_url:
              type: object
              additionalProperties: false
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  example: >-
                    https://global.api.konghq.com/service-catalog-integrations/github/app/install
                  description: >
                    The URL where customers are directed to install the GitHub
                    App into their

                    GitHub organization.
            app_manage_url:
              type: object
              additionalProperties: false
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  example: >-
                    https://global.api.konghq.com/service-catalog-integrations/github/app/manage
                  description: >-
                    The GitHub App management page URL where users can view,
                    configure, or uninstall the app after installation.
            authorize_app_installation_endpoint:
              type: object
              additionalProperties: false
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  example: >-
                    https://global.api.konghq.com/service-catalog-integrations/github/app/authorize-installation
                  description: >
                    The endpoint used to link a completed GitHub App
                    installation with a customer account in the catalog.

                    This step finalizes the integration by exchanging metadata
                    from the GitHub installation event.
            pending_app_installs_endpoint:
              type: object
              additionalProperties: false
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  example: >-
                    https://global.api.konghq.com/service-catalog-integrations/github/app/pending-installs
                  description: >
                    The endpoint used to return a list of in-progress or
                    unlinked GitHub App installations awaiting user
                    confirmation.
    CatalogIntegrationConfigSchema:
      description: Defines the configuration schema for the integration.
      additionalProperties:
        oneOf:
          - type: object
            nullable: true
          - $ref: '#/components/schemas/StringConfigFieldSchema'
          - $ref: '#/components/schemas/EnumConfigFieldSchema'
          - $ref: '#/components/schemas/BooleanConfigFieldSchema'
      example:
        base_url:
          type: string
          display_name: Base URL
          description: The customer-specific API URL
          required: true
    StringConfigFieldSchema:
      type: object
      properties:
        display_name:
          type: string
          description: user-friendly name of the configuration field.
        description:
          type: string
          description: Optional brief description of the configuration field.
        required:
          type: boolean
          description: Denotes whether the config field is a required value.
          default: false
        mutable_condition:
          $ref: '#/components/schemas/MutableCondition'
        type:
          type: string
          description: The field type of the config value.
          enum:
            - string
        default:
          type: string
          description: The default value for the config field.
      title: StringConfigFieldSchema
      description: Defines a string value integration config field.
      required:
        - type
    EnumConfigFieldSchema:
      type: object
      properties:
        display_name:
          type: string
          description: user-friendly name of the configuration field.
        description:
          type: string
          description: Optional brief description of the configuration field.
        required:
          type: boolean
          description: Denotes whether the config field is a required value.
          default: false
        mutable_condition:
          $ref: '#/components/schemas/MutableCondition'
        type:
          type: string
          description: The field type of config value.
          enum:
            - enum
        choices:
          type: array
          description: >-
            List of enumerated choices that can be selected as the config field
            value.
          items:
            type: object
            required:
              - value
              - display_name
            properties:
              value:
                type: string
                description: The value represented by this option.
              display_name:
                type: string
                description: user-friendly name of the option.
              description:
                type: string
                description: Optional brief description of the option.
        default:
          type: string
          description: |
            The default value for the config field.
            Must reference the value of an option listed in `choices`.
      title: EnumConfigFieldSchema
      description: Defines an enum value integration config field.
      required:
        - type
        - choices
    BooleanConfigFieldSchema:
      type: object
      properties:
        display_name:
          type: string
          description: user-friendly name of the configuration field.
        description:
          type: string
          description: Optional brief description of the configuration field.
        required:
          type: boolean
          description: Denotes whether the config field is a required value.
          default: false
        mutable_condition:
          $ref: '#/components/schemas/MutableCondition'
        type:
          type: string
          description: The field type of the config value.
          enum:
            - boolean
        default:
          type: boolean
          description: The default value for the config field.
      title: BooleanConfigFieldSchema
      description: Defines a boolean value integration config field.
      required:
        - type
    MutableCondition:
      description: >
        Defines the condition under which this configuration field is allowed to
        be modified.

        When specified, the platform will restrict updates to this field unless
        the integration

        meets the given condition.


        For example, setting `mutable_condition: unauthorized` means the field
        can only be

        changed while the integration is in an unauthorized state.
      type: string
      enum:
        - unauthorized
    CatalogIntegrationResourceTypes:
      type: object
      description: >
        Defines the resource types that the integration manages within the
        catalog.


        This schema is a key-value object where:
          - Keys are globally unique, machine-readable identifiers for each resource type.
          - Values are objects describing metadata about the resource type.

        This declaration enables the platform to understand the structure,
        identity, and behavior of resources discovered by the integration.

        By registering resource types, integrations communicate the kinds of
        entities they will ingest and maintain,

        allowing the catalog to enforce consistency, validation, and visibility
        across all integrations.
      additionalProperties:
        type: object
        title: ResourceType
        x-property-annotations:
          resource_id_template:
            - x-internal
            - x-unstable
          integration_data_schema:
            - x-internal
            - x-unstable
        required:
          - resource_id_template
          - schema
          - integration_data_schema
        properties:
          display_name:
            type: string
            description: The user-friendly resource type name.
          resource_id_template:
            type: string
            description: >
              Custom template used to generate a string that uniquely identifies
              a resource.

              The template must include at least one key defined in the resource
              type schema definition, enclosed in double curly braces (e.g.,
              `{{field_name}}`).

              This template must not reference keys not required to identify the
              external resource.
          schema:
            $ref: '#/components/schemas/SimpleSchema'
          integration_data_schema:
            $ref: >-
              #/components/schemas/CatalogIntegrationResourceTypeIntegrationDataSchema
      example:
        gateway_svc:
          display_name: Gateway Service
          schema:
            type: simple
            definition:
              control_plane_id: string
              gatway_service_id: string
          resource_id_template: '{{control_plane_id}}:{{gateway_service_id}}'
          integration_data_schema: null
        analytics_dashboard:
          display_name: Dashboard
          schema:
            type: simple
            definition:
              dashboard_id: string
          resource_id_template: '{{dashboard_id}}'
          integration_data_schema: null
    CatalogIntegrationResourceTypeIntegrationDataSchema:
      oneOf:
        - title: EmptySchema
          type: object
          nullable: true
        - type: object
          required:
            - type
            - definition
          properties:
            type:
              type: string
              enum:
                - simple
            definition:
              type: object
              additionalProperties:
                type: string
                enum:
                  - string
                  - number
                  - boolean
          title: CatalogIntegrationResourceTypeIntegrationDataSimpleSchema
          description: >
            Defines the schema to validate incoming integration_data values for
            a resource type, on resource

            ingestion, using simple schema.

            Set to `null` when the given resource type does not validate
            incoming integration_data.
        - type: object
          required:
            - type
            - definition
          properties:
            type:
              type: string
              enum:
                - json_schema
            definition:
              type: object
              additionalProperties: true
          title: CatalogIntegrationResourceTypeIntegrationDataJSONSchema
          description: >
            Defines the schema to validate incoming integration_data values for
            a resource type, on resource

            ingestion, using JSON schema.

            Set to `null` when the given resource type does not validate
            incoming integration_data.
    CatalogIntegrationDiscovery:
      type: object
      description: >
        Defines how the integration participates in Discovery.

        Discovery enables integrations to automatically ingest and update
        resources in the catalog.
      nullable: true
      required:
        - resource_integration_data_examples
      properties:
        resource_integration_data_examples:
          description: >
            A map of example resource `integration_data` payloads by resource
            type.

              - Keys are the machine-readable, globally unique names of resource types registered by this integration.
              - Values are example `integration_data` payloads.
          type: object
          additionalProperties:
            type: object
            additionalProperties: true
            description: An example `integration_data` payload for the given resource type.
          example:
            gateway_service:
              control_plane:
                id: 00000000-0000-0000-0000-000000000000
                name: dev-ext
                labels:
                  env: development
              gateway_service:
                id: 11111111-1111-1111-1111-111111111111
                name: gateway-service
                host: konghq.com
                path: /example
                type: service
                port: 443
                protocol: https
                enabled: true
    CatalogIntegrationApiSpecProvider:
      description: >
        Defines how an integration behaves as a source provider of Catalog
        Service API specs.

        API specs are entities that can be attached to Catalog Services.

        When an integration implements this capability, it can act as a source
        type for API spec contents.

        In this role, the integration becomes the source of truth for the spec.

        When a spec is attached to a Catalog Service using this source type, the
        platform relies on the external system to provide and update the spec
        data.

        A null value indicates the given integration does not act as a source
        provider of API specs.
      type: object
      nullable: true
      required:
        - name
        - display_name
        - description
        - config_schema
        - resource_type
      properties:
        name:
          type: string
          example: konnect_api
          description: >
            The globally unique name of the API spec provider that identifies it
            within the catalog.

            Corresponds to the API spec provider `type` when creating API specs.
        display_name:
          type: string
          example: Konnect API
          description: A user-friendly name for the API spec provider.
        description:
          type: string
          description: An brief description of the API spec provider.
        config_schema:
          type: object
          required:
            - type
            - definition
          properties:
            type:
              type: string
              enum:
                - simple
            definition:
              type: object
              additionalProperties:
                type: string
                enum:
                  - string
                  - number
                  - boolean
                x-speakeasy-unknown-values: allow
          description: Defines the shape of the API spec provider config.
          example:
            type: simple
            definition:
              api_id: string
        resource_type:
          type: string
          nullable: true
          description: >
            When non-null, denotes that the API spec provider is bound to the
            given Resource type.

            This means that API specs are auto-created when a Resource of the
            given type is mapped to a service.

            Furthermore, it couples the lifecycle of the API Spec with the given
            Resource mapping.

            When the given Resource is removed, the API spec will be deleted.
    CatalogIntegrationIncidentProvider:
      description: >
