      properties:
        value:
          type: string
          pattern: ^\-?[0-9]+(\.[0-9]+)?$
          description: The aggregated value.
        from:
          type: string
          format: date-time
          description: The start of the time bucket the value is aggregated over.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
        to:
          type: string
          format: date-time
          description: The end of the time bucket the value is aggregated over.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
        dimensions:
          type: object
          additionalProperties:
            type: string
          description: >-
            The dimensions the value is aggregated over. `subject` and
            `customer_id` are

            reserved dimensions.
      additionalProperties: false
      description: A row in the result of a meter query.
      example:
        value: '12.3456'
        from: '2023-01-01T00:00:00Z'
        to: '2023-01-02T00:00:00Z'
        dimensions:
          customer_id: 01G65Z755AFWAKHE12NY0CQ9FH
          model: gpt-4-turbo
          type: input
