        - container_image
        - library
      readOnly: true
      example: container_image
      x-speakeasy-unknown-values: allow
    VulnerabilitySeverity:
      type: string
      enum:
        - low
        - medium
        - high
        - critical
      example: low
      x-speakeasy-unknown-values: allow
    VulnerabilityState:
      type: string
      enum:
        - open
        - fixed
        - dismissed
      example: dismissed
      x-speakeasy-unknown-values: allow
    BaseVulnerability:
      title: BaseVulnerability
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 9932dcab-ec65-46a1-9871-df0aae8e1e8e
        cve_id:
          type: string
          nullable: true
          example: CVE-2025-1000
        fixed_versions:
          type: array
          items:
            type: string
          nullable: true
          example:
            - 1.0.1
            - 2.0.0
        title:
          type: string
          example: Summary of CVE finding.
        description:
          type: string
          nullable: true
          example: Further description text of CVE finding.
        severity:
          $ref: '#/components/schemas/VulnerabilitySeverity'
        severity_score:
          type: integer
          example: 1
          description: numeric representation of severity
        type:
          $ref: '#/components/schemas/VulnerabilityType'
        raw_finding:
          type: object
          additionalProperties: true
        opened_at:
          type: string
          format: date-time
          readOnly: true
          example: '2025-01-01T20:41:45.068Z'
        reopened_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          example: '2025-01-02T20:41:45.068Z'
        last_opened_at:
          type: string
          format: date-time
          readOnly: true
          example: '2025-01-02T20:41:45.068Z'
        dismissed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          example: '2025-01-01T21:41:45.068Z'
        dismissed_reason:
          type: string
          nullable: true
          example: no_bandwidth
        fixed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          example: '2025-01-01T22:41:45.068Z'
        instance_count:
          type: integer
          example: 1
          readOnly: true
        package:
          $ref: '#/components/schemas/VulnerabilityPackage'
        sources:
          type: array
          items:
            type: string
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      required:
        - id
        - cve_id
        - title
        - description
        - severity
        - severity_score
        - type
        - raw_finding
        - opened_at
        - reopened_at
        - last_opened_at
        - dismissed_at
        - dismissed_reason
        - fixed_at
        - fixed_versions
        - instance_count
        - package
        - sources
        - created_at
        - updated_at
    CatalogVulnerability:
      title: Vulnerability
      type: object
      additionalProperties: false
      allOf:
        - $ref: '#/components/schemas/BaseVulnerability'
        - type: object
          properties:
            state:
              $ref: '#/components/schemas/CatalogVulnerabilityState'
            service_count:
              type: integer
              example: 1
          required:
            - state
            - service_count
    Vulnerability:
