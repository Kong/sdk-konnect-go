    PublicLabels:
      description: |
        Public labels store information about an entity that can be used for filtering a list of objects.

        Public labels are intended to store **PUBLIC** metadata. 

        Keys must be of length 1-63 characters, and cannot start with "kong", "konnect", "mesh", "kic", or "_".
      type: object
      example:
        category: finance
      additionalProperties:
        type: string
        pattern: '^[a-z0-9A-Z]{1}([a-z0-9A-Z-._]*[a-z0-9A-Z]+)?$'
        minLength: 1
        maxLength: 63
      maxProperties: 50
      title: PublicLabels
    TooManyRequestsError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 429
            title:
              example: Too Many Requests
            type:
              example: 'https://httpstatuses.com/429'
            instance:
              example: 'kong:trace:1234567890'
            detail:
              example: Too Many Requests
    ManagedBy:
      description: |
        Stores information about what manages this entity, such as the tool or system responsible for its lifecycle (for example, `terraform`).

        Keys must be 1–63 characters long and start with an alphanumeric character.
      type: object
      example:
        owner: terraform
      additionalProperties:
        type: string
        pattern: '^[a-z0-9A-Z]{1}([a-z0-9A-Z-._]*[a-z0-9A-Z]+)?$'
        minLength: 1
        maxLength: 63
      maxProperties: 5
      title: ManagedBy
    MCPServerPodsStatus:
      type: object
      properties:
        ready:
          description: Number of pods in the ready state.
          type: integer
          example: 2
          minimum: 0
        starting:
          description: Number of pods in the starting state.
          type: integer
          example: 0
          minimum: 0
        failing:
          description: Number of pods in the failing state.
          type: integer
          example: 0
          minimum: 0
      required:
        - ready
        - starting
        - failing
    MCPServerVersionStatus:
      type: object
      properties:
        version:
          description: The version identifier of the MCP server deployment.
          type: string
          example: v1
        desired_replicas:
          description: The desired number of replicas for this version.
          type: integer
          example: 2
          minimum: 0
        created_replicas:
          description: The number of replicas that have been created for this version.
          type: integer
          example: 2
          minimum: 0
        pods_status:
          $ref: '#/components/schemas/MCPServerPodsStatus'
      required:
        - version
        - desired_replicas
        - created_replicas
        - pods_status
    MCPServerStatusRequest:
      description: |
        List of per-version deployment statuses for the MCP server.
      type: array
      items:
        $ref: '#/components/schemas/MCPServerVersionStatus'
    MCPServerInfo:
      type: object
      properties:
        id:
          description: The unique identifier for the MCP server.
          type: string
          format: uuid
        name:
          description: The name of the MCP server.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: A description of the MCP server.
          type: string
          maxLength: 1024
        labels:
          description: Labels for the MCP server.
          type: object
          additionalProperties:
            type: string
        deployed_at:
          description: The timestamp when the MCP server was deployed.
          type: string
          format: date-time
        control_plane_id:
          description: The control plane ID associated with the MCP server.
          type: string
          format: uuid
          nullable: true
        resource_id:
          description: The MCP resource ID associated with the MCP server.
          type: string
          format: uuid
          nullable: true
        mode:
          description: |
            The deployment mode of the MCP server on the associated Control Plane.
          allOf:
            - $ref: '#/components/schemas/MCPServerControlPlaneMappingMode'
          nullable: false
        version:
          description: The version of the MCP server.
          type: string
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      required:
        - id
        - name
        - created_at
        - updated_at
        - version
    ContainerSpec:
      type: object
      properties:
        image:
          description: The container image to use.
          type: string
    MCPServerCPInfo:
      allOf:
        - $ref: '#/components/schemas/MCPServerInfo'
        - type: object
          properties:
            container:
              allOf:
                - $ref: '#/components/schemas/ContainerSpec'
                - description: Configuration for the main container.
            init_container:
              allOf:
                - $ref: '#/components/schemas/ContainerSpec'
                - description: Configuration for the init container.
    ListMCPServersCPInfoResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MCPServerCPInfo'
        meta:
          $ref: '#/components/schemas/CursorMeta'
      required:
        - data
        - meta
    KongEntitiesResponse:
      type: object
      properties:
        routes:
          type: array
          items:
            $ref: '#/components/schemas/KongRoute'
        services:
          type: array
          items:
            $ref: '#/components/schemas/KongService'
      required:
        - routes
        - services
    KongService:
      type: object
      properties:
        id:
          description: Service ID
          type: string
          format: uuid
        name:
          description: Service name
          type: string
          example: mcp-test-service
        protocol:
          description: The protocol used to communicate with the Service.
          type: string
          example: https
        host:
          description: Service host
          type: string
          example: mcp-test-service.svc.cluster.local
        port:
          description: Service port
          type: integer
          example: 80
          maximum: 65535
          minimum: 1
        path:
          description: Service path
          type: string
          example: /
      required:
        - name
        - protocol
        - host
        - port
        - path
    KongRoute:
      type: object
      properties:
        id:
          description: Route ID
          type: string
          format: uuid
        name:
          description: Route name
          type: string
          example: mcp-test-route-jsonrpc
        service:
          description: Reference to the service
          type: object
          properties:
            id:
              type: string
              format: uuid
        paths:
          description: Request paths
          type: array
          items:
            type: string
          example:
            - /mcp/test-service
        methods:
          description: HTTP methods
          type: array
          items:
            type: string
          example:
            - POST
      required:
        - name
        - paths
        - methods
    MCPServerCodeResponse:
      type: object
      properties:
        code:
          description: Generated Python code for the MCP server implementation
          type: string
          example: print("Hello MCP")
      required:
        - code
    MCPCapabilitiesMap:
      description: |
        Map of capability name -> capability request fields.

        Example:
          {
            "mcp": { "version": "v1", "offset": "5" }
          }
      type: object
      properties:
        mcp:
          $ref: '#/components/schemas/MCPCapabilityRequest'
    MCPCapabilityRequest:
      type: object
      properties:
        version:
          description: 'The version of the capability schema (e.g., v1).'
          type: string
        offset:
          description: The version of the control plane known by the client.
          type: string
      additionalProperties: false
      required:
        - version
    MCPServerSignalV1:
      description: |
        Signal notifying the client that the MCP control plane config has changed.
      type: object
      properties:
        type:
          type: string
          enum:
            - mcp
        version:
          description: The current version of the MCP control plane.
          type: string
        offset:
          description: The offset for the MCP signal.
          type: string
      example:
        type: mcp
        version: v1
        offset: '6'
      additionalProperties: false
      required:
        - type
        - version
        - offset
    MCPServerSignal:
      description: A single signal envelope containing exactly one typed capability signal.
      discriminator:
        propertyName: type
        mapping:
          mcp: '#/components/schemas/MCPServerSignalV1'
      oneOf:
        - $ref: '#/components/schemas/MCPServerSignalV1'
    MCPServerSignals:
      description: The MCP server signals response.
      type: object
      properties:
        signals:
          description: A list of signals for the MCP server.
          type: array
          items:
            $ref: '#/components/schemas/MCPServerSignal'
      required:
        - signals
    MCPServerControlPlaneMappingMode:
