                - $ref: '#/components/schemas/BooleanFieldFilter'
                - $ref: '#/components/schemas/NumericFieldFilter'
    VulnerabilitiesMetricsQuery:
      type: object
      description: A query against vulnerability metrics.
      additionalProperties: false
      required:
        - metrics
        - dimensions
        - filters
        - time_range
      properties:
        metrics:
          type: array
          minItems: 1
          maxItems: 1
          description: >-
            List of aggregated metrics to collect across the requested time
            span.
          items:
            type: string
            enum:
              - vulnerability_count
        dimensions:
          type: array
          description: The list of dimensions to group by.
          maxItems: 2
          example:
            - service
            - state
          items:
            type: string
            enum:
              - time
              - service
              - severity
              - state
              - type
              - source
              - environment
              - region
            x-speakeasy-unknown-values: allow
        filters:
          type: array
          description: A list of filters to apply to the query.
          items:
            oneOf:
              - $ref: '#/components/schemas/VulnerabilitiesMetricsFilterByService'
              - $ref: '#/components/schemas/VulnerabilitiesMetricsFilterBySeverity'
              - $ref: '#/components/schemas/VulnerabilitiesMetricsFilterByState'
              - $ref: '#/components/schemas/VulnerabilitiesMetricsFilterByType'
              - $ref: '#/components/schemas/VulnerabilitiesMetricsFilterBySource'
              - $ref: '#/components/schemas/VulnerabilitiesMetricsFilterByEnvironment'
              - $ref: '#/components/schemas/VulnerabilitiesMetricsFilterByRegion'
              - $ref: '#/components/schemas/VulnerabilitiesMetricsFilterByCVE'
              - $ref: '#/components/schemas/VulnerabilitiesMetricsFilterByPackageName'
              - $ref: >-
                  #/components/schemas/VulnerabilitiesMetricsFilterByScanAttributes
        granularity:
          type: string
          description: >
            Force time grouping into buckets of the specified duration. Only has
            an effect if `time` is in the `dimensions` list.


            The granularity of the result may be coarser than requested.

            The exact result granularity will be reported in the response
            `meta.granularity_ms` field.


            If granularity is not specified and `time` is in the `dimensions`
            list, a default will be chosen based on the time range requested.


            Different relative times support different granularities:
              - 1d  => daily
              - 7d  => daily, weekly
              - 3w  => daily, weekly
              - 30d => daily, weekly
              - 3mo => daily, weekly
              - 1y  => daily, weekly

            For special time ranges:
              - current_week, previous_week   => daily
              - current_month, previous_month => daily, weekly

            For absolute time ranges, daily will be used.
          enum:
            - daily
            - weekly
          x-speakeasy-unknown-values: allow
        time_range:
          description: The time range to query.
          oneOf:
            - $ref: '#/components/schemas/VulnerabilityMetricsRelativeTimeRange'
            - $ref: '#/components/schemas/VulnerabilityMetricsAbsoluteTimeRange'
          discriminator:
            propertyName: type
            mapping:
              relative: '#/components/schemas/VulnerabilityMetricsRelativeTimeRange'
              absolute: '#/components/schemas/VulnerabilityMetricsAbsoluteTimeRange'
    VulnerabilitiesMetricsFilterByService:
      type: object
      required:
        - operator
