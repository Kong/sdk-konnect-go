        reopened_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          example: '2025-01-02T20:41:45.068Z'
        last_opened_at:
          type: string
          format: date-time
          readOnly: true
          example: '2025-01-02T20:41:45.068Z'
        dismissed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          example: '2025-01-01T21:41:45.068Z'
        dismissed_reason:
          type: string
          nullable: true
          readOnly: true
