                  pattern: ^\-?[0-9]+(\.[0-9]+)?$
                  description: >-
                    Number of usage units granted free before billing starts.
                    Only applies to

                    usage-based lines (not flat fees). Usage is treated as zero
                    until this amount is

                    exhausted.
              additionalProperties: false
              description: Discount configuration from the rate card.
              title: Discounts
              readOnly: true
          additionalProperties: false
          description: The rate card configuration snapshot used to price this line item.
          title: Rate card
          readOnly: true
        detailed_lines:
          type: array
          items:
            $ref: '#/components/schemas/BillingInvoiceDetailedLine'
          description: |-
            Detailed sub-lines that this line has been broken down into.

            Present when line has individual details.
          title: Detailed lines
          readOnly: true
        charge:
          type: object
          required:
            - id
          properties:
            id:
              type: string
              pattern: ^[0-7][0-9A-HJKMNP-TV-Z]{25}$
              description: Unique identifier for the charge.
              title: ID
              example: 01G65Z755AFWAKHE12NY0CQ9FH
              readOnly: true
          additionalProperties: false
          description: Reference to the charge associated with this line item.
          title: Charge
          readOnly: true
      additionalProperties: false
      description: >-
        A top-level line item on an invoice.


        Each line represents a single charge, typically associated with a rate
        card from

        a subscription. Detailed (child) lines are nested under `detailed_lines`
        when

        present.
    BillingInvoiceValidationIssue:
      type: object
      required:
        - code
        - message
        - severity
      properties:
        code:
          type: string
          description: Machine-readable error code.
          title: Code
          readOnly: true
        message:
          type: string
          description: Human-readable description of the error.
          title: Message
          readOnly: true
        attributes:
          type: object
          additionalProperties: {}
          description: Additional structured context.
          title: Attributes
          readOnly: true
        severity:
          type: string
          enum:
            - critical
            - warning
          description: Severity of the validation issue.
          title: Severity
          readOnly: true
          x-speakeasy-unknown-values: allow
        field:
          type: string
          description: >-
            JSON path to the field that caused this validation issue, if
            applicable.


            For example: `lines/0/rate_card/price`.
          title: Field path
          readOnly: true
      additionalProperties: false
      description: >-
        A validation issue found during invoice processing.


        Converges on the same structure used by plan and subscription validation
        errors:

        a machine-readable `code`, a human-readable `message`, optional
        structured

        `attributes`, plus a `severity` and optional `field` path.
    BillingInvoiceWorkflow:
