          $ref: '#/components/schemas/EventGatewayEncryptConfig'
        condition:
          type: string
          description: >-
            A string containing the boolean expression that determines whether
            the policy is applied.
          maxLength: 1000
          default: ''
          x-expression:
            type: boolean
            fields:
              - name: context.auth.principal.name
                type: string
                description: >-
                  Name of authenticated principal. Username in case of
                  PLAIN/SCRAM, `sub` claim in case of OAUTHBEARER.
              - name: context.auth.principal.id
                type: string
                description: >-
                  Kong Identity principal ID. Only populated when Kong Identity
                  principal fetching is configured and succeeds.


                  **Requires a minimum runtime version of `1.2`**.
                x-min-runtime-version: '1.2'
              - name: context.auth.principal.metadata
                type: object
                description: >-
                  Kong Identity principal metadata. Only populated when Kong
                  Identity principal fetching is configured and succeeds. Values
                  can be strings, numbers, booleans, arrays or nested JSON
                  objects.


                  **Requires a minimum runtime version of `1.2`**.
                x-min-runtime-version: '1.2'
              - name: context.auth.type
                type: string
                description: >
                  The matched authentication type from a virtual cluster:
                  anonymous, sasl_plain, sasl_scram_sha256, sasl_scram_sha512,
                  sasl_oauth_bearer.
              - name: context.topic.name
                type: string
                description: The name of the topic.
              - name: record.headers
                type: object
                description: An associative array of header key value pairs.
