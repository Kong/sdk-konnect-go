        - type
      properties:
        type:
          type: string
          enum:
            - boolean
          description: The type of the entitlement template.
          title: Type
      additionalProperties: false
      description: The entitlement template of a boolean entitlement.
    BillingRateCardMeteredEntitlement:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - metered
          description: The type of the entitlement template.
          title: Type
        is_soft_limit:
          type: boolean
          description: >-
            If soft limit is true, the subject can use the feature even if the
            entitlement

            is exhausted; access remains granted.
          title: Soft limit
          default: false
        limit:
          type: number
          format: double
          minimum: 0
          description: >-
            The amount of usage granted each usage period, in the feature's
            unit. Usage is

            counted against this allowance and the balance resets every usage
            period. When

            `is_soft_limit` is true the subject keeps access after the limit is
