              $ref: '#/components/schemas/ServiceReference'
          required:
            - state
            - service
    ScanVulnerability:
      title: ScanVulnerability
      type: object
      additionalProperties: false
      allOf:
        - $ref: '#/components/schemas/Vulnerability'
        - type: object
          properties:
            scan_state:
              $ref: '#/components/schemas/ScanVulnerabilityState'
          required:
            - scan_state
    ServiceReference:
      title: ServiceReference
      type: object
      description: Reference object containing information about a related service.
      properties:
        id:
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          description: The service ID.
          readOnly: true
        name:
          type: string
          description: The name of the Service.
          minLength: 1
          maxLength: 120
          pattern: ^[0-9a-z.-]+$
          example: user-svc
        display_name:
          type: string
          description: The display name of the Service.
          minLength: 1
