    SubscriptionAddonRateCard:
      description: A rate card for a subscription add-on.
      type: object
      properties:
        rate_card:
          description: The rate card.
          type: object
          additionalProperties: false
          properties:
            name:
              description: |-
                Display name of the resource.

                Between 1 and 256 characters.
              type: string
              maxLength: 256
              minLength: 1
            description:
              description: |-
                Optional description of the resource.

                Maximum 1024 characters.
              type: string
              maxLength: 1024
            labels:
              $ref: '#/components/schemas/Labels'
            key:
              $ref: '#/components/schemas/ResourceKey'
            feature:
              description: The feature associated with the rate card.
              type: object
              additionalProperties: false
              properties:
                id:
                  $ref: '#/components/schemas/ULID'
              required:
                - id
              title: Feature reference
            billing_cadence:
              description: |-
                The billing cadence of the rate card. When null, the charge is one-time
                (non-recurring). Only valid for flat prices.
              type: string
              format: ISO8601
              example: P1Y
              pattern: '^P(?:\d+(?:\.\d+)?Y)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?W)?(?:\d+(?:\.\d+)?D)?(?:T(?:\d+(?:\.\d+)?H)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?S)?)?$'
              title: Billing cadence
            price:
              description: The price of the rate card.
              type: object
              discriminator:
                propertyName: type
                mapping:
                  free: '#/components/schemas/BillingPriceFree'
                  flat: '#/components/schemas/BillingPriceFlat'
                  unit: '#/components/schemas/BillingPriceUnit'
                  graduated: '#/components/schemas/BillingPriceGraduated'
                  volume: '#/components/schemas/BillingPriceVolume'
              oneOf:
                - $ref: '#/components/schemas/BillingPriceFree'
                - $ref: '#/components/schemas/BillingPriceFlat'
                - $ref: '#/components/schemas/BillingPriceUnit'
                - $ref: '#/components/schemas/BillingPriceGraduated'
                - $ref: '#/components/schemas/BillingPriceVolume'
              title: Price
            unit_config:
              description: |-
                Unit conversion configuration for the rate card.

                Synthesized on read for plans authored with v1 dynamic or package prices:
                dynamic prices map to a unit price with a multiply unit config, and package
                prices map to a unit price with a divide unit config.

                Accepted on create and update only when the UnitConfig feature is enabled on the
                deployment; otherwise rejected.
              type: object
              additionalProperties: false
              properties:
                operation:
                  description: The arithmetic operation to apply to the raw metered quantity.
                  type: string
                  enum:
                    - divide
                    - multiply
                  title: Conversion operation
                  x-speakeasy-unknown-values: allow
                conversion_factor:
                  description: |-
                    The factor used in the conversion operation.

                    - For `divide`: `converted = raw / conversionFactor`.
                    - For `multiply`: `converted = raw × conversionFactor`.

                    Must be a positive non-zero value.
                  type: string
                  pattern: '^\-?[0-9]+(\.[0-9]+)?$'
                  title: Conversion factor
                rounding:
                  description: |-
                    The rounding mode applied to the converted quantity for invoicing.

                    Defaults to none (no rounding). Entitlement checks always use the precise
                    (unrounded) value.
                  type: string
                  default: none
                  enum:
                    - ceiling
                    - floor
                    - half_up
                    - none
                  title: Rounding mode
                  x-speakeasy-unknown-values: allow
                precision:
                  description: |-
                    The number of decimal places to retain after rounding.

                    Only meaningful when rounding is not "none". Defaults to 0 (round to whole
                    numbers).
                  type: integer
                  default: 0
                  title: Rounding precision (decimal places)
                display_unit:
                  description: |-
                    A human-readable label for the converted unit shown on invoices and in the
                    customer portal (e.g., "GB", "hours", "M tokens").

                    Optional. When omitted, no unit label is rendered.
                  type: string
                  title: Display unit label
              required:
                - operation
                - conversion_factor
              title: Unit config
            payment_term:
              description: |-
                The payment term of the rate card. In advance payment term can only be used for
                flat prices.
              type: string
              default: in_arrears
              enum:
                - in_advance
                - in_arrears
              title: Payment term
              x-speakeasy-unknown-values: allow
            commitments:
              description: |-
                Spend commitments for this rate card. Only applicable to usage-based prices
                (unit, graduated, volume).
              type: object
              additionalProperties: false
              properties:
                minimum_amount:
                  description: The customer is committed to spend at least the amount.
                  type: string
                  pattern: '^\-?[0-9]+(\.[0-9]+)?$'
                  title: Minimum amount
                maximum_amount:
                  description: The customer is limited to spend at most the amount.
                  type: string
                  pattern: '^\-?[0-9]+(\.[0-9]+)?$'
                  title: Maximum amount
              title: Commitments
            discounts:
              description: The discounts of the rate card.
              type: object
              additionalProperties: false
              properties:
                percentage:
                  description: Percentage discount applied to the price (0–100).
                  type: number
                  maximum: 100
                  minimum: 0
                usage:
                  description: |-
                    Number of usage units granted free before billing starts. Only applies to
                    usage-based lines (not flat fees). Usage is treated as zero until this amount is
                    exhausted.
                  type: string
                  pattern: '^\-?[0-9]+(\.[0-9]+)?$'
              title: Discounts
            tax_config:
              description: The tax config of the rate card.
              type: object
              additionalProperties: false
              properties:
                behavior:
                  $ref: '#/components/schemas/BillingTaxBehavior'
                code:
                  $ref: '#/components/schemas/TaxCodeReference'
              required:
                - code
              title: Tax config
            entitlement:
              description: |-
                The entitlement template granted to subscribers of a plan or addon containing
                this rate card. Requires `feature` to be set.
              type: object
              discriminator:
                propertyName: type
                mapping:
                  metered: '#/components/schemas/BillingRateCardMeteredEntitlement'
                  static: '#/components/schemas/BillingRateCardStaticEntitlement'
                  boolean: '#/components/schemas/BillingRateCardBooleanEntitlement'
              oneOf:
                - $ref: '#/components/schemas/BillingRateCardMeteredEntitlement'
                - $ref: '#/components/schemas/BillingRateCardStaticEntitlement'
                - $ref: '#/components/schemas/BillingRateCardBooleanEntitlement'
              title: Entitlement template
          required:
            - name
            - key
            - price
          title: Rate card
        affected_subscription_item_ids:
          description: The IDs of the subscription items that this rate card belongs to.
          type: array
          items:
            $ref: '#/components/schemas/ULID'
          readOnly: true
          title: Affected subscription item IDs
      additionalProperties: false
      required:
        - rate_card
        - affected_subscription_item_ids
    SubscriptionAddonTimelineSegment:
      description: A subscription add-on event.
      type: object
      properties:
        active_from:
          description: An ISO-8601 timestamp representation of the cadence start of the resource.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        active_to:
          description: An ISO-8601 timestamp representation of the cadence end of the resource.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
          title: RFC3339 Date-Time
        quantity:
          description: The quantity of the add-on for the given period.
          type: integer
          example: 1
          minimum: 0
          readOnly: true
          title: Quantity
      additionalProperties: false
      required:
        - active_from
        - quantity
