          schema:
            type: object
            properties:
              items:
                type: array
                items:
                  type: object
                  properties:
                    lua_schema:
                      type: string
                      description: The custom plugin schema; `jq -Rs '.' schema.lua`.
                      example: >-
                        return { name = \"myplugin\", fields = { { config = {
                        type = \"record\", fields = { } } } } }
                    name:
                      type: string
                      description: >-
                        The custom plugin name determined by the custom plugin
                        schema.
                      example: myplugin
                    created_at:
                      type: integer
                      description: >-
                        An ISO-8604 timestamp representation of custom plugin
                        schema creation date.
                      example: 1422386534
                    updated_at:
                      type: integer
                      description: >-
                        An ISO-8604 timestamp representation of custom plugin
                        schema update date.
                      example: 1422412345
                    managed_by:
                      description: >-
                        Arbitrary JSON data for client responsible for managing
                        the entity. Konnect only field, not synced to the
                        Gateway.
                      type: object
                      additionalProperties: true
                      nullable: true
                  x-property-annotations:
                    managed_by:
                      - x-unstable
                      - x-internal
              page:
                type: object
                properties:
                  total_count:
                    type: integer
