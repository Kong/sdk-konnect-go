          example: single_select
        label:
          type: string
          example: Department
          minLength: 1
          maxLength: 256
        placeholder:
          type: string
          example: Select a department
        description:
          type: string
          example: >-
            Choose the department best suited to your inquiry. Supports MDC
            markdown.
          maxLength: 2048
        required:
          type: boolean
          example: true
        built_in:
          $ref: '#/components/schemas/CustomFormFieldBuiltIn'
        options:
          type: array
          minItems: 1
          maxItems: 20
          description: Available choices presented to the developer.
          items:
            $ref: '#/components/schemas/CustomFormSelectOption'
          example:
            - value: sales
              label: Sales
            - value: support
              label: Support
            - value: engineering
              label: Engineering
    CustomFormMultiSelectField:
      type: object
      description: >
        Multi-select dropdown field. The developer can choose multiple options.
        Requires at least 2 options.
      additionalProperties: false
      required:
        - type
        - mode
        - label
        - options
        - name
        - built_in
      properties:
        name:
          $ref: '#/components/schemas/CustomFormFieldName'
        type:
          type: string
          enum:
            - select
          example: select
        mode:
          type: string
          description: Multiple selection — the developer can choose more than one option.
          enum:
            - multi_select
          example: multi_select
        label:
          type: string
          example: Departments
          minLength: 1
          maxLength: 256
        placeholder:
          type: string
          example: Select departments
        description:
          type: string
          example: >-
            Choose the departments best suited to your inquiry. Supports MDC
            markdown.
          maxLength: 2048
        required:
          type: boolean
          example: true
        built_in:
          $ref: '#/components/schemas/CustomFormFieldBuiltIn'
        options:
          type: array
          minItems: 2
          maxItems: 20
          description: Available choices presented to the developer.
          items:
            $ref: '#/components/schemas/CustomFormSelectOption'
          example:
            - value: sales
              label: Sales
            - value: support
              label: Support
            - value: engineering
              label: Engineering
    CustomFormSelectField:
      type: object
      description: >
        Dropdown selection field. The `mode` field selects the variant:
        `single_select` requires at least 1 option, `multi_select` at least 2.
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - select
          example: select
      oneOf:
        - $ref: '#/components/schemas/CustomFormSingleSelectField'
        - $ref: '#/components/schemas/CustomFormMultiSelectField'
      discriminator:
        propertyName: mode
        mapping:
          single_select: '#/components/schemas/CustomFormSingleSelectField'
          multi_select: '#/components/schemas/CustomFormMultiSelectField'
    CustomFormCheckboxField:
      type: object
      description: Single boolean checkbox.
      additionalProperties: false
      required:
        - type
        - label
        - name
        - built_in
      properties:
        name:
          $ref: '#/components/schemas/CustomFormFieldName'
        type:
          type: string
          enum:
            - checkbox
          example: checkbox
        label:
          type: string
          example: I agree to the terms and conditions
          minLength: 1
          maxLength: 256
        description:
          type: string
          description: Supports MDC markdown — useful for embedding links to terms.
          example: Click to view the [terms](https://example.com).
          maxLength: 2048
        required:
          type: boolean
          example: true
        built_in:
          $ref: '#/components/schemas/CustomFormFieldBuiltIn'
    CustomFormSubmitField:
      type: object
      description: >
        Submit button. Exactly one submit field is required per form. Server
        enforces the literal `name: submit`.
      additionalProperties: false
      required:
        - name
        - type
        - value
        - built_in
      properties:
        name:
          type: string
          enum:
            - submit
          example: submit
        type:
          type: string
          enum:
            - submit
          example: submit
        value:
          type: string
          description: Button label rendered to the developer.
          example: Create account
          minLength: 1
          maxLength: 64
        built_in:
          $ref: '#/components/schemas/CustomFormFieldBuiltIn'
    CustomFormField:
      type: object
      description: >
        Response-side form field. Discriminated by `type`. Carries the
        server-set `built_in` flag on field variants that support it.
      oneOf:
        - $ref: '#/components/schemas/CustomFormContentField'
        - $ref: '#/components/schemas/CustomFormTextField'
        - $ref: '#/components/schemas/CustomFormEmailField'
        - $ref: '#/components/schemas/CustomFormNumberField'
        - $ref: '#/components/schemas/CustomFormTextareaField'
        - $ref: '#/components/schemas/CustomFormSelectField'
        - $ref: '#/components/schemas/CustomFormCheckboxField'
        - $ref: '#/components/schemas/CustomFormSubmitField'
      discriminator:
        propertyName: type
        mapping:
          content: '#/components/schemas/CustomFormContentField'
          text: '#/components/schemas/CustomFormTextField'
          email: '#/components/schemas/CustomFormEmailField'
          number: '#/components/schemas/CustomFormNumberField'
          textarea: '#/components/schemas/CustomFormTextareaField'
          select: '#/components/schemas/CustomFormSelectField'
          checkbox: '#/components/schemas/CustomFormCheckboxField'
          submit: '#/components/schemas/CustomFormSubmitField'
    CustomFormResponse:
      type: object
      description: A custom form definition for a developer portal.
      additionalProperties: false
      required:
        - id
        - name
        - type
        - status
        - fields
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          $ref: '#/components/schemas/CustomFormName'
        type:
          $ref: '#/components/schemas/CustomFormType'
        status:
          $ref: '#/components/schemas/CustomFormStatus'
        fields:
          type: array
          description: >
            Ordered array of form fields. Position determines display order.
            Must contain exactly one `submit` field. For
            `developer_registration`, must contain the built-in `full_name` and
            `email` fields.
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/CustomFormField'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
    CreateCatalogService:
