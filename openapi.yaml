      description: |-
        **Pre-release Feature**
        This feature is currently in beta and is subject to change.
      type: object
      properties:
        connect_timeout:
          type: integer
          default: 60000
          maximum: 2147483646
          minimum: 1
        fail_timeout:
          description: The period of time (in milliseconds) the target will be considered unavailable after the number of unsuccessful attempts reaches `max_fails`.
          type: integer
          default: 10000
          maximum: 2147483646
          minimum: 1
        failover_criteria:
          description: 'Specifies in which cases an upstream response should be failover to the next target. Each option in the array is equivalent to the function of https://nginx.org/en/docs/http/ngx_http_proxy_module.html#proxy_next_upstream'
