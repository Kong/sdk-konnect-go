        - display_name
        - description
        - custom_fields
        - labels
        - created_at
        - updated_at
        - evaluation
      title: ScorecardService
    ScorecardCriteriaServiceEvaluation:
      description: |
        Evaluation for a scorecard criteria relative to the given service service.
        Has a `null` value when the criteria has not yet been evaluated for the service.
      type: object
      properties:
        is_passing:
          description: Whether or not the service has most recently passed the criteria check.
          type: boolean
        evaluation_context:
          $ref: '#/components/schemas/CriteriaEvaluationResultDetails'
        evaluation_error:
          description: |
            Details about an error that occurred during evaluation preventing computation of a pass/fail result.
            Will be `null` when no error occurred.
          type: object
          example: null
          nullable: true
          properties:
            type:
              description: The type of error that occurred.
              type: string
              example: integration_unauthorized
            details:
              description: Human-readable error message about the error.
              type: string
              example: |
                The GitHub integration is unauthorized. Please ensure that the
                integration is re-authorized for the criteria to be successfully evaluated.
          required:
            - type
            - details
        attempted_at:
          description: The timestamp denoting the last evaluation attempt of the criteria for the service.
          type: string
          format: date-time
          example: '2023-02-15T07:20:50Z'
        successfully_evaluated_at:
          description: |
            The timestamp denoting when the criteria was last successfully evaluated for the service.
            Error states preventing the evaluation from being performed will not update this timestamp.
          type: string
          format: date-time
          example: '2023-02-15T07:20:50Z'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
      nullable: true
      required:
        - is_passing
        - evaluation_context
        - evaluation_error
        - successfully_evaluated_at
        - attempted_at
        - created_at
    CriteriaEvaluationResultDetails:
      description: Provides additional metadata about the criteria evaluation result.
      type: object
      properties:
        raw_value:
          description: |
            Raw value of the criteria evaluation.

            For example, a service may be failing the `time_to_acknowledge` criteria evaluation when
            the the mean time-to-ack is greater than 15 minutes. This value represents the _actual_
            mean time-to-ack value for the service which if not passing could be 25 minutes.
          oneOf:
            - type: number
            - type: string
            - type: boolean
            - $ref: '#/components/schemas/TimeValue'
            - $ref: '#/components/schemas/CriteriaEvaluationRelationMap'
            - type: object
              additionalProperties: true
            - nullable: true
        display_text:
          description: Renderable text providing human-readable context about the evaluation value.
          type: string
          example: 25 minutes
      example:
        raw_value:
          unit: minutes
          value: 25
        display_text: 25 minutes
      nullable: true
      required:
        - raw_value
        - display_text
    CriteriaEvaluationRelationMap:
      type: object
      properties:
        instance:
          type: string
          enum:
            - criteria_result_relation_map
        relation:
          type: string
          example: gateway_svc
        map:
          additionalProperties:
            oneOf:
              - $ref: '#/components/schemas/CriteriaEvaluationRelationResult'
              - $ref: '#/components/schemas/CriteriaEvaluationErrorResult'
      required:
        - instance
        - relation
        - map
    CriteriaEvaluationRelationResult:
      type: object
      properties:
        is_passing:
          description: Whether or not the relation has passed the criteria evaluation.
          type: boolean
        relation:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
          required:
            - id
            - name
        details:
          $ref: '#/components/schemas/CriteriaEvaluationResultDetails'
      required:
        - is_passing
        - relation
        - details
    CriteriaEvaluationErrorResult:
      type: object
      properties:
        relation:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
          required:
            - id
            - name
        error:
          description: |
            Details about an error that occurred during evaluation preventing computation of a pass/fail result.
            Will be `null` when no error occurred.
          type: object
          example: null
          nullable: true
          properties:
            type:
              description: The type of error that occurred.
              type: string
              example: integration_unauthorized
            details:
              description: Human-readable error message about the error.
              type: string
              example: |
                The GitHub integration is unauthorized. Please ensure that the
                integration is re-authorized for the criteria to be successfully evaluated.
          required:
            - type
            - details
      required:
        - relation
        - error
    CustomFields:
      description: |
        Map of customizable, catalog-defined fields providing information about a service.
      type: object
      example:
        owner: John Appleseed
        dashboard:
          name: On-Call Dashboard
          link: 'https://my-dashboard-svc.io/dashboards/1'
      additionalProperties:
        oneOf:
          - $ref: '#/components/schemas/TextCustomField'
          - $ref: '#/components/schemas/NumericCustomField'
          - $ref: '#/components/schemas/BooleanCustomField'
          - $ref: '#/components/schemas/UrlCustomField'
      x-speakeasy-type-override: any
    TextCustomField:
      type: string
      nullable: true
    NumericCustomField:
      type: number
      nullable: true
    BooleanCustomField:
      type: boolean
      nullable: true
    UrlCustomField:
      type: object
      properties:
        name:
          description: The human-readable name of the URL link.
          type: string
          example: On-Call Dashboard
        link:
          description: The href value of the URL link.
          type: string
          format: uri-reference
          example: 'https://my-dashboard-svc.io/dashboards/1'
      nullable: true
      required:
        - name
        - link
    ServiceSelector:
      oneOf:
        - $ref: '#/components/schemas/AllEntitiesSelector'
        - $ref: '#/components/schemas/ByIDsSelector'
        - $ref: '#/components/schemas/ByNameSelector'
        - $ref: '#/components/schemas/ByDisplayNameSelector'
        - $ref: '#/components/schemas/ByCustomFieldSelector'
        - $ref: '#/components/schemas/ByLabelSelector'
        - $ref: '#/components/schemas/HasLabelKeySelector'
        - $ref: '#/components/schemas/HasDocsSelector'
        - $ref: '#/components/schemas/HasApisSelector'
        - $ref: '#/components/schemas/HasResourcesSelector'
    AllEntitiesSelector:
      description: Entity selector that includes all entities of the given type within the catalog.
      type: object
      properties:
        selector:
          type: string
          enum:
            - all
        selector_parameters:
          type: string
          enum:
            - null
          nullable: true
      required:
        - selector
        - selector_parameters
    ByIDsSelector:
      description: Entity selector that includes entities contained within a list of IDs.
      type: object
      properties:
        selector:
          type: string
          enum:
            - ids
        selector_parameters:
          type: object
          properties:
            ids:
              type: array
              items:
                type: string
                format: uuid
          required:
            - ids
      required:
        - selector
        - selector_parameters
    ByNameSelector:
      description: Entity selector that includes entities by `name`.
      type: object
      properties:
        selector:
          type: string
          enum:
            - name
        selector_parameters:
          $ref: '#/components/schemas/StringFieldSelectorParams'
      required:
        - selector
        - selector_parameters
    ByDisplayNameSelector:
      description: Entity selector that includes entities by `display_name`.
      type: object
      properties:
        selector:
          type: string
          enum:
            - display_name
        selector_parameters:
          $ref: '#/components/schemas/StringFieldSelectorParams'
      required:
        - selector
        - selector_parameters
    ByCustomFieldSelector:
      description: Entity selector that include entities by a custom field.
      type: object
      properties:
        selector:
          type: string
          enum:
            - custom_field
        selector_parameters:
          oneOf:
            - type: object
              title: StringCustomFieldSelectorParams
              required:
                - field
                - value
                - operator
              properties:
                field:
                  description: Name of the custom field.
                  type: string
                value:
                  type: string
                operator:
                  $ref: '#/components/schemas/StringSelectorOperator'
            - type: object
              title: NumberCustomFieldSelectorParams
              required:
                - field
                - value
                - operator
              properties:
                field:
                  description: Name of the custom field.
                  type: string
                value:
                  type: number
                operator:
                  $ref: '#/components/schemas/NumberSelectorOperator'
            - type: object
              title: BooleanCustomFieldSelectorParams
              required:
                - field
                - value
                - operator
              properties:
                field:
                  description: Name of the custom field.
                  type: string
                value:
                  type: boolean
                operator:
                  $ref: '#/components/schemas/BooleanSelectorOperator'
            - type: object
              title: UrlCustomFieldSelectorParams
              required:
                - field
                - subfield
                - value
                - operator
              properties:
                field:
                  description: Name of the custom field.
                  type: string
                subfield:
                  description: Specify which subfield of the `url` custom field value to use for selection.
                  type: string
                  enum:
                    - name
                    - link
                  x-speakeasy-unknown-values: allow
                value:
                  type: string
                operator:
                  $ref: '#/components/schemas/StringSelectorOperator'
      required:
        - selector
        - selector_parameters
    ByLabelSelector:
      description: Entity selector that includes entities by `label` value.
      type: object
      properties:
        selector:
          type: string
          enum:
            - label
        selector_parameters:
          type: object
          properties:
            operator:
              $ref: '#/components/schemas/StringSelectorOperator'
            value:
              type: string
            label_key:
              type: string
          required:
            - operator
            - value
            - label_key
          title: LabelSelectorParams
      required:
        - selector
        - selector_parameters
    HasLabelKeySelector:
      description: Entity selector that includes entities by inclusion of a `label` key.
      type: object
      properties:
        selector:
          type: string
          enum:
            - has_label_key
        selector_parameters:
          type: object
          properties:
            label_key:
              type: string
          required:
            - label_key
          title: HasLabelKeySelectorParams
      required:
        - selector
        - selector_parameters
    HasDocsSelector:
      description: Entity selector to include entities by attached documentation.
      type: object
      properties:
        selector:
          type: string
          enum:
            - has_docs
        selector_parameters:
          type: string
          enum:
            - null
          nullable: true
      required:
        - selector
        - selector_parameters
    HasApisSelector:
      description: Entity selector that includes services by attached APIs.
      type: object
      properties:
        selector:
          type: string
          enum:
            - api_count
        selector_parameters:
          $ref: '#/components/schemas/HasSelectorParams'
      required:
        - selector
        - selector_parameters
    HasResourcesSelector:
      description: Entity selector that includes services by mapped resources.
      type: object
      properties:
        selector:
          type: string
          enum:
            - resource_count
        selector_parameters:
          type: object
          properties:
            operator:
              $ref: '#/components/schemas/HasRelationshipSelectorOperator'
            value:
              type: number
            resource_type:
              $ref: '#/components/schemas/CatalogResourceType'
            integration:
              description: The machine name of the integration that uniquely identifies it within the catalog.
              type: string
              example: gateway-manager
          required:
            - operator
            - value
            - resource_type
            - integration
          title: HasResourcesSelectorParams
      required:
        - selector
        - selector_parameters
    StringFieldSelectorParams:
      type: object
      properties:
        operator:
          $ref: '#/components/schemas/StringSelectorOperator'
        value:
          type: string
      required:
        - operator
        - value
    HasSelectorParams:
      type: object
      properties:
        operator:
          $ref: '#/components/schemas/HasRelationshipSelectorOperator'
        value:
          type: number
      required:
        - operator
        - value
    StringSelectorOperator:
      type: string
      enum:
        - eq
        - contains
      x-speakeasy-unknown-values: allow
    NumberSelectorOperator:
      type: string
      enum:
        - eq
        - lt
        - gt
      x-speakeasy-unknown-values: allow
    BooleanSelectorOperator:
      type: string
      enum:
        - eq
    HasRelationshipSelectorOperator:
      type: string
      enum:
        - eq
        - gte
        - lte
      x-speakeasy-unknown-values: allow
    SimpleSchema:
      type: object
      properties:
        type:
          type: string
          enum:
            - simple
        definition:
          type: object
          additionalProperties:
            type: string
            enum:
              - string
              - number
              - boolean
            x-speakeasy-unknown-values: allow
      required:
        - type
        - definition
    CatalogServiceRef:
      description: Short-hand descriptor of a catalog service.
      type: object
      properties:
        id:
          description: The service ID.
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
        name:
          description: |
            The machine name of the service that uniquely identifies it within the catalog.
          type: string
          example: user-svc
        display_name:
          description: The display name of the service.
          type: string
          example: User Service
      required:
        - id
        - name
        - display_name
    IntegrationRef:
      description: Short-hand descriptor of an integration installed within the catalog.
      type: object
      properties:
        name:
          type: string
          example: gateway-manager
        display_name:
          type: string
          example: gateway-manager
        instance:
          $ref: '#/components/schemas/IntegrationInstanceRef'
      required:
        - name
        - display_name
        - instance
    IntegrationRefWithoutInstance:
      description: Short-hand descriptor of an integration that omits instance metadata.
      type: object
      properties:
        name:
          type: string
          example: gateway-manager
        display_name:
          type: string
          example: gateway-manager
      required:
        - name
        - display_name
    IntegrationInstanceRef:
      description: Short-hand descriptor of an integration instance.
      type: object
      properties:
        id:
          description: The integration instance ID.
          type: string
          format: uuid
          example: 772b9caf-ddbc-4f4f-8aa4-8dfbbe420351
        name:
          description: |
            The machine name of the integration instance that uniquely identifies it within the catalog.
          type: string
          example: aws-lambda-prod
          pattern: '^[0-9a-z.-]+$'
        display_name:
          description: The display name of the integration instance.
          type: string
          example: AWS (prod)
      required:
        - id
        - name
        - display_name
    CatalogResourceRef:
      description: Short-hand descriptor of a catalog resource.
      type: object
      properties:
        id:
          $ref: '#/components/schemas/CatalogResourceId'
        name:
          description: The name of the resource.
          type: string
          nullable: true
        integration:
          $ref: '#/components/schemas/IntegrationRef'
        type:
          $ref: '#/components/schemas/CatalogResourceType'
        config:
          $ref: '#/components/schemas/CatalogResourceConfig'
      required:
        - id
        - name
        - type
        - config
        - integration
    TimeValue:
      description: Represents a time value inclusive of units.
      type: object
      properties:
        value:
          type: number
          example: 3.25
        unit:
          type: string
          example: hours
          enum:
            - milliseconds
            - seconds
            - minutes
            - hours
            - days
            - months
            - years
          x-speakeasy-unknown-values: allow
      required:
        - value
        - unit
    CatalogServiceApiMapping:
      description: Represents an API mapping associated with a service in the catalog.
      type: object
      properties:
        id:
          description: The mapping ID.
          type: string
          format: uuid
        service_id:
          description: The ID of the service.
          type: string
          format: uuid
        api_id:
          description: The ID of the API.
          type: string
          format: uuid
        created_at:
          description: Creation timestamp.
          type: string
          format: date-time
        updated_at:
          description: Last update timestamp.
          type: string
          format: date-time
      required:
        - id
        - service_id
        - api_id
        - created_at
        - updated_at
    CatalogServiceApiMappingFilterParameters:
      type: object
      properties:
        api_id:
          $ref: '#/components/schemas/UuidFieldFilter'
      additionalProperties: false
      title: CatalogServiceApiMappingFilterParameters
    CatalogApiServiceMappingFilterParameters:
      type: object
      properties:
        service_id:
          $ref: '#/components/schemas/UuidFieldFilter'
      additionalProperties: false
      title: CatalogApiServiceMappingFilterParameters
    NumericFieldFilter:
      description: Filter by a numeric value.
      oneOf:
        - type: number
          description: Value strictly equals the given numeric value.
          example: 21
        - type: object
          title: NumericFieldEqualsFilter
          additionalProperties: false
          properties:
            eq:
              description: Value strictly equals the given numeric value.
              type: number
              example: 3.14
          required:
            - eq
        - type: object
          title: NumericFieldLTFilter
          additionalProperties: false
          properties:
            lt:
              description: Value is less than the given numeric value.
              type: number
              example: 10
          required:
            - lt
        - type: object
          title: NumericFieldLTEFilter
          additionalProperties: false
          properties:
            lte:
              description: Value is less than or equal to the given numeric value.
              type: number
              example: 10
          required:
            - lte
        - type: object
          title: NumericFieldGTFilter
          additionalProperties: false
          properties:
            gt:
              description: Value is greater than the given numeric value.
              type: number
              example: 1.85
          required:
            - gt
        - type: object
          title: NumericFieldGTEFilter
          additionalProperties: false
          properties:
            gte:
              description: Value is greater than or equal to the given numeric value.
              type: number
              example: 1.85
          required:
            - gte
    CursorPageParameters:
      type: object
      properties:
        size:
          description: The number of items included per page.
          type: integer
          example: 10
        after:
          description: Cursor param specifying the page (i.e. the next page) of data returned.
          type: string
          example: ewogICJpZCI6ICJoZWxsbyB3b3JsZCIKfQ
        before:
          description: Cursor param specifying the page (i.e. the previous page) of data returned.
          type: string
          example: ewogICJpZCI6ICJoZWxsbyB3b3JsZCIKfQ
    StringFieldFilterExact:
      description: 'Filter using **one** of the following operators: `eq`, `oeq`, `neq`'
      type: object
      properties:
        eq:
          description: The field exactly matches the provided value.
          type: string
        oeq:
          description: The field matches any of the provided values.
          type: string
        neq:
          description: The field does not match the provided value.
          type: string
      additionalProperties: false
    EventGatewayInfo:
      description: The gateway object contains information about a Konnect gateway.
      type: object
      properties:
        id:
          description: The gateway ID.
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          readOnly: true
          x-speakeasy-param-suppress-computed-diff: true
        name:
          $ref: '#/components/schemas/GatewayName'
        description:
          $ref: '#/components/schemas/GatewayDescription'
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          description: An ISO-8604 timestamp representation of gateway creation date.
          type: string
          format: date-time
          example: '2022-11-04T20:10:06.927Z'
          readOnly: true
          x-speakeasy-terraform-ignore: true
        updated_at:
          description: An ISO-8604 timestamp representation of gateway update date.
          type: string
          format: date-time
          example: '2022-11-04T20:10:06.927Z'
          readOnly: true
          x-speakeasy-terraform-ignore: true
        nodes_total:
          description: The total number of nodes associated with the Event Gateway.
          type: integer
        virtual_clusters_total:
          description: The total number of virtual clusters associated with the Event Gateway.
          type: integer
        min_runtime_version:
          $ref: '#/components/schemas/MinRuntimeVersion'
        version:
          description: |
            The version number of the event gateway. Every change to an entity
            under this gateway will modify the version.
          type: string
          example: v1.123
      additionalProperties: false
      required:
        - id
        - name
        - created_at
        - updated_at
        - nodes_total
        - virtual_clusters_total
        - min_runtime_version
        - version
    EventGatewayListener:
      description: Listeners are used to expose virtual clusters to clients.
      type: object
      properties:
        id:
          description: The unique identifier of the listener.
          type: string
          format: uuid
          x-speakeasy-param-suppress-computed-diff: true
        name:
          description: The unique name of the listener.
          type: string
          maxLength: 255
          minLength: 1
          x-unicode-pattern: '^[\p{L}\p{N}][\p{L}\p{N} _\-\.:/+'']*[\p{L}\p{N}]$'
        description:
          description: A human-readable description of the listener.
          type: string
          default: ''
          maxLength: 512
        addresses:
          $ref: '#/components/schemas/EventGatewayListenerAddresses'
        ports:
          $ref: '#/components/schemas/EventGatewayListenerPorts'
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      additionalProperties: false
      required:
        - id
        - name
        - addresses
        - ports
        - created_at
        - updated_at
    EventGatewayListenerAddresses:
      description: |
        Which address or addresses to listen on.
        `0.0.0.0` means all addresses on the host.
        `::` means all addresses on the host in IPv6.

          If `0.0.0.0` or `::` is used, there can't be other extra addresses defined.
          WARNING: there are use cases where listening on all addresses is insecure. So use this with caution.

          `localhost` means only the localhost ipv4 address.
      type: array
      items:
        type: string
        minLength: 1
      minItems: 1
    EventGatewayListenerPorts:
      description: |
        Which port or ports to listen on.
        There can be multiple ways to define ports:
          - as a single port, e.g. 9092
          - as a range of ports, e.g. 9092-9094

        It's possible to combine both, e.g. [9092, "9093-9095", 9096].
      type: array
      items:
        $ref: '#/components/schemas/EventGatewayListenerPort'
      minItems: 1
    EventGatewayListenerPort:
      oneOf:
        - $ref: '#/components/schemas/EventGatewayListenerPortString'
        - $ref: '#/components/schemas/EventGatewayListenerPortInteger'
    EventGatewayListenerPortString:
      description: A port or a range of ports in the format 9092 or 9092-9094.
      type: string
      pattern: '^(\d{1,5}|\d{1,5}-\d{1,5})$'
    EventGatewayListenerPortInteger:
      type: integer
      maximum: 65535
      minimum: 1
    VirtualCluster:
      description: A representation of a Kafka cluster that maps to a backend cluster.
      type: object
      properties:
        id:
          description: The unique identifier of the virtual cluster.
          type: string
          format: uuid
          x-speakeasy-param-suppress-computed-diff: true
        description:
          description: A human-readable description of the virtual cluster.
          type: string
          default: ''
          maxLength: 512
        destination:
          $ref: '#/components/schemas/BackendClusterReference'
        authentication:
          $ref: '#/components/schemas/VirtualClusterAuthenticationSensitiveDataAwareSchemes'
        namespace:
          $ref: '#/components/schemas/VirtualClusterNamespace'
        topic_aliases:
          description: |-
            Topic aliases allow exposing backend topics under additional names.
            An alias creates a new entry point to the same physical data.
            The alias `topic` field references namespace-visible names (if namespace is configured).
            Aliases are independent of namespace and can be used without it.

            **Requires a minimum runtime version of `1.2`**.
          type: array
          items:
            $ref: '#/components/schemas/VirtualClusterTopicAlias'
          x-min-runtime-version: '1.2'
        name:
          $ref: '#/components/schemas/VirtualClusterName'
        dns_label:
          $ref: '#/components/schemas/VirtualClusterDNSLabel'
        acl_mode:
          $ref: '#/components/schemas/VirtualClusterACLMode'
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      additionalProperties: false
      required:
        - id
        - name
        - dns_label
        - destination
        - authentication
        - acl_mode
        - created_at
        - updated_at
    VirtualClusterName:
      description: The name of the virtual cluster.
      type: string
      maxLength: 255
      minLength: 1
      x-unicode-pattern: '^[\p{L}\p{N}][\p{L}\p{N} _\-\.:/+'']*[\p{L}\p{N}]$'
    VirtualClusterReference:
      description: A reference to a virtual cluster.
      anyOf:
        - $ref: '#/components/schemas/VirtualClusterReferenceById'
        - $ref: '#/components/schemas/VirtualClusterReferenceByName'
      x-terraform-preferred: '#/components/schemas/VirtualClusterReferenceById'
    VirtualClusterReferenceById:
      description: Reference a virtual cluster by its unique identifier.
      type: object
      properties:
        id:
          description: The unique identifier of the virtual cluster.
          type: string
          format: uuid
          minLength: 1
      required:
        - id
    VirtualClusterReferenceByName:
      description: Reference a virtual cluster by its unique name.
      type: object
      properties:
        name:
          $ref: '#/components/schemas/VirtualClusterName'
      required:
        - name
    VirtualClusterAuthenticationSensitiveDataAwareSchemes:
      description: |
        How to handle authentication from clients.

        It tries to authenticate with every rule sequentially one by one.
        It succeeds on the first match, and fails if no rule matches.
      type: array
      items:
        $ref: '#/components/schemas/VirtualClusterAuthenticationSensitiveDataAwareScheme'
      minItems: 1
    VirtualClusterAuthenticationSchemes:
      description: |
        How to handle authentication from clients.

        It tries to authenticate with every rule sequentially one by one.
        It succeeds on the first match, and fails if no rule matches.
      type: array
      items:
        $ref: '#/components/schemas/VirtualClusterAuthenticationScheme'
      minItems: 1
    VirtualClusterAuthenticationSensitiveDataAwareScheme:
      discriminator:
        propertyName: type
        mapping:
          anonymous: '#/components/schemas/VirtualClusterAuthenticationAnonymous'
          sasl_plain: '#/components/schemas/VirtualClusterAuthenticationSaslPlainSensitiveDataAware'
          sasl_scram: '#/components/schemas/VirtualClusterAuthenticationSaslScram'
          oauth_bearer: '#/components/schemas/VirtualClusterAuthenticationOauthBearer'
          client_certificate: '#/components/schemas/VirtualClusterAuthenticationClientCertificate'
      oneOf:
        - $ref: '#/components/schemas/VirtualClusterAuthenticationAnonymous'
        - $ref: '#/components/schemas/VirtualClusterAuthenticationSaslPlainSensitiveDataAware'
        - $ref: '#/components/schemas/VirtualClusterAuthenticationSaslScram'
        - $ref: '#/components/schemas/VirtualClusterAuthenticationOauthBearer'
        - $ref: '#/components/schemas/VirtualClusterAuthenticationClientCertificate'
    VirtualClusterAuthenticationScheme:
      discriminator:
        propertyName: type
        mapping:
          anonymous: '#/components/schemas/VirtualClusterAuthenticationAnonymous'
          sasl_plain: '#/components/schemas/VirtualClusterAuthenticationSaslPlain'
          sasl_scram: '#/components/schemas/VirtualClusterAuthenticationSaslScram'
          oauth_bearer: '#/components/schemas/VirtualClusterAuthenticationOauthBearer'
          client_certificate: '#/components/schemas/VirtualClusterAuthenticationClientCertificate'
      oneOf:
        - $ref: '#/components/schemas/VirtualClusterAuthenticationAnonymous'
        - $ref: '#/components/schemas/VirtualClusterAuthenticationSaslPlain'
        - $ref: '#/components/schemas/VirtualClusterAuthenticationSaslScram'
        - $ref: '#/components/schemas/VirtualClusterAuthenticationOauthBearer'
        - $ref: '#/components/schemas/VirtualClusterAuthenticationClientCertificate'
    VirtualClusterAuthenticationAnonymous:
      type: object
      properties:
        type:
          type: string
          const: anonymous
      required:
        - type
    VirtualClusterAuthenticationClientCertificate:
      description: |-
        Client certificate (mTLS) authentication scheme for the virtual cluster.

        **Requires a minimum runtime version of `1.1`**.
      type: object
      properties:
        type:
          type: string
          const: client_certificate
