    ManagedCacheAddOnDataPlaneGroup:
      title: ManagedCacheAddOnDataPlaneGroup
      description: >-
        Object that describes a data-plane group where managed cache add-on is
        deployed.
      type: object
      readOnly: true
      properties:
        id:
          type: string
          format: uuid
          example: 1150820b-c69f-4a2a-b9be-bbcdbc5cd618
          description: ID of the data-plane group.
        cloud_gateway_network_id:
          type: string
          format: uuid
          example: 36ae63d3-efd1-4bec-b246-62aa5d3f5695
          description: Network ID this data-plane group is attached to.
        provider:
          $ref: '#/components/schemas/ProviderName'
        region:
          type: string
          example: us-east-1
          description: Region of cloud provider the data-plane group is deployed to.
        state:
          type: string
          description: >
            The current state of the managed cache add-on in the data-plane
            group. Possible values:

            - `initializing` - The add-on is in the process of being
            initialized/updated and is setting up necessary resources for this
            data-plane group.

            - `ready` - The add-on is fully operational for this data-plane
            group.

            - `error` - The add-on is in an error state, and is not operational
            for this data-plane group.

            - `terminating` - The add-on is in the process of being deleted for
            this data-plane group.
          enum:
            - initializing
            - ready
            - error
            - terminating
