      type: string
      description: >
        Stable slug for the field (letters, digits, underscores, or hyphens).
        Immutable for the life of the field; renames are achieved by editing
        `label`. Acts as the join key for stored responses. Optional on create —
        server slugifies `label` when omitted.
      pattern: ^[\w-]+$
      maxLength: 128
      example: full-name
    FormResponseEntry:
      type: object
      description: >-
        A single field's submitted answer, snapshotted with the field metadata
        as it appeared at submission time.
      additionalProperties: false
      required:
        - name
        - label
        - type
        - value
      properties:
        name:
          allOf:
            - $ref: '#/components/schemas/CustomFormFieldName'
          description: Field slug, matches the parent object key.
        label:
          type: string
          description: Field label snapshotted at submission time.
          example: Full Name
        type:
          type: string
          description: Field input type at submission time.
          enum:
            - text
            - email
            - number
            - textarea
            - select
            - checkbox
          example: text
          x-speakeasy-unknown-values: allow
        value:
          description: >
            Submitted value. Type matches the field `type`:
            `text`/`email`/`textarea` return strings; `number` returns a number;
            `checkbox` returns a boolean; `select` returns a string for
            single-select or an array of strings for multi-select.
          oneOf:
            - type: string
              example: Ada Lovelace
            - type: number
              example: 42
            - type: boolean
              example: true
            - type: array
              items:
                type: string
              example:
                - api
                - portal
    FormResponseData:
      type: object
      description: >
        A developer's submitted form responses as returned by the server. Keyed
        by field `name` (lowercase slug; letters, digits, underscores, or
        hyphens). Each value is a self-describing record `{name, label, type,
        value}` captured at submission time. Stored encrypted at rest; not
        queryable via SQL.
      additionalProperties:
        $ref: '#/components/schemas/FormResponseEntry'
      example:
        full_name:
          name: full_name
          label: Full Name
          type: text
          value: Ada Lovelace
        email:
          name: email
          label: Email Address
          type: email
          value: ada@example.com
        topics:
          name: topics
          label: Topics of Interest
          type: select
          value:
            - api
            - portal
    FormResponseInput:
      type: object
      description: >
        Developer-supplied answers to a custom form, keyed by field `name`
        (lowercase slug; letters, digits, underscores, or hyphens). Each value
        matches the field's input type: string for text/email/textarea, number
        for number, boolean for checkbox, and for select a string when `mode` is
        `single_select` or an array of strings when `mode` is `multi_select`.
        Built-in fields (`full_name`, `email` on `developer_registration`) are
        submitted via top-level body properties — not here.
      additionalProperties:
        oneOf:
          - type: string
          - type: number
          - type: boolean
          - type: array
            items:
              type: string
      example:
        department: engineering
        age: 35
        accepted_terms: true
        topics:
          - api
          - portal
    PortalSAMLIdentityProviderConfig:
      title: Portal SAML Identity Provider Config
      type: object
      description: >-
        The identity provider that contains configuration data for the SAML
        authentication integration.
      properties:
        idp_metadata_url:
          $ref: '#/components/schemas/SAMLIdentityProviderMetadataURL'
        idp_metadata_xml:
