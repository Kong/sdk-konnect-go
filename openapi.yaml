      description: MCP server create request body.
      type: object
      additionalProperties: false
      required:
        - name
        - enabled
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
        enabled:
          type: boolean
          description: Is the portal MCP server enabled?
    CreatePortalFormRequest:
      description: >-
        Form-create request body, discriminated by `type`. Server requires the
        per-type built-in fields (full_name and email on
        `developer_registration`; none on `api_registration`) and returns 400 if
        any are missing from `fields`.
      oneOf:
        - $ref: '#/components/schemas/CreateDeveloperRegistrationFormRequest'
        - $ref: '#/components/schemas/CreateApiRegistrationFormRequest'
      discriminator:
        propertyName: type
        mapping:
          developer_registration: '#/components/schemas/CreateDeveloperRegistrationFormRequest'
          api_registration: '#/components/schemas/CreateApiRegistrationFormRequest'
    CreateDeveloperRegistrationFormRequest:
      type: object
      additionalProperties: false
      required:
        - type
        - fields
      properties:
        type:
          type: string
          enum:
            - developer_registration
          example: developer_registration
        name:
          type: string
          enum:
            - developer-registration
          description: >-
            Reserved slug for the developer registration form. Server pins this
            literal regardless of what the admin supplies.
          example: developer-registration
        status:
          type: string
          enum:
            - published
            - unpublished
          default: unpublished
          example: unpublished
          x-speakeasy-unknown-values: allow
        fields:
          type: array
          minItems: 3
          maxItems: 20
          description: >-
            Ordered field array. Must contain the built-in fields `full_name`
            (type=text) and `email` (type=email) and exactly one `submit` field.
            Server returns 400 if any built-in is missing.
          items:
            $ref: '#/components/schemas/CustomFormFieldInput'
    CreateApiRegistrationFormRequest:
      type: object
      additionalProperties: false
      required:
        - type
        - name
        - fields
      properties:
        type:
          type: string
          enum:
            - api_registration
          example: api_registration
        name:
          type: string
          description: Kebab-case slug identifier for the form, admin-supplied.
          pattern: ^[a-z0-9-]+$
          maxLength: 128
          example: flights-api-registration
        status:
          type: string
          enum:
            - published
            - unpublished
          default: unpublished
          example: unpublished
          x-speakeasy-unknown-values: allow
        fields:
          type: array
          minItems: 2
          maxItems: 20
          description: >-
            Ordered field array. Must contain exactly one `submit` type field
            and a named `api_id` of type `text` field.
          items:
            $ref: '#/components/schemas/CustomFormFieldInput'
    UpdatePortalFormRequest:
      description: >-
        Form-update request body, discriminated by `type`. The `type` field is
        an immutable echo and must match the existing form's type — server
        returns 400 if it differs. Field removal is achieved by omitting the
        field from `fields`; field renames are achieved by editing `label`.
      oneOf:
        - $ref: '#/components/schemas/UpdateDeveloperRegistrationFormRequest'
        - $ref: '#/components/schemas/UpdateApiRegistrationFormRequest'
      discriminator:
        propertyName: type
        mapping:
          developer_registration: '#/components/schemas/UpdateDeveloperRegistrationFormRequest'
          api_registration: '#/components/schemas/UpdateApiRegistrationFormRequest'
    UpdateDeveloperRegistrationFormRequest:
      type: object
      additionalProperties: false
      required:
        - type
        - fields
      properties:
        type:
          description: Immutable echo of the form's type.
          type: string
          example: developer_registration
          enum:
            - developer_registration
        status:
          type: string
          enum:
            - published
            - unpublished
          example: published
          x-speakeasy-unknown-values: allow
        fields:
          type: array
          minItems: 3
          maxItems: 20
          description: >-
            Full replacement of the form's field array. Fields omitted from this
            array are removed. Must contain the built-in `full_name` (type=text)
            and `email` (type=email) fields and exactly one `submit` field; the
            server returns 400 if any required built-in or the submit field is
            missing.
          items:
            $ref: '#/components/schemas/CustomFormFieldInput'
    UpdateApiRegistrationFormRequest:
      type: object
      additionalProperties: false
      required:
        - type
        - fields
      properties:
        type:
          description: Immutable echo of the form's type.
          type: string
          example: api_registration
          enum:
            - api_registration
        name:
          type: string
          description: >-
            Kebab-case slug identifier. Admin may rename `api_registration`
            forms on update; collisions against other forms in the portal return
            409.
          pattern: ^[a-z0-9-]+$
          maxLength: 128
          example: flights-api-registration
        status:
          type: string
          enum:
            - published
            - unpublished
          example: published
          x-speakeasy-unknown-values: allow
        fields:
          type: array
          minItems: 2
          maxItems: 20
          description: >-
            Full replacement of the form's field array. Fields omitted from this
            array are removed. Must contain exactly one `submit` field type
            field and a named `api_id` of type `text` field; the server returns
            400 if it is missing.
          items:
            $ref: '#/components/schemas/CustomFormFieldInput'
