            name:
              type: string
              description: Legal name or representation of the party.
            tax_id:
              type: object
              properties:
                code:
                  type: string
                  minLength: 1
                  maxLength: 32
                  description: >-
                    Normalized tax identification code shown on the original
                    identity document.
              additionalProperties: false
              description: >-
                The entity's legal identification used for tax purposes. They
                may have other

                numbers, but we're only interested in those valid for tax
                purposes.
            addresses:
              type: object
              required:
                - billing_address
              properties:
                billing_address:
                  type: object
                  properties:
                    country:
                      type: string
                      minLength: 2
                      maxLength: 2
                      pattern: ^[A-Z]{2}$
                      description: >-
                        Country code in [ISO
                        3166-1](https://www.iso.org/iso-3166-country-codes.html)

                        alpha-2 format.
                      example: US
                      title: Country
                    postal_code:
                      type: string
                      description: Postal code.
                      title: Postal Code
                    state:
                      type: string
                      description: State or province.
                      title: State
                    city:
                      type: string
                      description: City.
                      title: City
                    line1:
                      type: string
                      description: First line of the address.
                      title: Line 1
                    line2:
                      type: string
                      description: Second line of the address.
                      title: Line 2
                    phone_number:
                      type: string
                      description: Phone number.
                      title: Phone Number
                  additionalProperties: false
                  description: Billing address.
              additionalProperties: false
              description: Address for where information should be sent if needed.
          additionalProperties: false
          description: >-
            The name and contact information for the supplier this billing
            profile

            represents
        workflow:
          type: object
          properties:
            collection:
              type: object
              properties:
                alignment:
                  type: object
                  oneOf:
                    - &ref_11
                      $ref: >-
                        #/components/schemas/BillingWorkflowCollectionAlignmentSubscription
                    - &ref_12
                      $ref: >-
                        #/components/schemas/BillingWorkflowCollectionAlignmentAnchored
                  discriminator:
                    propertyName: type
                    mapping:
                      subscription: >-
                        #/components/schemas/BillingWorkflowCollectionAlignmentSubscription
                      anchored: >-
                        #/components/schemas/BillingWorkflowCollectionAlignmentAnchored
                  description: >-
                    The alignment for collecting the pending line items into an
                    invoice.
                  default:
                    type: subscription
                interval:
                  type: string
                  format: ISO8601
                  description: >-
                    This grace period can be used to delay the collection of the
                    pending line items

                    specified in alignment.


                    This is useful, in case of multiple subscriptions having
                    slightly different

                    billing periods.
                  example: P1D
                  default: PT1H
              additionalProperties: false
              description: The collection settings for this workflow
              title: Workflow collection settings
            invoicing:
              type: object
              properties:
                auto_advance:
                  type: boolean
                  description: >-
                    Whether to automatically issue the invoice after the
                    draftPeriod has passed.
                  default: true
                draft_period:
                  type: string
                  format: ISO8601
                  description: >-
                    The period for the invoice to be kept in draft status for
                    manual reviews.
                  example: P1D
                  default: P0D
                progressive_billing:
                  type: boolean
                  description: Should progressive billing be allowed for this workflow?
                  default: true
                subscription_end_proration_mode:
                  type: string
