        state:
          $ref: '#/components/schemas/StringFieldFilterExact'
        title:
          $ref: '#/components/schemas/StringFieldFilter'
        severity:
          $ref: '#/components/schemas/StringFieldFilterExact'
        opened_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        reopened_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        last_opened_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        dismissed_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        fixed_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        instance_count:
          $ref: '#/components/schemas/NumericFieldFilter'
    VulnerabilityScanVulnerabilityFilterParameters:
      title: VulnerabilityScanVulnerabilityFilterParameters
      type: object
      allOf:
        - $ref: '#/components/schemas/ServiceVulnerabilityFilterParameters'
        - type: object
          properties:
            scan_state:
              $ref: '#/components/schemas/StringFieldFilterExact'
    CreateVulnerabilityScan:
      title: UploadVulnerabilityScan
      type: object
      additionalProperties: false
      properties:
        scan_key:
          $ref: '#/components/schemas/VulnerabilityScanKey'
        tool:
          $ref: '#/components/schemas/VulnerabilityScanTool'
        description:
          type: string
          nullable: true
        raw_scan_report:
          type: object
          additionalProperties: true
        catalog_reference:
          $ref: '#/components/schemas/CreateVulnerabilityScanCatalogReference'
        environment:
          type: string
          nullable: true
          example: prod
        region:
          type: string
          nullable: true
          example: us-east-2
        source_correlation_key:
          type: string
          example: kong/repo-id
          description: >
            Optional key used to correlate vulnerabilities found in this scan
            with the same vulnerabilities found across different sources.

            This allows tracking the same vulnerability in two sources as one
            vulnerability instance.

            When omitted, this will inherit the value of `scan_key`.
        attributes:
          type: object
          additionalProperties:
            type: string
          example:
            org.kong.enterprise.source.version: v1
        ts:
          type: string
          format: date-time
          description: >
            Optional RFC-3339 timestamp indicating when the vulnerability scan
            was run.

            If provided, this value will be used as the authoritative scan time.

            If omitted, the system will attempt to extract a timestamp from the
            uploaded scan report.

            If no timestamp can be extracted, the server's current time at
            ingestion will be used.
          example: '2025-01-01T00:00:00Z'
      required:
        - scan_key
        - tool
        - description
        - raw_scan_report
        - catalog_reference
        - environment
        - region
        - attributes
    CreateServiceVulnerabilityScanCatalogReference:
      type: object
      additionalProperties: false
      properties:
        service:
          type: string
          description: >-
            Reference to the service to map the vulnerability scan to. Can be
            either the service name or ID.
          example: user-svc
      required:
        - service
    CreateVulnerabilityScanCatalogReference:
      type: object
      oneOf:
        - $ref: '#/components/schemas/CreateServiceVulnerabilityScanCatalogReference'
    ScanVulnerabilityState:
      type: string
      enum:
        - created
        - open
        - fixed
      example: created
      x-speakeasy-unknown-values: allow
    CatalogVulnerabilityState:
      type: string
      enum:
        - open
        - fixed
        - dismissed
        - closed
