      title: AuthStrategyPrincipals
      x-feature-flag: tdx-6623-application-principals
      description: >
        Application principal settings for this auth strategy. Runtime effect
        applies to V3 API Catalog (ACE) portals and

        applications; stored values may be set for any auth strategy in the
        organization.
