                      maxLength: 1200
                      description: The custom message text (max 1200 characters).
                  additionalProperties: false
                  description: Text displayed after the payment confirmation button.
                shipping_address:
                  type: object
                  properties:
                    message:
                      type: string
                      maxLength: 1200
                      description: The custom message text (max 1200 characters).
                  additionalProperties: false
                  description: Text displayed alongside shipping address collection.
                submit:
                  type: object
                  properties:
                    message:
                      type: string
                      maxLength: 1200
                      description: The custom message text (max 1200 characters).
                  additionalProperties: false
                  description: Text displayed alongside the payment confirmation button.
                terms_of_service_acceptance:
                  type: object
                  properties:
                    message:
                      type: string
                      maxLength: 1200
                      description: The custom message text (max 1200 characters).
                  additionalProperties: false
                  description: Text replacing the default terms of service agreement text.
              additionalProperties: false
              description: Custom text to display during checkout at various stages.
            expires_at:
              type: integer
              format: int64
              description: >-
                Unix timestamp when the checkout session expires.


                Can be 30 minutes to 24 hours from creation. Defaults to 24
                hours.
            locale:
              type: string
              description: >-
                IETF language tag for the checkout UI locale.


                If blank or "auto", uses the browser's locale. Example: "en",
                "fr", "de".
            metadata:
              type: object
              additionalProperties:
                type: string
              description: |-
                Set of key-value pairs to attach to the checkout session.

                Useful for storing additional structured information.
            return_url:
              type: string
              description: >-
                Return URL for embedded checkout sessions after payment
                authentication.


                Required if ui_mode is "embedded" and redirect-based payment
                methods are

                enabled.
            success_url:
              type: string
              description: >-
                Success URL to redirect customers after completing payment or
                setup.


                Not allowed when ui_mode is "embedded". See:

                https://docs.stripe.com/payments/checkout/custom-success-page
            ui_mode:
              type: string
              enum:
                - embedded
                - hosted
              description: >-
                The UI mode for the checkout session.


                "hosted" displays a Stripe-hosted page. "embedded" integrates
                directly into your

                app. Defaults to "hosted".
              default: hosted
              x-speakeasy-unknown-values: allow
            payment_method_types:
              type: array
              items:
                type: string
              description: >-
                List of payment method types to enable (e.g., "card",
                "us_bank_account").


                If not specified, Stripe enables all relevant payment methods.
            redirect_on_completion:
              type: string
              enum:
                - always
                - if_required
                - never
              description: >-
                Redirect behavior for embedded checkout sessions.


                Controls when to redirect users after completion. See:

                https://docs.stripe.com/payments/checkout/custom-success-page?payment-ui=embedded-form
              x-speakeasy-unknown-values: allow
            tax_id_collection:
              type: object
              properties:
                enabled:
                  type: boolean
                  description: |-
                    Enable tax ID collection during checkout.

                    Defaults to false.
                  default: false
                required:
                  type: string
                  enum:
                    - if_supported
                    - never
                  description: |-
                    Whether tax ID collection is required.

                    Defaults to "never".
                  default: never
                  x-speakeasy-unknown-values: allow
              additionalProperties: false
              description: Configuration for collecting tax IDs during checkout.
          additionalProperties: false
          description: >-
            Options for configuring the Stripe Checkout Session.


            These options are passed directly to Stripe's

            [checkout session creation
            API](https://docs.stripe.com/api/checkout/sessions/create).
      additionalProperties: false
      description: >-
        Request to create a Stripe Checkout Session for the customer.


        Checkout Sessions are used to collect payment method information from
        customers

        in a secure, Stripe-hosted interface. This integration uses setup mode
        to

        collect payment methods that can be charged later for subscription
        billing.
