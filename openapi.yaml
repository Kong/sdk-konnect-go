      additionalProperties: false
      type: object
      x-property-annotations:
        additional_data:
          - x-internal
          - x-unstable
      required:
        - email
        - full_name
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        full_name:
          type: string
          maxLength: 255
        status:
          title: DeveloperStatus
          description: >-
            When omitted, the portal's `auto_approve_developers` setting
            determines the initial status. Set this property to override the
            portal default with any valid developer status.
          type: string
          enum:
            - approved
            - pending
            - revoked
            - rejected
          example: approved
