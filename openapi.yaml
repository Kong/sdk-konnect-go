          description: The currency of the granted credits.
          type: string
          example: USD
          maxLength: 3
          minLength: 3
          pattern: '^[A-Z]{3}$'
        amount:
          description: Granted credit amount.
          type: string
          pattern: '^\-?[0-9]+(\.[0-9]+)?$'
      additionalProperties: false
      required:
        - name
        - currency
        - amount
    CreateCreditGrantFilters:
      description: Filters for the credit grant.
      type: object
      properties:
        features:
          description: |-
            Limit the credit grant to specific features. If no features are specified, the
            credit grant can be used for any feature.
          type: array
          items:
            $ref: '#/components/schemas/ResourceKey'
          example:
            - input_tokens
            - output_tokens
      additionalProperties: false
    CreateCreditGrantRequest:
      description: CreditGrant create request.
      type: object
      properties:
        name:
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
          type: string
          maxLength: 1024
        labels:
          $ref: '#/components/schemas/Labels'
        funding_method:
          description: Funding method of the grant.
          type: string
          enum:
            - none
            - invoice
            - external
          title: Credit funding method
          x-speakeasy-unknown-values: allow
        currency:
          description: Fiat or custom currency code.
          type: string
          example: USD
          maxLength: 3
          minLength: 3
          pattern: '^[A-Z]{3}$'
        amount:
          description: Granted credit amount.
          type: string
          pattern: '^\-?[0-9]+(\.[0-9]+)?$'
        purchase:
          description: Present when a funding workflow applies (funding_method is not `none`).
          type: object
          additionalProperties: false
          properties:
            currency:
              description: Currency of the purchase amount.
              type: string
              example: USD
              maxLength: 3
              minLength: 3
              pattern: '^[A-Z]{3}$'
            per_unit_cost_basis:
              description: |-
                Cost basis per credit unit used to calculate the purchase amount.

                If `per_unit_cost_basis` is 0.50 and credit amount is $100.00, the total charge
                is $50.00. The value must be greater than 0. If the cost basis is 0, use
                `funding_method=none` instead.

                Defaults to 1.0.
              type: string
              default: '1.0'
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            availability_policy:
              description: |-
                Controls when credits become available for consumption.

                Defaults to `on_creation`.
              type: string
              default: on_creation
              enum:
                - on_creation
              title: Credit availability policy
          required:
            - currency
        tax_config:
          description: |-
            Tax configuration for the grant.

            For `invoice` and `external` funding methods, tax configuration should be
            provided to ensure correct revenue recognition. When not provided, the default
            credit grant tax code is applied, if that's not set the global default taxcode
            is used.
          type: object
          additionalProperties: false
          properties:
            behavior:
              description: Tax behavior applied to the invoice line item.
              type: string
              enum:
                - inclusive
                - exclusive
              x-speakeasy-unknown-values: allow
            tax_code:
              description: Tax code applied to the invoice line item.
              type: object
              additionalProperties: false
              properties:
                id:
                  $ref: '#/components/schemas/ULID'
              required:
                - id
          title: Tax configuration for a credit grant
        filters:
          $ref: '#/components/schemas/CreateCreditGrantFilters'
        priority:
          description: Draw-down priority of the grant. Lower values have higher priority.
          type: integer
          format: int16
          default: 10
          maximum: 1000
          minimum: 1
        effective_at:
          description: |-
            The timestamp when the credit grant becomes effective.

            Defaults to the current date and time.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        expires_after:
          description: |-
            The duration after which the credit grant expires.

            Defaults to never expiring.
          type: string
          format: ISO8601
          example: P1Y
          pattern: '^P(?:\d+(?:\.\d+)?Y)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?W)?(?:\d+(?:\.\d+)?D)?(?:T(?:\d+(?:\.\d+)?H)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?S)?)?$'
          title: ISO 8601 Duration
        key:
          description: |-
            Idempotency key for the credit grant creation request.

            When provided, reusing the same key returns an HTTP 409 Conflict instead of
            creating a duplicate grant, which makes create requests safe to retry.
          type: string
          example: 019ae40f-4258-7f15-9491-842f42a7d6ac
          maxLength: 256
          minLength: 1
          title: External Resource Key
      additionalProperties: false
      required:
        - name
        - funding_method
        - currency
        - amount
