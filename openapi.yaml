        - updated_at
      properties:
        matched:
          type: array
          items:
            type: string
          description: >-
            The list of identifiers from the request that resolved to this
            customer. Each

            entry is either the customer `key` or one of its usage-attribution
            subject

            `key`s.


            Duplicate or aliased identifiers that resolve to the same customer
