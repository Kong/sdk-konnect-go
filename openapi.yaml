                type: string
              minItems: 1
              maxItems: 100
              description: List of feature keys to evaluate access for.
              title: Feature Keys
          additionalProperties: false
          description: >-
            Optional list of feature keys to evaluate access for. If omitted,
            all features

            available in the organization are returned. Providing this list is
            recommended

            to reduce the response size and the load on the backend services.
          title: Feature
