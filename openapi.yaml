          schema:
            type: object
            title: User Device Authorization Response
            properties:
              organization_name:
                type: string
                description: The name of the organization.
              user:
                $ref: '#/components/schemas/User'
              metadata:
                type: object
                description: >-
                  The device metadata to be displayed to the user for
