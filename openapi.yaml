    CustomDomainState:
      title: Custom Domain State
      type: string
      description: >
        The current state of the custom domain. Possible values:

        - `created` — The domain has been registered but TLS provisioning has
        not yet started.

        - `initializing` — Konnect is provisioning the TLS certificate and
        configuring SNI routing.

        - `ready` — The domain is fully provisioned and serving traffic.

        - `terminating` — The domain is being deleted and its TLS certificate is
        being removed.

        - `terminated` — The domain has been fully deleted and is no longer
        available.

        - `error` — Provisioning failed; check `state_metadata` for details.
      enum:
        - created
        - initializing
        - ready
        - terminating
        - terminated
        - error
      readOnly: true
      x-speakeasy-unknown-values: allow
