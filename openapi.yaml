    BillingTaxIdentificationCode:
      description: |-
        Tax identifier code is a normalized tax code shown on the original identity
        document.
      type: string
      maxLength: 32
      minLength: 1
    BillingUnitConfigOperation:
      description: |-
        The arithmetic operation used to convert raw metered units into billing units.

        - `divide`: Divide the metered quantity by the conversion factor (e.g., bytes ÷
        1e9 = GB).
        - `multiply`: Multiply the metered quantity by the conversion factor (e.g., cost
        × 1.2 = cost + 20% margin).
      type: string
      enum:
        - divide
        - multiply
      x-speakeasy-unknown-values: allow
    BillingUnitConfigRoundingMode:
      description: |-
        The rounding mode applied to the converted quantity for invoicing.

        Rounding is applied only to the invoiced quantity. Entitlement balance checks
        use the precise decimal value after conversion.

        - `ceiling`: Round up to the next integer (typical for package-style billing).
        - `floor`: Round down to the previous integer.
        - `half_up`: Round to the nearest integer, with 0.5 rounding up.
        - `none`: No rounding; the converted value is used as-is.
      type: string
      enum:
        - ceiling
        - floor
        - half_up
        - none
      x-speakeasy-unknown-values: allow
    BillingWorkflowCollectionAlignment:
      description: |-
        The alignment for collecting the pending line items into an invoice.

        Defaults to subscription, which means that we are to create a new invoice every
        time the a subscription period starts (for in advance items) or ends (for in
        arrears items).
      type: object
      discriminator:
        propertyName: type
        mapping:
          subscription: '#/components/schemas/BillingWorkflowCollectionAlignmentSubscription'
          anchored: '#/components/schemas/BillingWorkflowCollectionAlignmentAnchored'
      oneOf:
        - $ref: '#/components/schemas/BillingWorkflowCollectionAlignmentSubscription'
        - $ref: '#/components/schemas/BillingWorkflowCollectionAlignmentAnchored'
    BillingWorkflowCollectionAlignmentAnchored:
      description: |-
        BillingWorkflowCollectionAlignmentAnchored specifies the alignment for
        collecting the pending line items into an invoice.
      type: object
      properties:
        type:
          description: The type of alignment.
          type: string
          enum:
            - anchored
        recurring_period:
          description: The recurring period for the alignment.
          type: object
          additionalProperties: false
          properties:
            anchor:
              description: A date-time anchor to base the recurring period on.
              type: string
              format: date-time
              example: '2023-01-01T01:01:01.001Z'
              title: Anchor time
            interval:
              description: The interval duration in ISO 8601 format.
              type: string
              format: ISO8601
              example: P1M
              pattern: '^P(?:\d+(?:\.\d+)?Y)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?W)?(?:\d+(?:\.\d+)?D)?(?:T(?:\d+(?:\.\d+)?H)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?S)?)?$'
              title: Interval in ISO 8601 duration format
          required:
            - anchor
            - interval
      additionalProperties: false
      required:
        - type
        - recurring_period
    BillingWorkflowCollectionAlignmentSubscription:
      description: |-
        BillingWorkflowCollectionAlignmentSubscription specifies the alignment for
        collecting the pending line items into an invoice.
      type: object
      properties:
        type:
          description: The type of alignment.
          type: string
          enum:
            - subscription
      additionalProperties: false
      required:
        - type
    BillingWorkflowCollectionSettings:
      description: |-
        Workflow collection specifies how to collect the pending line items for an
        invoice.
      type: object
      properties:
        alignment:
          description: The alignment for collecting the pending line items into an invoice.
          type: object
          default:
            type: subscription
          discriminator:
            propertyName: type
            mapping:
              subscription: '#/components/schemas/BillingWorkflowCollectionAlignmentSubscription'
              anchored: '#/components/schemas/BillingWorkflowCollectionAlignmentAnchored'
          oneOf:
            - $ref: '#/components/schemas/BillingWorkflowCollectionAlignmentSubscription'
            - $ref: '#/components/schemas/BillingWorkflowCollectionAlignmentAnchored'
        interval:
          description: |-
            This grace period can be used to delay the collection of the pending line items
            specified in alignment.

            This is useful, in case of multiple subscriptions having slightly different
            billing periods.
          type: string
          format: ISO8601
          example: P1D
          default: PT1H
      additionalProperties: false
      title: Workflow collection settings
    BillingWorkflowInvoicingSettings:
