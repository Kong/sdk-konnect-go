        effective_to:
          description: When this override expires.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
      additionalProperties: false
      required:
        - provider
        - model_id
        - pricing
        - currency
        - effective_from
