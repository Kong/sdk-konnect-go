              description: The ID of the meter to associate with this feature.
              type: string
              example: 01G65Z755AFWAKHE12NY0CQ9FH
              pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
              title: Meter ID
            filters:
              description: Filters to apply to the dimensions of the meter.
              type: object
              additionalProperties:
                $ref: '#/components/schemas/QueryFilterStringMapItem'
              maxProperties: 10
              title: Meter dimensions filters
          required:
            - id
          title: Meter reference
        unit_cost:
          description: |-
            Optional per-unit cost configuration. Use "manual" for a fixed per-unit cost, or
            "llm" to look up cost from the LLM cost database based on meter group-by
            properties.
          type: object
          discriminator:
            propertyName: type
            mapping:
              manual: '#/components/schemas/BillingFeatureManualUnitCost'
              llm: '#/components/schemas/BillingFeatureLLMUnitCost'
          oneOf:
            - $ref: '#/components/schemas/BillingFeatureManualUnitCost'
            - $ref: '#/components/schemas/BillingFeatureLLMUnitCost'
          title: Unit cost
      additionalProperties: false
      required:
        - name
        - key
    CreateMeterRequest:
      description: Meter create request.
      type: object
      properties:
        name:
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
          type: string
          maxLength: 1024
        labels:
          $ref: '#/components/schemas/Labels'
        key:
          $ref: '#/components/schemas/ResourceKey'
        aggregation:
          description: The aggregation type to use for the meter.
          type: string
          enum:
            - sum
            - count
            - unique_count
            - avg
            - min
            - max
            - latest
          x-speakeasy-unknown-values: allow
        event_type:
          description: The event type to include in the aggregation.
          type: string
          example: prompt
          minLength: 1
        events_from:
          description: |-
            The date since the meter should include events. Useful to skip old events. If
            not specified, all historical events are included.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        value_property:
          description: |-
            JSONPath expression to extract the value from the ingested event's data
            property.

            The ingested value for sum, avg, min, and max aggregations is a number or a
            string that can be parsed to a number.

            For unique_count aggregation, the ingested value must be a string. For count
            aggregation the value_property is ignored.
          type: string
          example: $.tokens
          minLength: 1
        dimensions:
          description: |-
            Named JSONPath expressions to extract the group by values from the event data.

            Keys must be unique and consist only alphanumeric and underscore characters.
          type: object
          example:
            type: $.type
          additionalProperties:
            type: string
      additionalProperties: false
      required:
        - name
        - key
        - aggregation
        - event_type
    CreatePlanAddonRequest:
      description: PlanAddon create request.
      type: object
      properties:
        name:
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
          type: string
          maxLength: 1024
        labels:
          $ref: '#/components/schemas/Labels'
        addon:
          description: The add-on associated with the plan.
          type: object
          additionalProperties: false
          properties:
            id:
              $ref: '#/components/schemas/ULID'
          required:
            - id
          title: Add-on
        from_plan_phase:
          description: The key of the plan phase from which the add-on becomes available for purchase.
          type: string
          example: resource_key
          maxLength: 64
          minLength: 1
          pattern: '^[a-z0-9]+(?:_[a-z0-9]+)*$'
          title: From plan phase
        max_quantity:
          description: |-
            The maximum number of times the add-on can be purchased for the plan. For
            single-instance add-ons this field must be omitted. For multi-instance add-ons
            when omitted, unlimited quantity can be purchased.
          type: integer
          minimum: 1
          title: Max quantity
      additionalProperties: false
      required:
        - name
        - addon
        - from_plan_phase
    CreatePlanRequest:
      description: Plan create request.
      type: object
      properties:
        name:
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
          type: string
          maxLength: 1024
        labels:
          $ref: '#/components/schemas/Labels'
        key:
          description: |-
            A key is a semi-unique string that is used to identify the plan. It is used to
            reference the latest `active` version of the plan and is unique with the version
            number.
          type: string
          example: resource_key
          maxLength: 64
          minLength: 1
          pattern: '^[a-z0-9]+(?:_[a-z0-9]+)*$'
          title: Key
        currency:
          description: The currency code of the plan.
          type: string
          example: USD
          maxLength: 3
          minLength: 3
          pattern: '^[A-Z]{3}$'
          title: Currency
        billing_cadence:
          description: The billing cadence for subscriptions using this plan.
          type: string
          format: ISO8601
          example: P1Y
          pattern: '^P(?:\d+(?:\.\d+)?Y)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?W)?(?:\d+(?:\.\d+)?D)?(?:T(?:\d+(?:\.\d+)?H)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?S)?)?$'
          title: Billing cadence
        pro_rating_enabled:
          description: Whether pro-rating is enabled for this plan.
          type: boolean
          default: true
          title: Pro-rating enabled
        phases:
          description: |-
            The plan phases define the pricing ramp for a subscription. A phase switch
            occurs only at the end of a billing period. At least one phase is required.
          type: array
          items:
            $ref: '#/components/schemas/BillingPlanPhase'
          minItems: 1
          title: Plan phases
      additionalProperties: false
      required:
        - name
        - key
        - currency
        - billing_cadence
        - phases
