    SubscriptionAddonRateCard:
      type: object
      required:
        - rate_card
        - affected_subscription_item_ids
      properties:
        rate_card:
          type: object
          required:
            - name
            - key
            - price
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 256
              description: |-
                Display name of the resource.

                Between 1 and 256 characters.
            description:
              type: string
              maxLength: 1024
              description: |-
                Optional description of the resource.

                Maximum 1024 characters.
            labels:
              $ref: '#/components/schemas/Labels'
            key:
              $ref: '#/components/schemas/ResourceKey'
            feature:
              type: object
              required:
                - id
              properties:
                id:
                  $ref: '#/components/schemas/ULID'
              additionalProperties: false
              description: The feature associated with the rate card.
              title: Feature reference
            billing_cadence:
              type: string
              pattern: >-
                ^P(?:\d+(?:\.\d+)?Y)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?W)?(?:\d+(?:\.\d+)?D)?(?:T(?:\d+(?:\.\d+)?H)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?S)?)?$
              description: >-
                The billing cadence of the rate card. When null, the charge is
                one-time

                (non-recurring). Only valid for flat prices.
              title: Billing cadence
              example: P1Y
              format: ISO8601
            price:
              type: object
              oneOf:
                - $ref: '#/components/schemas/BillingPriceFree'
                - $ref: '#/components/schemas/BillingPriceFlat'
                - $ref: '#/components/schemas/BillingPriceUnit'
                - $ref: '#/components/schemas/BillingPriceGraduated'
                - $ref: '#/components/schemas/BillingPriceVolume'
              discriminator:
                propertyName: type
                mapping:
                  free: '#/components/schemas/BillingPriceFree'
                  flat: '#/components/schemas/BillingPriceFlat'
                  unit: '#/components/schemas/BillingPriceUnit'
                  graduated: '#/components/schemas/BillingPriceGraduated'
                  volume: '#/components/schemas/BillingPriceVolume'
              description: The price of the rate card.
              title: Price
            unit_config:
              type: object
              required:
                - operation
                - conversion_factor
              properties:
                operation:
                  type: string
                  enum:
                    - divide
                    - multiply
                  description: >-
                    The arithmetic operation to apply to the raw metered
                    quantity.
                  title: Conversion operation
                  x-speakeasy-unknown-values: allow
                conversion_factor:
                  type: string
                  pattern: ^\-?[0-9]+(\.[0-9]+)?$
                  description: |-
                    The factor used in the conversion operation.

                    - For `divide`: `converted = raw / conversionFactor`.
                    - For `multiply`: `converted = raw × conversionFactor`.

                    Must be a positive non-zero value.
                  title: Conversion factor
                rounding:
                  type: string
                  enum:
                    - ceiling
                    - floor
                    - half_up
                    - none
                  description: >-
                    The rounding mode applied to the converted quantity for
                    invoicing.


                    Defaults to none (no rounding). Entitlement checks always
                    use the precise

                    (unrounded) value.
                  title: Rounding mode
                  default: none
                  x-speakeasy-unknown-values: allow
                precision:
                  type: integer
                  description: >-
                    The number of decimal places to retain after rounding.


                    Only meaningful when rounding is not "none". Defaults to 0
                    (round to whole

                    numbers).
                  title: Rounding precision (decimal places)
                  default: 0
                display_unit:
                  type: string
                  description: >-
                    A human-readable label for the converted unit shown on
                    invoices and in the

                    customer portal (e.g., "GB", "hours", "M tokens").


                    Optional. When omitted, no unit label is rendered.
                  title: Display unit label
              additionalProperties: false
              description: >-
                Unit conversion configuration for the rate card.


                Synthesized on read for plans authored with v1 dynamic or
                package prices:

                dynamic prices map to a unit price with a multiply unit config,
                and package

                prices map to a unit price with a divide unit config.


                Accepted on create and update only when the UnitConfig feature
                is enabled on the

                deployment; otherwise rejected.
              title: Unit config
            payment_term:
              type: string
              enum:
                - in_advance
                - in_arrears
              description: >-
                The payment term of the rate card. In advance payment term can
                only be used for

                flat prices.
              title: Payment term
              default: in_arrears
              x-speakeasy-unknown-values: allow
            commitments:
              type: object
              properties:
                minimum_amount:
                  type: string
                  pattern: ^\-?[0-9]+(\.[0-9]+)?$
                  description: The customer is committed to spend at least the amount.
                  title: Minimum amount
                maximum_amount:
                  type: string
                  pattern: ^\-?[0-9]+(\.[0-9]+)?$
                  description: The customer is limited to spend at most the amount.
                  title: Maximum amount
              additionalProperties: false
              description: >-
                Spend commitments for this rate card. Only applicable to
                usage-based prices

                (unit, graduated, volume).
              title: Commitments
            discounts:
              type: object
              properties:
                percentage:
                  type: number
                  minimum: 0
                  maximum: 100
                  description: Percentage discount applied to the price (0–100).
                usage:
                  type: string
                  pattern: ^\-?[0-9]+(\.[0-9]+)?$
                  description: >-
                    Number of usage units granted free before billing starts.
                    Only applies to

                    usage-based lines (not flat fees). Usage is treated as zero
                    until this amount is

                    exhausted.
              additionalProperties: false
              description: The discounts of the rate card.
              title: Discounts
            tax_config:
              type: object
              required:
                - code
              properties:
                behavior:
                  $ref: '#/components/schemas/BillingTaxBehavior'
                code:
                  $ref: '#/components/schemas/TaxCodeReference'
              additionalProperties: false
              description: The tax config of the rate card.
              title: Tax config
            entitlement:
              type: object
              oneOf:
                - $ref: '#/components/schemas/BillingRateCardMeteredEntitlement'
                - $ref: '#/components/schemas/BillingRateCardStaticEntitlement'
                - $ref: '#/components/schemas/BillingRateCardBooleanEntitlement'
              discriminator:
                propertyName: type
                mapping:
                  metered: '#/components/schemas/BillingRateCardMeteredEntitlement'
                  static: '#/components/schemas/BillingRateCardStaticEntitlement'
                  boolean: '#/components/schemas/BillingRateCardBooleanEntitlement'
              description: >-
                The entitlement template granted to subscribers of a plan or
                addon containing

                this rate card. Requires `feature` to be set.
              title: Entitlement template
          additionalProperties: false
          description: The rate card.
          title: Rate card
        affected_subscription_item_ids:
          type: array
          items:
            $ref: '#/components/schemas/ULID'
          description: The IDs of the subscription items that this rate card belongs to.
          title: Affected subscription item IDs
          readOnly: true
      additionalProperties: false
      description: A rate card for a subscription add-on.
    SubscriptionAddonTimelineSegment:
