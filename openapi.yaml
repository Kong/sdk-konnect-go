                example: true
                default: false
    PortalAuditLogWebhookStatus:
      description: Get response for portal audit log webhook status
      content:
        application/json:
          schema:
            type: object
            x-property-annotations:
              last_response_body:
                - x-internal
            properties:
              webhook_status:
                type: string
                example: active
                enum:
                  - active
                  - inactive
                description: >-
                  Current status of a webhook. `active` indicates the webhook is
                  sending or ready to send requests.

                  `inactive` indicates the webhook has been turned off due to
                  failed attempts.
                x-speakeasy-unknown-values: allow
              webhook_enabled:
                type: boolean
                example: true
                description: >-
                  Configured status of a webhook. `enabled` indicates the client
                  will accept requests.

                  `disabled` indicates the client will not accept requests.
              last_attempt_at:
                type: string
                format: date-time
                example: '2023-03-21T09:29:14.52Z'
                description: >-
                  The last time a request was made to the webhook, regardless of
                  outcome.
              last_response_code:
                type: integer
                example: 401
                description: The last response code received from the webhook.
              last_response_message:
                type: string
                example: Unauthenticated
                description: >-
                  The last message received from the webhook. Useful for
                  debugging.
              last_response_body:
                type: string
                maxLength: 2048
                example: '{"message":"Unauthenticated"}'
                description: >-
                  The body of the last response received from the webhook
                  endpoint.
    PortalAuditLogReplayJob:
      description: Response from fetching or updating an portal audit log replay job
      content:
        application/json:
          schema:
            type: object
            properties:
              start_at:
                type: string
                format: date-time
                example: '2017-07-21T17:32:28Z'
                description: >-
                  The start of a date-time range. Initial value is
                  0001-01-01T00:00:0Z.
              end_at:
                type: string
                format: date-time
                example: '2017-07-21T17:32:28Z'
                description: >-
                  The end of a date-time range. Initial value is
                  0001-01-01T00:00:0Z.
              status:
                type: string
                enum:
                  - unconfigured
                  - accepted
                  - pending
                  - running
                  - completed
                  - failed
                readOnly: true
                x-speakeasy-unknown-values: allow
              updated_at:
                type: string
                description: >-
                  Timestamp when this job was last updated. Initial value is
                  0001-01-01T00:00:0Z.
                format: date-time
                readOnly: true
