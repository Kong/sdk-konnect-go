          x-unicode-pattern: ^[\p{L}\p{N}][\p{L}\p{N} _\-\.:/+']*[\p{L}\p{N}]$
          type: string
          description: A unique user-defined name of the policy.
          maxLength: 255
        description:
          type: string
          description: A human-readable description of the policy.
          maxLength: 512
          default: ''
        enabled:
          type: boolean
          description: Whether the policy is enabled.
          default: true
        labels:
          $ref: '#/components/schemas/Labels'
        config:
          description: The configuration of the policy.
          type: object
          $ref: >-
            #/components/schemas/EventGatewayTLSListenerPolicyConfigSensitiveDataAware
    EventGatewayTLSListenerPolicy:
      type: object
      description: >
        The TLS Server policy defines the certificates and keys used by the
        gateway server when the client connects

        to the gateway over TLS.


        While it is possible to have multiple TLS policies on a listener, only
        one can be active at a time.
      required:
        - type
        - config
      properties:
        type:
          type: string
          description: The type name of the policy.
          minLength: 1
          maxLength: 255
          const: tls_server
        name:
          x-unicode-pattern: ^[\p{L}\p{N}][\p{L}\p{N} _\-\.:/+']*[\p{L}\p{N}]$
          type: string
          description: A unique user-defined name of the policy.
          maxLength: 255
        description:
          type: string
          description: A human-readable description of the policy.
          maxLength: 512
          default: ''
        enabled:
          type: boolean
          description: Whether the policy is enabled.
          default: true
