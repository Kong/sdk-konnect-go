        Encrypts Kafka records or keys using AES_256_GCM. Keys are therefore 256
        bits long.
      required:
        - type
        - config
      properties:
        type:
          type: string
          description: The type name of the policy.
          minLength: 1
          maxLength: 255
          const: encrypt
        name:
          x-unicode-pattern: ^[\p{L}\p{N}][\p{L}\p{N} _\-\.:/+']*[\p{L}\p{N}]$
          type: string
          description: A unique user-defined name of the policy.
          maxLength: 255
        description:
          type: string
          description: A human-readable description of the policy.
          maxLength: 512
          default: ''
        enabled:
          type: boolean
          description: Whether the policy is enabled.
