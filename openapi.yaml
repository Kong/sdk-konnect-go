          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          description: An ISO-8601 timestamp representation of entity deletion date.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        funding_method:
          type: string
          enum:
            - none
            - invoice
            - external
          description: Funding method of the grant.
          title: Credit funding method
          x-speakeasy-unknown-values: allow
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: ^[A-Z]{3}$
          description: Fiat or custom currency code.
          example: USD
        amount:
          type: string
          pattern: ^\-?[0-9]+(\.[0-9]+)?$
          description: Granted credit amount.
        purchase:
          type: object
          required:
            - currency
            - amount
          properties:
            currency:
              type: string
              minLength: 3
              maxLength: 3
              pattern: ^[A-Z]{3}$
              description: Currency of the purchase amount.
              example: USD
            per_unit_cost_basis:
              type: string
              pattern: ^\-?[0-9]+(\.[0-9]+)?$
              description: >-
                Cost basis per credit unit used to calculate the purchase
                amount.


                If `per_unit_cost_basis` is 0.50 and credit amount is $100.00,
                the total charge

                is $50.00. The value must be greater than 0. If the cost basis
                is 0, use

                `funding_method=none` instead.


                Defaults to 1.0.
              default: '1.0'
            amount:
              type: string
              pattern: ^\-?[0-9]+(\.[0-9]+)?$
              description: >-
                The purchase amount. Calculated from `per_unit_cost_basis` and
                credit `amount`.
              readOnly: true
            availability_policy:
              type: string
              enum:
                - on_creation
              description: |-
                Controls when credits become available for consumption.

                Defaults to `on_creation`.
              title: Credit availability policy
              default: on_creation
            settlement_status:
              type: string
              enum:
                - pending
                - authorized
                - settled
              description: Current payment settlement status.
              title: Credit purchase payment settlement status
              readOnly: true
              x-speakeasy-unknown-values: allow
          additionalProperties: false
          description: >-
            Present when a funding workflow applies (funding_method is not
            `none`).
        tax_config:
          type: object
          properties:
            behavior:
              type: string
              enum:
                - inclusive
                - exclusive
              description: Tax behavior applied to the invoice line item.
              x-speakeasy-unknown-values: allow
            tax_code:
              type: object
              required:
                - id
              properties:
                id:
                  $ref: '#/components/schemas/ULID'
              additionalProperties: false
              description: Tax code applied to the invoice line item.
          additionalProperties: false
          description: >-
            Tax configuration for the grant.


            For `invoice` and `external` funding methods, tax configuration
            should be

            provided to ensure correct revenue recognition. When not provided,
            the default

            credit grant tax code is applied, if that's not set the global
            default taxcode

            is used.
          title: Tax configuration for a credit grant
        invoice:
          type: object
          properties:
            id:
              type: string
              pattern: ^[0-7][0-9A-HJKMNP-TV-Z]{25}$
              description: Identifier of the invoice associated with the grant.
              title: ULID
              example: 01G65Z755AFWAKHE12NY0CQ9FH
              readOnly: true
            line:
              type: object
              properties:
                id:
                  $ref: '#/components/schemas/ULID'
              required:
                - id
              additionalProperties: false
              description: Identifier of the invoice line associated with the grant.
              readOnly: true
          additionalProperties: false
          description: Available when `funding_method` is `invoice`.
          readOnly: true
        filters:
          $ref: '#/components/schemas/BillingCreditGrantFilters'
        priority:
          type: integer
          format: int16
          minimum: 1
          maximum: 1000
          description: Draw-down priority of the grant. Lower values have higher priority.
          default: 10
        effective_at:
          type: string
          format: date-time
          description: |-
            The timestamp when the credit grant becomes effective.

            Defaults to the current date and time.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
        key:
          type: string
          minLength: 1
          maxLength: 256
          description: >-
            Idempotency key for the credit grant creation request.


            When provided, reusing the same key returns an HTTP 409 Conflict
            instead of

            creating a duplicate grant, which makes create requests safe to
            retry.
          title: External Resource Key
          example: 019ae40f-4258-7f15-9491-842f42a7d6ac
        expires_at:
          type: string
          format: date-time
          description: >-
            The timestamp when the credit grant expires.


            Calculated from the grant effective time and `expires_after` if
            provided.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        voided_at:
          type: string
          format: date-time
          description: Timestamp when the grant was voided.
          title: RFC3339 Date-Time
          example: '2023-01-01T01:01:01.001Z'
          readOnly: true
        status:
          type: string
          enum:
            - pending
            - active
            - expired
            - voided
          description: Current lifecycle status of the grant.
          title: Credit grant lifecycle status
          readOnly: true
          x-speakeasy-unknown-values: allow
      additionalProperties: false
      description: |-
        A credit grant allocates credits to a customer.

        Credits are drawn down against charges according to the settlement mode
        configured on the rate card.
      title: Credit grant
    BillingCreditGrantFilters:
      type: object
