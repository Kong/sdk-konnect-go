    PlatformGranularity:
      description: |
        Force time grouping into buckets of the specified duration. Only has an effect if "time" is in the "dimensions" list.

        If granularity is not specified and "time" is in the dimensions list, a default will be chosen based on the time range requested.

        Different relative times support different granularities:


          - 24h                                          => daily
          - 7d, current_week, previous_week              => daily, weekly
          - 30d, current_month, previous_month           => daily, weekly, monthly
          - 90d, 180d, 365d, current_quarter,
            previous_quarter                             => daily, weekly, monthly

        For absolute time ranges, daily will be used.

        Granularity values:


          - `daily`: Groups data into 24-hour buckets.
          - `weekly`: Groups data into 7-day buckets.
          - `monthly`: Groups data into calendar month buckets.
      type: string
      enum:
        - daily
        - weekly
        - monthly
      x-speakeasy-unknown-values: allow
    PlatformRelativeTimeRange:
      description: A duration representing a relative-to-now span of time for platform queries.
      type: object
      properties:
        tz:
          type: string
          default: Etc/UTC
        type:
          type: string
          enum:
            - relative
        time_range:
          type: string
          default: 30d
          enum:
            - 24h
            - 7d
            - 30d
            - 90d
            - 180d
            - 365d
            - current_week
            - current_month
            - current_quarter
            - previous_week
            - previous_month
            - previous_quarter
          x-speakeasy-unknown-values: allow
      required:
        - type
        - time_range
      title: Relative time range
    PlatformTimeRange:
      description: The time range to query for platform data.
      default:
        type: relative
        time_range: 30d
      discriminator:
        propertyName: type
        mapping:
          relative: '#/components/schemas/PlatformRelativeTimeRange'
          absolute: '#/components/schemas/MetricsAbsoluteTimeRangeDtoV2'
      oneOf:
        - $ref: '#/components/schemas/PlatformRelativeTimeRange'
        - $ref: '#/components/schemas/MetricsAbsoluteTimeRangeDtoV2'
    DonutChart:
      description: |
        A chart that can display one-dimensional data in a hollow, segmented circle.  To use this chart, ensure that
        the query includes only one dimension (not `time`).
      type: object
      properties:
        chart_title:
          description: 'The title of the chart, which is displayed in the tile''s header.'
          type: string
          nullable: false
        type:
          type: string
          enum:
            - donut
      additionalProperties: false
      required:
        - type
      title: Donut chart
    TimeseriesChart:
      description: |
        A chart that can render timeseries data -- data from a query that has `time` as a dimension -- as lines or bars.

        This type of chart can support:

        - One or more metrics: `{ metrics: ["response_latency_p99", "response_latency_p95"], dimensions: ["time"] }`
        - One metric plus one non-time dimension: `{ metrics: ["request_count"], dimensions: ["time", "gateway_service"] }` 

        Either way, ensure that `time` is in the list of query dimensions.
      type: object
      properties:
        chart_title:
          description: 'The title of the chart, which is displayed in the tile''s header.'
          type: string
          nullable: false
        type:
          type: string
          enum:
            - timeseries_line
            - timeseries_bar
          x-speakeasy-unknown-values: allow
        stacked:
          description: |
            Whether to stack the bars or lines (implicitly adding them together to form a total), or leave them independent from each other.
          type: boolean
          nullable: false
      additionalProperties: false
      required:
        - type
      title: Timeseries chart
    BarChart:
      description: |
        A chart that can display non-timeseries data as bars.  This type of chart supports up to 2 dimensions (not `time`).
        To render a bar chart of timeseries data, use a `timeseries_bar` chart instead.
      type: object
      properties:
        chart_title:
          description: 'The title of the chart, which is displayed in the tile''s header.'
          type: string
          nullable: false
        type:
          type: string
          enum:
            - horizontal_bar
            - vertical_bar
          x-speakeasy-unknown-values: allow
        stacked:
          description: |
            Whether to stack the bars (implicitly adding them together to form a total), or leave them independent from each other.
          type: boolean
          nullable: false
      additionalProperties: false
      required:
        - type
      title: Bar chart
    TopNChart:
      description: |
        A chart that ranks dimension values by a metric and renders them as a table, showing
        the top results.  This type of chart supports up to 3 dimensions.
      type: object
      properties:
        chart_title:
          description: 'The title of the chart, which is displayed in the tile''s header.'
          type: string
          nullable: false
        type:
          type: string
          enum:
            - top_n
      additionalProperties: false
      required:
        - type
      title: Top N chart
    SingleValueChart:
      description: A chart that can render a single number.  This chart works with a single metric and no dimensions.
      type: object
      properties:
        chart_title:
          description: 'The title of the chart, which is displayed in the tile''s header.'
          type: string
          nullable: false
        type:
          type: string
          enum:
            - single_value
        decimal_points:
          description: 'The number of figures to render after the decimal.  Most metrics only support up to 2 decimals, but some may support more.'
          type: number
      additionalProperties: false
      required:
        - type
      title: Single value chart
    ChoroplethMapChart:
      description: |
        A chart that displays data on a world map. Each region on the map is colored based on the metric value.
        This chart works only with the `api_usage` datasource and requires a single metric and a single dimension of `country_code`.
        No additional dimensions are supported.
      type: object
      properties:
        chart_title:
          description: 'The title of the chart, which is displayed in the tile''s header.'
          type: string
          nullable: false
        type:
          type: string
          enum:
            - choropleth_map
      additionalProperties: false
      required:
        - type
      title: Choropleth map chart
    Chart:
      description: The type of chart to render.
      discriminator:
        propertyName: type
        mapping:
          donut: '#/components/schemas/DonutChart'
          timeseries_line: '#/components/schemas/TimeseriesChart'
          timeseries_bar: '#/components/schemas/TimeseriesChart'
          horizontal_bar: '#/components/schemas/BarChart'
          vertical_bar: '#/components/schemas/BarChart'
          top_n: '#/components/schemas/TopNChart'
          single_value: '#/components/schemas/SingleValueChart'
          choropleth_map: '#/components/schemas/ChoroplethMapChart'
      oneOf:
