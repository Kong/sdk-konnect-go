        pricing:
          description: Token pricing data.
          type: object
          additionalProperties: false
          properties:
            input_per_token:
              description: Input price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            output_per_token:
              description: Output price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            cache_read_per_token:
              description: Cache read price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            cache_write_per_token:
              description: Cache write price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            reasoning_per_token:
              description: Reasoning output price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
          required:
            - input_per_token
            - output_per_token
        currency:
          description: Currency code.
          type: string
          example: USD
          maxLength: 3
          minLength: 3
          pattern: '^[A-Z]{3}$'
        effective_from:
          description: When this override becomes effective.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
