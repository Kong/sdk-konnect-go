    CreateApplicationRequest:
      title: CreateApplicationRequest
      additionalProperties: false
      type: object
      required:
        - name
        - owner
      properties:
        name:
          description: The name of the application.
          type: string
          maxLength: 255
        description:
          description: A description of the application.
          type: string
          maxLength: 255
        labels:
          $ref: '#/components/schemas/LabelsUpdate'
        dcr_client_id:
          description: >
            If using a DCR auth strategy, set this property to link the portal
            application to an existing

            client from the DCR provider, instead of having Konnect create a new
            client.


            This allows importing existing clients from an Identity Provider
            into Konnect, allowing

            them to be controlled through DCR flows in the portal and use
            existing client secrets

            for API access.


            The value must be a valid client ID in the DCR provider associated
            with the auth strategy.

            For some DCR providers, if the client ID is invalid, the application
            may still be created but will not function properly.


            Note: For AzureAD auth strategies, the client ID must resolve to an
            accessible Microsoft Entra

            application using the configured DCR provider credentials.
            Otherwise, application creation fails.
          type: string
          maxLength: 255
        client_id:
          $ref: '#/components/schemas/ApplicationClientId'
        auth_strategy_id:
          description: >-
            The ID of the authentication strategy the application will use when
            making requests to registered APIs.
          type: string
          format: uuid
        owner:
          $ref: '#/components/schemas/ApplicationOwner'
      example:
        name: Portal Application
        description: A portal application provisioned for a developer by a Portal Admin.
        labels:
          env: production
        auth_strategy_id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        owner:
          id: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          type: developer
