          allOf:
            - $ref: '#/components/schemas/FormResponseData'
          type: object
          nullable: true
          readOnly: true
          description: >-
            Developer-supplied responses to the portal's
            `developer_registration` form, captured at registration time. `null`
            when no responses were recorded (form not configured at registration
            time, or developer created via admin endpoint without
            `additional_data`). Keyed by field `name` (lowercase slug; letters,
            digits, underscores, or hyphens).
      example:
        id: 7cd9feff-b4da-4a9f-ba49-cbe83c75ff22
        email: developer@example.com
        full_name: Jane Dev
        status: approved
        created_at: '2022-11-15T20:37:41.457Z'
