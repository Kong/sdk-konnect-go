        ^data:image/gif(;base64)?,(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$
      description: >-
        must be a data URL with base64 GIF image data, e.g.,
        data:image/gif;base64,<BASE64_IMAGE_DATA>
      x-validation-message: >-
        must be a data URL with base64 GIF image data, e.g.,
        data:image/gif;base64,<BASE64_IMAGE_DATA>
      example: data:image/gif,YW5faW1hZ2VfZmlsZQ==
    ImageICODataUri:
      title: ImageICODataUri
      type: string
      format: uri
      pattern: >-
        ^data:image/(x-icon|ico|icon|vnd.microsoft.icon)(;base64)?,(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$
      description: >-
        must be a data URL with base64 ICO image data, e.g.,
        data:image/ico;base64,<BASE64_IMAGE_DATA>
      x-validation-message: >-
        must be a data URL with base64 ICO image data, e.g.,
        data:image/ico;base64,<BASE64_IMAGE_DATA>
      example: data:image/ico,YW5faW1hZ2VfZmlsZQ==
