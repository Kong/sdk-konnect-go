        id:
          type: string
          format: uuid
          example: 0f5061ce-78f6-4452-9108-ad7c02821fd6
          description: The API Operation identifier.
          readOnly: true
        api:
          type: object
          additionalProperties: false
          readOnly: true
          properties:
            id:
              type: string
              format: uuid
              example: 0f5061ce-78f6-4452-9108-ad7c02821fd6
              description: The API identifier.
              readOnly: true
            name:
              type: string
              description: The name of the API this operation belongs to.
              example: MyAPI
