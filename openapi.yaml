    CustomFormName:
      type: string
      description: >
        Kebab-case slug identifier for the form. Unique per portal across all
        form types. For type `developer_registration`, the value is the reserved
        literal `developer-registration`. For type `api_registration`, the admin
        supplies the slug on create and may rename it on update.
      pattern: ^[a-z0-9-]+$
      maxLength: 128
      example: flights-api-registration
    CustomFormType:
      type: string
      description: >-
        The form's purpose. Determines built-in field requirements and where the
        form is consumed by the portal client.
      enum:
        - developer_registration
        - api_registration
      example: developer_registration
      x-speakeasy-unknown-values: allow
    CustomFormStatus:
      type: string
      description: >
        Whether the form is live on the portal. `unpublished` forms are not
        served from the portal-client form-fetch endpoint;
        `developer_registration` falls back to a default schema in that case.
      enum:
        - published
        - unpublished
      example: unpublished
      default: unpublished
      x-speakeasy-unknown-values: allow
