    AuthStrategyPrincipals:
      description: |
        Application principal settings for this auth strategy. Runtime effect applies to V3 API Catalog (ACE) portals and
        applications; stored values may be set for any auth strategy in the organization.
      type: object
      properties:
        enabled:
          description: Whether application principals are enabled for this auth strategy.
          type: boolean
          default: false
      additionalProperties: false
      required:
        - enabled
      title: AuthStrategyPrincipals
    AppAuthStrategyConfigKeyAuth:
      description: |
        The most basic mode to configure an Application Auth Strategy for an API Product Version.
        Using this mode will allow developers to generate API keys that will authenticate their application requests.
        Once authenticated, an application will be granted access to any Product Version it is registered for that is configured for Key Auth.
      type: object
      properties:
        key_names:
          description: The names of the headers containing the API key. You can specify multiple header names.
          type: array
          items:
            type: string
            maxLength: 256
          maxItems: 10
          minItems: 1
        ttl:
          description: Default maximum Time-To-Live for keys created under this strategy.
          type: object
          properties:
            value:
              type: integer
              minimum: 1
            unit:
              type: string
              enum:
                - days
                - weeks
                - years
              x-speakeasy-unknown-values: allow
          required:
            - value
            - unit
      additionalProperties: false
      title: AppAuthStrategyConfigKeyAuth
    PartialAppAuthStrategyConfigKeyAuth:
      description: |
        Key Auth configuration for updating an Application Auth Strategy.
        The ttl field can be set to null to unset the Time-To-Live.
      type: object
      properties:
        key_names:
          description: The names of the headers containing the API key. You can specify multiple header names.
          type: array
          items:
            type: string
            maxLength: 256
          maxItems: 10
          minItems: 1
        ttl:
          description: Default maximum Time-To-Live for keys created under this strategy. Set to null to unset.
          type: object
          nullable: true
          properties:
            value:
              type: integer
              minimum: 1
            unit:
              type: string
              enum:
                - days
                - weeks
                - years
              x-speakeasy-unknown-values: allow
          required:
            - value
            - unit
      additionalProperties: false
      title: PartialAppAuthStrategyConfigKeyAuth
    PartialAppAuthStrategyConfigOpenIDConnect:
      description: |
        A more advanced mode to configure an API Product Version’s Application Auth Strategy.
        Using this mode will allow developers to use API credentials issued from an external IdP that will authenticate their application requests.
        Once authenticated, an application will be granted access to any Product Version it is registered for that is configured for the same Auth Strategy.
        An OIDC strategy may be used in conjunction with a DCR provider to automatically create the IdP application.
      type: object
      properties:
        issuer:
          type: string
          format: url
          maxLength: 256
        credential_claim:
          type: array
          items:
            type: string
            maxLength: 128
          maxItems: 10
        scopes:
          type: array
          items:
            type: string
            maxLength: 128
          maxItems: 50
        auth_methods:
          type: array
          items:
            type: string
            maxLength: 64
          maxItems: 10
      additionalProperties: true
      title: PartialAppAuthStrategyConfigOpenIDConnect
    AppAuthStrategyConfigOpenIDConnect:
      description: |
        A more advanced mode to configure an API Product Version’s Application Auth Strategy.
        Using this mode will allow developers to use API credentials issued from an external IdP that will authenticate their application requests.
        Once authenticated, an application will be granted access to any Product Version it is registered for that is configured for the same Auth Strategy.
        An OIDC strategy may be used in conjunction with a DCR provider to automatically create the IdP application.
      type: object
      properties:
        issuer:
          type: string
          format: url
          maxLength: 256
        credential_claim:
          type: array
          items:
            type: string
            maxLength: 128
          maxItems: 10
        scopes:
          type: array
          items:
            type: string
            maxLength: 128
          maxItems: 50
        auth_methods:
          type: array
          items:
            type: string
            maxLength: 64
          maxItems: 10
      additionalProperties: true
      required:
        - issuer
        - credential_claim
        - scopes
        - auth_methods
      title: AppAuthStrategyConfigOpenIDConnect
    AppAuthStrategyKeyAuthRequest:
      description: Request for creating a Key Auth Application Auth Strategy
      type: object
      properties:
        name:
          $ref: '#/components/schemas/AuthStrategyName'
        display_name:
          $ref: '#/components/schemas/AuthStrategyDisplayName'
        strategy_type:
          type: string
          enum:
            - key_auth
        configs:
          description: JSON-B object containing the configuration for the Key Auth strategy
          type: object
          additionalProperties: false
          properties:
            key-auth:
